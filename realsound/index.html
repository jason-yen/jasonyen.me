<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jasonyen.me</title>

<style>

* { box-sizing: border-box; }

/* MOVE SCROLLBAR LEFT */
body {
    direction: rtl;
    margin:0;
    padding-top:56px;
    font-family: Arial, sans-serif;
    background:#f5f6fa;
}

/* reset text direction */
.page {
    direction:ltr;
}

/* links */

a{
    color:#536DFE;
    text-decoration:none;
    transition:0.25s;
}

a:hover{
    transform:scale(1.05);
}

/* ================= NAVBAR ================= */

.navbar{
    direction:ltr;
    width:100%;
    height:56px;
    position:fixed;
    top:0;
    left:0;
    z-index:9999;

    display:flex;
    align-items:center;
    padding:0 40px;
    gap:20px;

    background:rgba(200,200,255,0.12);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border-bottom:1px solid rgba(200,200,255,0.2);
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.navbar-content{
    display:flex;
    align-items:center;
    gap:20px;
}

.navbar img{
    width:40px;
    height:40px;
    border-radius:12px;
    transition:0.3s;
}

.navbar img:hover{
    transform:scale(1.1);
}

.separator{
    color:#9dacff;
    font-size:20px;
}

/* ================= PAGE ================= */

.main-title{
    font-size:42px;
    font-weight:bold;
    margin:40px 40px 20px;
}

.content{
    margin:0 40px 60px;
    font-size:18px;
}

.section-title{
    font-size:26px;
    font-weight:bold;
    margin-top:40px;
    margin-bottom:20px;
}

/* ================= GLASS CARD ================= */

.card{

    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.3);

    border-radius:22px;

    padding:20px;

    box-shadow:
        0 10px 30px rgba(0,0,0,0.08),
        inset 0 1px 1px rgba(255,255,255,0.4);

    margin-bottom:40px;
}

/* ================= RESPONSIVE SLIDES ================= */

.slide-container{
    position:relative;
    width:100%;
    padding-bottom:56.25%;
    overflow:hidden;
    border-radius:16px;
    background:white;
}

.slide-container iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
}

</style>
</head>

<body>

<div class="navbar">
<div class="navbar-content">

<a href="/">
<img src="/images/WardenmonsterLogo.PNG">
</a>

<a href="/games">Games</a>
<div class="separator">|</div>

<a href="/tools">Tools</a>
<div class="separator">|</div>

<a href="/donatejk">Donate</a>
<div class="separator">|</div>

<a href="/ai">Search</a>
<div class="separator">|</div>

<a href="/noises">Sounds</a>

</div>
</div>

<div class="page">

<div class="main-title">
Sounds (Stonegate, Worldwide)
</div>

<div class="content">

<p>
Due to admin and IUSD restrictions, the Stonegate account soundboard is first, then worldwide is under.
</p>

<div class="section-title">
Stonegate Accounts
</div>

<div class="card">
<div class="slide-container">
<iframe src="https://docs.google.com/presentation/d/1r4W7iraUNSrra_hAGnPJxq9kAZgt8p0dcHkkDXA0lHM/embed?start=false&loop=false&delayms=3000&rm=minimal" allowfullscreen></iframe>
</div>
</div>

<div class="section-title">
Worldwide
</div>

<div class="card">
<div class="slide-container">
<iframe src="https://docs.google.com/presentation/d/1Ru5TmpB1TNijg_53byLLPtXoxrOeKetu7gi3FvBJBt0/embed?start=false&loop=false&delayms=3000&rm=minimal" allowfullscreen></iframe>
</div>
</div>

</div>
</div>

</body>
</html>
