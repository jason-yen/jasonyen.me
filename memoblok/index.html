<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draggable & Collapsible Memo Blocks</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding: 20px;
  }

  h1 {
    text-align: center;
  }

  #newBlockForm {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
    justify-content: center;
  }

  #newBlockForm input, #newBlockForm textarea {
    padding: 5px;
    font-size: 14px;
  }

  #blocksContainer {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
  }

  .block {
    background: #fff;
    padding: 10px;
    border-radius: 10px;
    width: 220px;
    box-shadow: 0px 2px 5px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    gap: 8px;
    cursor: grab;
    transition: background 0.2s;
  }

  .block.dragging {
    opacity: 0.7;
    transform: scale(1.05);
  }

  .block h2 {
    margin: 0;
    font-size: 18px;
    cursor: text;
  }

  .block p {
    margin: 0;
    font-size: 14px;
    color: #555;
    cursor: text;
  }

  .value-display {
    font-size: 24px;
    text-align: center;
    margin: 5px 0;
  }

  .buttons {
    display: flex;
    justify-content: space-between;
    gap: 5px;
  }

  .buttons button {
    flex: 1;
    padding: 5px;
    font-size: 16px;
    cursor: pointer;
  }

  .notes {
    background: #f9f9f9;
    padding: 5px;
    border-radius: 5px;
    max-height: 100px;
    overflow-y: auto;
  }

  .notes p {
    margin: 3px 0;
    font-size: 13px;
  }

  .add-note {
    display: flex;
    gap: 5px;
  }

  .add-note input {
    flex: 1;
    padding: 3px;
    font-size: 13px;
  }

  .collapse-button {
    background: #888;
    color: white;
    border: none;
    border-radius: 5px;
    padding: 3px 5px;
    cursor: pointer;
    font-size: 12px;
  }
</style>
</head>
<body>

<h1>Draggable & Collapsible Memo Blocks</h1>

<div id="newBlockForm">
  <input type="text" id="blockName" placeholder="Block Name">
  <textarea id="blockDesc" placeholder="Description"></textarea>
  <input type="number" id="blockValue" placeholder="Initial Value">
  <input type="number" id="blockStep" placeholder="Step" value="1">
  <input type="color" id="blockColor" value="#ffffff">
  <button onclick="createBlock()">Add Block</button>
</div>

<div id="blocksContainer">
  <!-- Blocks will appear here -->
</div>

<script>
let draggedBlock = null;

function createBlock() {
  const name = document.getElementById('blockName').value.trim();
  const desc = document.getElementById('blockDesc').value.trim();
  const value = parseFloat(document.getElementById('blockValue').value) || 0;
  const step = parseFloat(document.getElementById('blockStep').value) || 1;
  const color = document.getElementById('blockColor').value || '#fff';

  if (!name) {
    alert('Please enter a block name.');
    return;
  }

  const block = document.createElement('div');
  block.className = 'block';
  block.style.background = color;
  block.draggable = true;

  block.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 contenteditable="true">${name}</h2>
      <button class="collapse-button" onclick="toggleCollapse(this)">▼</button>
    </div>
    <div class="content">
      <p contenteditable="true">${desc}</p>
      <div class="value-display">${value}</div>
      <div class="buttons">
        <button onclick="updateValue(this, -${step})">-</button>
        <button onclick="updateValue(this, +${step})">+</button>
        <button onclick="deleteBlock(this)" style="background:#ff4d4d;color:white;">🗑</button>
      </div>
      <div class="notes"></div>
      <div class="add-note">
        <input type="text" placeholder="Add note">
        <button onclick="addNote(this)">Add</button>
      </div>
    </div>
  `;

  addDragEvents(block);
  document.getElementById('blocksContainer').appendChild(block);

  // Clear inputs
  document.getElementById('blockName').value = '';
  document.getElementById('blockDesc').value = '';
  document.getElementById('blockValue').value = '';
  document.getElementById('blockStep').value = 1;
  document.getElementById('blockColor').value = '#ffffff';
}

function updateValue(button, change) {
  const block = button.closest('.block');
  const display = block.querySelector('.value-display');
  let currentValue = parseFloat(display.textContent);
  currentValue += change;
  display.textContent = currentValue;
}

function addNote(button) {
  const input = button.previousElementSibling;
  const text = input.value.trim();
  if (!text) return;
  const notesContainer = button.closest('.block').querySelector('.notes');
  const note = document.createElement('p');
  note.textContent = text;
  notesContainer.appendChild(note);
  input.value = '';
}

function deleteBlock(button) {
  if (confirm('Are you sure you want to delete this block?')) {
    button.closest('.block').remove();
  }
}

function toggleCollapse(button) {
  const content = button.closest('.block').querySelector('.content');
  content.style.display = content.style.display === 'none' ? 'flex' : 'none';
  button.textContent = content.style.display === 'none' ? '▲' : '▼';
}

// Drag & Drop
function addDragEvents(block) {
  block.addEventListener('dragstart', () => {
    draggedBlock = block;
    block.classList.add('dragging');
  });

  block.addEventListener('dragend', () => {
    draggedBlock = null;
    block.classList.remove('dragging');
  });

  block.addEventListener('dragover', (e) => {
    e.preventDefault();
    const container = document.getElementById('blocksContainer');
    const blocks = [...container.querySelectorAll('.block:not(.dragging)')];
    const afterElement = getDragAfterElement(container, e.clientY);
    if (afterElement == null) {
      container.appendChild(draggedBlock);
    } else {
      container.insertBefore(draggedBlock, afterElement);
    }
  });
}

function getDragAfterElement(container, y) {
  const draggableElements = [...container.querySelectorAll('.block:not(.dragging)')];

  return draggableElements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) {
      return { offset: offset, element: child };
    } else {
      return closest;
    }
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}
</script>

</body>
</html>
