<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <div class="cursor"></div>

  <title>jasonyen.me</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Fredoka", sans-serif;
      min-height: 100vh;

      background: #f5f6fa;

      overflow-x: hidden;

      transition:
        background 0.4s,
        color 0.4s;

      color: #111;
    }

    body.dark {
      color: #e6e6e6;

      background: linear-gradient(
        -45deg,
        #0f1117,
        #1a1f3a,
        #0f1117,
        #1c2240
      );

      background-size: 400% 400%;

      animation: gradientMove 18s ease infinite;
    }

    @keyframes gradientMove {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* ================= NAVBAR ================= */

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      height: 64px;

      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 0 20px;

      background: rgba(255,255,255,0.08);

      backdrop-filter: blur(20px);

      z-index: 9999;
    }

    .navbar-content {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav-logo {
      width: 42px;
      height: 42px;

      border-radius: 10px;

      object-fit: cover;

      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease;
    }

    .nav-logo:hover {
      transform: scale(1.08);

      box-shadow:
        0 10px 30px rgba(83,109,254,0.35);
    }

    .navbar a {
      color: #536dfe;

      text-decoration: none;

      font-size: 17px;

      position: relative;
    }

    .navbar a::after {
      content: "";

      position: absolute;

      left: 0;
      bottom: -3px;

      width: 0%;
      height: 3px;

      border-radius: 2px;

      background: #536dfe;

      transition: width 0.3s ease;
    }

    .navbar a:hover::after {
      width: 100%;
    }

    /* ================= TOGGLE ================= */

    .toggle {
      width: 65px;
      height: 34px;

      border-radius: 50px;

      cursor: pointer;

      position: relative;

      background: #dcdde1;

      border: 2px solid rgba(0,0,0,0.2);
    }

    body.dark .toggle {
      background: #2f3640;
      border: 2px solid rgba(255,255,255,0.25);
    }

    .toggle.active {
      background: #536dfe;
      border: 2px solid #536dfe;
    }

    .toggle-circle {
      width: 28px;
      height: 28px;

      background: white;

      border-radius: 50%;

      position: absolute;

      top: 1px;
      left: 2px;

      display: flex;
      align-items: center;
      justify-content: center;

      transition: 0.35s;
    }

    .toggle.active .toggle-circle {
      left: 33px;
    }

    /* ================= MAIN ================= */

    .main {
      padding: 120px 20px 60px;
    }

    .radio-card {
      width: 100%;
      max-width: 700px;

      padding: 40px;

      border-radius: 28px;

      background: rgba(255,255,255,0.08);

      backdrop-filter: blur(24px);

      border: 1px solid rgba(255,255,255,0.12);

      box-shadow:
        0 10px 40px rgba(0,0,0,0.25),
        inset 0 1px rgba(255,255,255,0.08);

      animation: floatCard 4s ease-in-out infinite;
    }

    @keyframes floatCard {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-6px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    .station-image {
      width: 120px;
      height: 120px;

      border-radius: 20px;

      object-fit: cover;

      margin-bottom: 24px;

      box-shadow:
        0 10px 30px rgba(83,109,254,0.35);

      transition:
        transform 0.3s ease,
        box-shadow 0.3s ease;
    }

    .station-image:hover {
      transform: scale(1.04);

      box-shadow:
        0 20px 50px rgba(83,109,254,0.45);
    }

    .radio-title {
      font-size: clamp(32px, 5vw, 54px);

      line-height: 1.1;

      margin-bottom: 14px;

      font-weight: 600;

      background: linear-gradient(
        135deg,
        #536dfe,
        #8f9fff,
        #ffffff
      );

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .radio-subtitle {
      color: #666;

      margin-bottom: 30px;

      font-size: 16px;
    }

    body.dark .radio-subtitle {
      color: #bbb;
    }

    .visualizer {
      width: 100%;
      height: 120px;

      border-radius: 20px;

      margin-bottom: 30px;

      background:
        linear-gradient(
          135deg,
          rgba(83,109,254,0.18),
          rgba(180,120,255,0.12)
        );

      position: relative;

      overflow: hidden;
    }
body {
  cursor: none;
}

.cursor {
  position: fixed;
  width: 12px;
  height: 12px;
  border: 2px solid #fff;
  border-radius: 50%;
  background: transparent;
  pointer-events: none;
  z-index: 2147483647;
  transform: translate(-50%, -50%);
}
    .visualizer::before {
      content: "";

      position: absolute;
      inset: 0;

      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.1) 0px,
          rgba(255,255,255,0.1) 6px,
          transparent 6px,
          transparent 18px
        );

      animation: moveBars 1s linear infinite;
    }

    @keyframes moveBars {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(30px);
      }
    }

    .controls {
      display: flex;
      gap: 16px;

      flex-wrap: wrap;

      margin-bottom: 20px;
    }

    .game-link {
      position: relative;
      overflow: hidden;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      width: 180px;
      height: 56px;

      border-radius: 14px;

      background: linear-gradient(
        135deg,
        rgba(83,109,254,0.95),
        rgba(120,140,255,0.95)
      );

      color: white;

      border: none;

      font-family: "Fredoka", sans-serif;
      font-size: 16px;
      font-weight: 500;

      cursor: pointer;

      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease,
        filter 0.25s ease;

      box-shadow:
        0 10px 30px rgba(83,109,254,0.25);
    }

    .game-link::before {
      content: "";

      position: absolute;
      inset: 0;

      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.25),
        transparent
      );

      transform: translateX(-120%);
      transition: transform 0.7s ease;
    }
        h1 {
          font-size: clamp(24px, 4vw, 48px);
          line-height: 1.15;
          letter-spacing: -1px;
          font-weight: 600;
          margin-bottom: 20px;

          background: linear-gradient(135deg, #536dfe, #8f9fff, #ffffff);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }
    .game-link:hover::before {
      transform: translateX(120%);
    }

    .game-link:hover {
      transform: translateY(-4px) scale(1.03);

      filter: brightness(1.08);

      box-shadow:
        0 18px 40px rgba(83,109,254,0.4);
    }

    audio {
      width: 100%;

      margin-top: 20px;

      border-radius: 14px;
    }

    .status {
      margin-top: 20px;

      font-size: 15px;

      color: #666;
    }

    body.dark .status {
      color: #bbb;
    }

    @media (max-width: 600px) {

      .navbar {
        padding: 0 14px;
      }

      .navbar-content {
        gap: 12px;
      }

      .navbar a {
        font-size: 14px;
      }

      .radio-card {
        padding: 28px;
      }

      .controls {
        flex-direction: column;
      }

      .game-link {
        width: 100%;
      }

      .station-image {
        width: 100px;
        height: 100px;
      }
    }

.nav-logo:hover {

/* ================= MOBILE NAVBAR ================= */

@media (max-width: 600px) {

  .navbar {

  }

  }

  }
}
  </style>
</head>

  <script>
    const radio =
      document.getElementById("radio");

    radio.src =
      "https://cloud.revma.ihrhls.com/zc193?rj-org=n2eb-e2&rj-ttl=5&rj-tok=AAABnmI_1H8AOfzxahGBF4-2-Q";

    const statusText =
      document.getElementById("status");

    async function playRadio() {

      try {

        await radio.play();

        statusText.textContent =
          "✦ Radio is Playing ✦";

      } catch (err) {

        statusText.textContent =
          "✦ Playback Blocked by Browser ✦";

        console.error(err);
      }
    }

    function stopRadio() {

      radio.pause();

      statusText.textContent =
        "✦ Radio Stopped ✦";
    }

    const toggle =
      document.getElementById("toggle");

    const icon =
      document.getElementById("icon");

    if (
      localStorage.getItem("darkMode")
      === "on"
    ) {

      document.body.classList.add("dark");

      toggle.classList.add("active");

      icon.textContent = "☀️";
    }

    toggle.onclick = () => {

      document.body.classList.toggle("dark");

      toggle.classList.toggle("active");

      if (
        document.body.classList.contains("dark")
      ) {

        icon.textContent = "☀️";

        localStorage.setItem(
          "darkMode",
          "on"
        );

      } else {

        icon.textContent = "🌙";

        localStorage.setItem(
          "darkMode",
          "off"
        );
      }
    };
    const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});/* ================= RADIO 2 ================= */
