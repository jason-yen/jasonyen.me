<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jasonyen.me</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/images/favicon.png">
<style>

/* ================= GLOBAL ================= */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Fredoka',sans-serif;
  font-size:18px;
  background-color:#f5f6fa;
  overflow-x:hidden;
  transition: background 0.4s,color 0.4s;
  line-height:1.6;
}

/* ================= DISABLE ON MOBILE ================= */
@media (max-width: 600px){
  body::before,
  body::after{
    display:none;
  }
}

/* ================= DISABLE FRAME ON MOBILE (SAFE) ================= */
@media (max-width: 600px){
  body::before,
  body::after{
    content:none !important;
  }
}

/* ================= NAVBAR ================= */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  z-index:9999;
}

.navbar-content{
  display:flex;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.navbar a{
  color:#536DFE;
  text-decoration:none;
  font-size:18px;
  position:relative;
  white-space:nowrap;
}

.navbar a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-3px;
  width:0%;
  height:3px;
  background:#536DFE;
  border-radius:2px;
  transition:width 0.3s ease;
}

.navbar a:hover::after{
  width:100%;
}

/* LOGO */
.nav-logo{
  width:42px;
  height:42px;
  border-radius:5px;
  display:block;
  transition:transform 0.25s ease,box-shadow 0.25s ease;
}

.nav-logo:hover{
  transform:scale(1.08);
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

/* ================= MAIN ================= */
.main-content{
  margin-top:80px;
  padding:20px;
}

h1{
  font-size:36px;
  margin-bottom:20px;
}

/* About Me Section */
.about-me{
  text-align:left;
  font-size:16px;
  color:#555;
  margin:10px 0 20px 0;
}

body.dark .about-me{
  color:#ccc;
}

/* ================= SECTIONS ================= */
.section{
  margin-bottom:30px;
  padding-bottom:10px;
  border-bottom:2px solid rgba(0,0,0,0.1);
}

body.dark .section{
  border-bottom:2px solid rgba(255,255,255,0.25);
}

/* ================= BUTTONS ================= */
.game-link{
  display:inline-block;
  margin:10px 10px 0 0;
  padding:12px 24px;
  background-color:#4c5eaf;
  color:white;
  border-radius:10px;
  text-decoration:none;
  font-size:18px;
  transition:transform 0.2s ease,box-shadow 0.2s ease;
}

.game-link:hover{
  transform:scale(1.05);
  box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

/* ================= IMAGE ================= */
.bottom-image{
  margin-top:20px;
  max-width:260px;
}

.bottom-image img{
  width:100%;
  border-radius:12px;
  display:block;
  animation: floatImage 3.5s ease-in-out infinite;
  box-shadow:0 0 12px rgba(83,109,254,0.4);
  transition:transform 0.3s ease,box-shadow 0.3s ease;
}

.bottom-image img:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(83,109,254,0.7);
}

@keyframes floatImage{
  0%{transform:translateY(0);}
  50%{transform:translateY(-4px);}
  100%{transform:translateY(0);}
}

/* ================= DARK MODE ================= */
body.dark{
  color:#e6e6e6;
  background:linear-gradient(-45deg,#0f1117,#1a1f3a,#0f1117,#1c2240);
  background-size:400% 400%;
  animation:gradientMove 18s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ================= TOGGLE ================= */
.toggle{
  width:65px;
  height:34px;
  border-radius:50px;
  cursor:pointer;
  position:relative;
  background:#dcdde1;
  border:2px solid rgba(0,0,0,0.2);
}

body.dark .toggle{
  background:#2f3640;
  border:2px solid rgba(255,255,255,0.3);
}

.toggle.active{
  background:#536DFE;
  border:2px solid #536DFE;
  box-shadow:0 0 10px rgba(83,109,254,0.6);
}

.toggle-circle{
  width:28px;
  height:28px;
  background:white;
  position:absolute;
  top:1px;
  left:2px;
  border-radius:50%;
  transition:0.35s;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:14px;
}

.toggle.active .toggle-circle{
  left:33px;
}

/* ================= FX ================= */
.cursor-glow{
  position:fixed;
  width:250px;
  height:250px;
  background:radial-gradient(circle,rgba(83,109,254,0.25),transparent 70%);
  pointer-events:none;
  transform:translate(-50%,-50%);
}




@keyframes floatUp{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* ================= MOBILE RESPONSIVE ================= */
@media (max-width: 600px){
  .navbar{
    padding:0 15px;
    height:55px;
  }

  .navbar-content{
    gap:10px;
    flex-wrap:wrap;
  }

  .navbar a{
    font-size:16px;
  }

  .main-content{
    margin-top:70px;
    padding:15px;
  }

  h1{
    font-size:28px;
  }

  .game-link{
    font-size:16px;
    padding:10px 18px;
  }

  .bottom-image{
    max-width:180px;
  }


}

.log-container{
  margin-top:20px;
  padding:15px;
  background:#0f1117;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.25);
  max-height:400px;
  overflow-y:auto;
  font-size:14px;
  font-family:monospace;
}

/* scrollbar (clean) */
.log-container::-webkit-scrollbar{
  width:8px;
}
.log-container::-webkit-scrollbar-thumb{
  background:#444;
  border-radius:10px;
}

.log-entry{
  padding:8px 10px;
  border-left:3px solid #536DFE;
  margin-bottom:6px;
  background:rgba(255,255,255,0.03);
  border-radius:6px;
  display:flex;
  align-items:flex-start;
  gap:6px;
}

/* alternating rows */
.log-entry:nth-child(even){
  background:rgba(255,255,255,0.06);
}

.log-time{
  font-size:12px;
  color:#8ab4ff;
  min-width:140px;
}

/* message text */
.log-entry span:last-child{
  color:#e6e6e6;
  word-break:break-word;
}
.log-time{
  font-size:12px;
  opacity:0.6;
  margin-right:8px;
}
.log-input{
  padding:10px 14px;
  border-radius:10px;
  border:2px solid rgba(0,0,0,0.15);
  font-family:'Fredoka',sans-serif;
  font-size:16px;
  outline:none;
  width:250px;
  margin-right:10px;
  transition:0.2s;
}

.log-input:focus{
  border-color:#536DFE;
  box-shadow:0 0 8px rgba(83,109,254,0.3);
}

body.dark .log-input{
  background:#1e2233;
  color:#eee;
  border:2px solid rgba(255,255,255,0.2);
}

</style>
</head>

<body>

<div class="navbar">
  <div class="navbar-content">
    <a href="/"><img src="/images/logo.png" class="nav-logo"></a>
    <a href="/games">Games</a>
    <a href="/tools">Tools</a>
    <a href="/donatejk">Donate</a>
    <a href="/ai">Search</a>
      <a href="/downloadpage">Exhibit</a>
  </div>

  <div class="toggle" id="toggle">
    <div class="toggle-circle" id="icon">🌙</div>
  </div>
</div>

<div class="main-content">
  <h1>Log</h1>



<div style="margin-bottom:15px;">
  <input id="log-input" type="text" placeholder="Enter log message..." class="log-input">
  <button class="game-link" onclick="submitLog()">Add Log</button>
</div>
<button class="game-link" onclick="clearLogs()" style="background:#e74c3c;">
  Clear Logs
</button>
<div id="log-container" class="log-container"></div>


<script>
const toggle=document.getElementById("toggle");
const icon=document.getElementById("icon");

if(localStorage.getItem("darkMode")==="on"){
  document.body.classList.add("dark");
  toggle.classList.add("active");
  icon.textContent="☀️";
}

toggle.onclick=()=>{
  document.body.classList.toggle("dark");
  toggle.classList.toggle("active");

  if(document.body.classList.contains("dark")){
    icon.textContent="☀️";
    localStorage.setItem("darkMode","on");
  } else {
    icon.textContent="🌙";
    localStorage.setItem("darkMode","off");
  }
};

function submitLog(){
  const input = document.getElementById("log-input");
  const value = input.value.trim();

  if(value === "") return;

  addLog(value);
  input.value = "";
}

// press Enter to submit
document.getElementById("log-input").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    submitLog();
  }
});

const logContainer = document.getElementById("log-container");

function addLog(message){
  const entry = document.createElement("div");
  entry.className = "log-entry";

  const time = document.createElement("span");
  time.className = "log-time";
  time.textContent = `[${getFormattedDateTime()}]`;

  const text = document.createElement("span");
  text.textContent = message;

  entry.appendChild(time);
  entry.appendChild(text);

  logContainer.prepend(entry);

  // highlight new log briefly
  entry.style.background = "rgba(83,109,254,0.2)";
  setTimeout(() => {
    entry.style.background = "";
  }, 500);

  saveLogs();
}
function saveLogs(){
  localStorage.setItem("logs", logContainer.innerHTML);
}
function clearLogs(){
  if(!confirm("Delete all logs?")) return;

  logContainer.innerHTML = "";
  localStorage.removeItem("logs");
}
function loadLogs(){
  const saved = localStorage.getItem("logs");
  if(saved){
    logContainer.innerHTML = saved;
  }
}

loadLogs();

/* ===== HOOK INTO EXISTING EFFECTS (no rewrites) ===== */

/* block dust + glow movement */
document.addEventListener("mousemove", (e) => {
    if(!isPaused) return;
    e.stopImmediatePropagation();
}, true);
function getFormattedDateTime() {
  return new Date().toLocaleString(undefined, {
    year: 'numeric',
    month: 'short',
    day: 'numeric',
    hour: 'numeric',
    minute: '2-digit',
    second: '2-digit'
  });
}

const dateEl = document.getElementById('current-date');
const yearEl = document.getElementById('current-dates');

// Set immediately
dateEl.textContent = getFormattedDateTime();
yearEl.textContent = new Date().getFullYear();

// Update live time every second
setInterval(() => {
  dateEl.textContent = getFormattedDateTime();
}, 1000);
</script>

</body>
</html>
