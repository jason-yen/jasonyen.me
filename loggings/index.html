<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jasonyen.me</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/images/favicon.png">
<style>

/* ================= GLOBAL ================= */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Fredoka',sans-serif;
  font-size:18px;
  background-color:#f5f6fa;
  overflow-x:hidden;
  transition:
    background 0.4s,
    color 0.4s;
  line-height:1.6;
}

/* ================= NAVBAR ================= */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:60px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 20px;

  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);

  z-index:9999;

  transition:
    background 0.4s ease,
    box-shadow 0.4s ease;
}

.navbar-content{
  display:flex;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.navbar a{
  color:#536dfe;
  text-decoration:none;
  font-size:18px;
  position:relative;
  white-space:nowrap;
}

.navbar a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-3px;

  width:0%;
  height:3px;

  background:#536dfe;
  border-radius:2px;

  transition:width 0.3s ease;
}

.navbar a:hover::after{
  width:100%;
}

/* ================= LOGO ================= */
.nav-logo{
  width:42px;
  height:42px;
  border-radius:5px;
  display:block;

  transition:
    transform 0.25s ease,
    box-shadow 0.25s ease;
}

.nav-logo:hover{
  transform:scale(1.08);
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

/* ================= MAIN ================= */
.main-content{
  margin-top:80px;
  padding:20px;
}

h1{
  font-size:clamp(24px,4vw,48px);
  line-height:1.15;
  letter-spacing:-1px;
  font-weight:600;

  margin-bottom:20px;

  background:linear-gradient(
    135deg,
    #536dfe,
    #8f9fff,
    #ffffff
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}


/* ================= SECTIONS ================= */
.section{
  margin-bottom:30px;
  padding-bottom:10px;

  border-bottom:2px solid rgba(0,0,0,0.1);

  transition:
    transform 0.4s ease,
    background 0.4s ease;
}

.section:hover{
  transform:translateY(-4px);
}

body.dark .section{
  border-bottom:2px solid rgba(255,255,255,0.25);
}

/* ================= BUTTONS ================= */
.game-link{
  position:relative;
  overflow:hidden;

  display:inline-flex;
  align-items:center;
  justify-content:center;

  width:220px;
  height:56px;

  margin:10px;
  padding:0 20px;

  border-radius:14px;

  background:linear-gradient(
    135deg,
    rgba(83,109,254,0.95),
    rgba(120,140,255,0.95)
  );

  color:white;
  text-decoration:none;
  font-size:16px;
  font-weight:500;
  text-align:center;

  font-family:'Fredoka',sans-serif;

  transition:
    transform 0.25s ease,
    box-shadow 0.25s ease,
    filter 0.25s ease;

  box-shadow:0 10px 30px rgba(83,109,254,0.25);

  border:none;
  cursor:pointer;
}

/* shine effect */
.game-link::before{
  content:"";
  position:absolute;
  inset:0;

  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.25),
    transparent
  );

  transform:translateX(-120%);
  transition:transform 0.7s ease;
}

.game-link:hover::before{
  transform:translateX(120%);
}

.game-link:hover{
  transform:translateY(-4px) scale(1.03);

  filter:brightness(1.08);

  box-shadow:0 18px 40px rgba(83,109,254,0.4);
}

/* ================= INPUT ================= */
.log-input{
  padding:14px 16px;
  border-radius:14px;

  border:2px solid rgba(0,0,0,0.15);

  font-family:'Fredoka',sans-serif;
  font-size:16px;

  outline:none;

  width:260px;
  margin-right:12px;

  transition:
    border-color 0.25s ease,
    box-shadow 0.25s ease,
    background 0.25s ease;
}

.log-input:focus{
  border-color:#536DFE;
  box-shadow:0 0 12px rgba(83,109,254,0.35);
}

body.dark .log-input{
  background:#1e2233;
  color:#eee;
  border:2px solid rgba(255,255,255,0.2);
}

/* ================= LOG CONTAINER ================= */
.log-container{
  margin-top:20px;
  padding:16px;

  background:#0f1117;

  border-radius:18px;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.35),
    inset 0 1px rgba(255,255,255,0.05);

  max-height:420px;
  overflow-y:auto;

  font-size:14px;
  font-family:monospace;
}

/* scrollbar */
.log-container::-webkit-scrollbar{
  width:8px;
}

.log-container::-webkit-scrollbar-thumb{
  background:#444;
  border-radius:10px;
}

/* ================= LOG ENTRY ================= */
.log-entry{
  padding:10px 12px;

  border-left:3px solid #536DFE;

  margin-bottom:8px;

  background:rgba(255,255,255,0.03);

  border-radius:8px;

  display:flex;
  align-items:flex-start;
  gap:8px;

  transition:
    transform 0.2s ease,
    background 0.25s ease;
}

.log-entry:hover{
  transform:translateX(3px);
  background:rgba(255,255,255,0.08);
}

.log-entry:nth-child(even){
  background:rgba(255,255,255,0.05);
}

.log-time{
  font-size:12px;
  color:#8ab4ff;
  min-width:145px;
  opacity:0.7;
}

.log-entry span:last-child{
  color:#e6e6e6;
  word-break:break-word;
}

/* ================= DARK MODE ================= */
body.dark{
  color:#e6e6e6;

  background:
    linear-gradient(
      -45deg,
      #0f1117,
      #1a1f3a,
      #0f1117,
      #1c2240
    );

  background-size:400% 400%;

  animation:gradientMove 18s ease infinite;
}

@keyframes gradientMove{
  0%{
    background-position:0% 50%;
  }

  50%{
    background-position:100% 50%;
  }

  100%{
    background-position:0% 50%;
  }
}

/* ================= TOGGLE ================= */
.toggle{
  width:65px;
  height:34px;

  border-radius:50px;

  cursor:pointer;
  position:relative;

  background:#dcdde1;

  border:2px solid rgba(0,0,0,0.2);
}

body.dark .toggle{
  background:#2f3640;
  border:2px solid rgba(255,255,255,0.3);
}

.toggle.active{
  background:#536dfe;
  border:2px solid #536dfe;

  box-shadow:0 0 10px rgba(83,109,254,0.6);
}

.toggle-circle{
  width:28px;
  height:28px;

  background:white;

  position:absolute;
  top:1px;
  left:2px;

  border-radius:50%;

  transition:0.35s;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:14px;
}

.toggle.active .toggle-circle{
  left:33px;
}

/* ================= SCROLL BAR ================= */
.scroll-progress{
  position:fixed;
  top:0;
  left:0;

  height:3px;

  background:
    linear-gradient(
      90deg,
      #536dfe,
      #b478ff
    );

  width:0%;

  z-index:100000;
}

/* ================= REVEAL FX ================= */
.reveal{
  opacity:0;
  transform:translateY(60px);

  transition:
    opacity 1s ease,
    transform 1s ease;
}

.reveal.visible{
  opacity:1;
  transform:translateY(0);
}

/* ================= MOBILE ================= */

@media (max-width:600px){

  .navbar{
    position:fixed;
    top:0;
    left:0;

    width:100%;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:10px 14px;

    min-height:60px;
  }

  .navbar-content{
    display:flex;
    align-items:center;
    gap:10px;

    flex-wrap:wrap;

    width:auto;
  }
  .navbar a{
    font-size:14px;
  }

  .toggle{
    flex-shrink:0;
    margin-left:auto;
  }

  .main-content{
    margin-top:95px;
  }

}


  .game-link{
    width:100%;
    height:52px;

    margin:10px 0;

    font-size:15px;
  }

  .log-input{
    width:100%;
    margin-bottom:12px;
  }

  .log-container{
    font-size:13px;
  }


</style>
</head>

<body>
<div class="scroll-progress"></div>
<div class="navbar">

  <div class="navbar-content">
    <a href="/"><img src="/images/logo.png" class="nav-logo"></a>
    <a href="/games">Games</a>
    <a href="/tools">Tools</a>
    <a href="/donatejk">Donate</a>
    <a href="/ai">Search</a>
    <a href="/downloadpage">Exhibit</a>
  </div>

  <div class="toggle" id="toggle">
    <div class="toggle-circle" id="icon">🌙</div>
  </div>

</div>
<div class="section reveal">
<div class="main-content">
  <h1>✦
 Log ✦
</h1>



<div style="margin-bottom:15px;">
  <input id="log-input" type="text" placeholder="Enter log message..." class="log-input">
<button class="game-link" onclick="submitLog()">
  Add Log
</button>
</div>
<button class="game-link" onclick="clearLogs()" style="background:#e74c3c;">
  Clear Logs
</button>
<div id="log-container" class="log-container"></div>
</div>

<script>
const toggle=document.getElementById("toggle");
const icon=document.getElementById("icon");

if(localStorage.getItem("darkMode")==="on"){
  document.body.classList.add("dark");
  toggle.classList.add("active");
  icon.textContent="☀️";
}

toggle.onclick=()=>{
  document.body.classList.toggle("dark");
  toggle.classList.toggle("active");

  if(document.body.classList.contains("dark")){
    icon.textContent="☀️";
    localStorage.setItem("darkMode","on");
  } else {
    icon.textContent="🌙";
    localStorage.setItem("darkMode","off");
  }
};

function submitLog(){
  const input = document.getElementById("log-input");
  const value = input.value.trim();

  if(value === "") return;

  addLog(value);
  input.value = "";
}

// press Enter to submit
document.getElementById("log-input").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    submitLog();
  }
});

const logContainer = document.getElementById("log-container");

function addLog(message){
  const entry = document.createElement("div");
  entry.className = "log-entry";

  const time = document.createElement("span");
  time.className = "log-time";
  time.textContent = `[${getFormattedDateTime()}]`;

  const text = document.createElement("span");
  text.textContent = message;

  entry.appendChild(time);
  entry.appendChild(text);

  logContainer.prepend(entry);

  // highlight new log briefly
  entry.style.background = "rgba(83,109,254,0.2)";
  setTimeout(() => {
    entry.style.background = "";
  }, 500);

  saveLogs();
}
function saveLogs(){
  localStorage.setItem("logs", logContainer.innerHTML);
}
function clearLogs(){
  if(!confirm("Delete all logs?")) return;

  logContainer.innerHTML = "";
  localStorage.removeItem("logs");
}
function loadLogs(){
  const saved = localStorage.getItem("logs");
  if(saved){
    logContainer.innerHTML = saved;
  }
}

loadLogs();

/* ===== HOOK INTO EXISTING EFFECTS (no rewrites) ===== */

/* block dust + glow movement */
document.addEventListener("mousemove", (e) => {
    if(!isPaused) return;
    e.stopImmediatePropagation();
}, true);
function getFormattedDateTime() {
  return new Date().toLocaleString(undefined, {
    year: 'numeric',
    month: 'short',
    day: 'numeric',
    hour: 'numeric',
    minute: '2-digit',
    second: '2-digit'
  });
}

const dateEl = document.getElementById('current-date');
const yearEl = document.getElementById('current-dates');

// Set immediately
dateEl.textContent = getFormattedDateTime();
yearEl.textContent = new Date().getFullYear();

// Update live time every second
setInterval(() => {
  dateEl.textContent = getFormattedDateTime();
}, 1000);
</script>
<script>

/* ================= SCROLL PROGRESS ================= */
const progressBar = document.querySelector(".scroll-progress");

window.addEventListener("scroll", () => {

  const scroll = window.scrollY;

  const height =
    document.body.scrollHeight - window.innerHeight;

  const progress = (scroll / height) * 100;

  progressBar.style.width = `${progress}%`;
});

/* ================= REVEAL ANIMATION ================= */
const reveals = document.querySelectorAll(".reveal");

const revealObserver = new IntersectionObserver((entries) => {

  entries.forEach((entry) => {

    if(entry.isIntersecting){
      entry.target.classList.add("visible");
    }

  });

},{
  threshold:0.15
});

reveals.forEach((el) =>
  revealObserver.observe(el)
);

/* ================= NAVBAR SHADOW ================= */
window.addEventListener("scroll", () => {

  const navbar = document.querySelector(".navbar");

  if(window.scrollY > 50){

    navbar.style.boxShadow =
      "0 8px 30px rgba(0,0,0,0.12)";

    navbar.style.background =
      "rgba(15,17,23,0.72)";

    navbar.style.backdropFilter =
      "blur(24px)";

  } else {

    navbar.style.boxShadow = "none";

    navbar.style.background =
      "rgba(255,255,255,0.08)";
  }
});

</script>

</body>
</html>
