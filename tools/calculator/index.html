<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jasonyen.me</title>

    <link rel="icon" type="image/png" href="/images/favicon.png" />

    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Fredoka", sans-serif;
        font-size: 18px;
        background: #f5f6fa;
        overflow-x: hidden;
        line-height: 1.6;
        transition:
          background 0.4s ease,
          color 0.4s ease;
      }

      /* ================= NAVBAR ================= */

      .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        height: 60px;

        display: flex;
        align-items: center;
        justify-content: space-between;

        padding: 0 20px;

        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(20px);

        z-index: 99999;

        transition:
          background 0.4s ease,
          box-shadow 0.4s ease;
      }

      .navbar-content {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .navbar a {
        color: #536dfe;
        text-decoration: none;
        font-size: 18px;
        position: relative;
      }

      .navbar a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -3px;

        width: 0%;
        height: 3px;

        background: #536dfe;
        border-radius: 20px;

        transition: width 0.3s ease;
      }

      .navbar a:hover::after {
        width: 100%;
      }

      .nav-logo {
        width: 42px;
        height: 42px;
        border-radius: 10px;

        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
      }

      .nav-logo:hover {
        transform: scale(1.08);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
      }

      /* ================= MAIN ================= */

.main-content {
  margin-top: 80px;
  padding: 20px;


  display: flex;
  flex-direction: column;
  align-items: flex-start;
}
h1 {
  font-size: clamp(24px, 4vw, 48px);
  line-height: 1.15;
  letter-spacing: -1px;
  font-weight: 600;
  margin-bottom: 20px;

  background: linear-gradient(135deg, #536dfe, #8f9fff, #ffffff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
      .subtitle {
        color: #555;
        margin-bottom: 35px;
        text-align: center;
      }

      body.dark .subtitle {
        color: #ccc;
      }

      /* ================= CALCULATOR ================= */

      .calc-box {
        position: relative;
        overflow: hidden;

        width: 100%;
        max-width: 520px;

        padding: 28px;

        border-radius: 28px;

        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(24px);

        border: 1px solid rgba(255, 255, 255, 0.3);

        box-shadow:
          0 15px 40px rgba(83, 109, 254, 0.15),
          inset 0 1px rgba(255, 255, 255, 0.25);

        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      .calc-box:hover {
        transform: translateY(-4px);

        box-shadow:
          0 20px 50px rgba(83, 109, 254, 0.28),
          inset 0 1px rgba(255, 255, 255, 0.3);
      }

      .calc-box::before {
        content: "";

        position: absolute;
        inset: 0;

        background: linear-gradient(
          120deg,
          transparent,
          rgba(255, 255, 255, 0.08),
          transparent
        );

        transform: translateX(-120%);
        transition: transform 1s ease;
      }

      .calc-box:hover::before {
        transform: translateX(120%);
      }

      body.dark .calc-box {
        background: rgba(18, 20, 35, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      /* ================= INPUT ================= */

      .calc-input {
        width: 100%;

        padding: 16px 18px;

        border-radius: 16px;
        border: none;

        outline: none;

        font-size: 18px;
        font-family: "Fredoka", sans-serif;

        background: rgba(255, 255, 255, 0.7);

        box-shadow:
          inset 0 1px 4px rgba(0, 0, 0, 0.08),
          0 4px 12px rgba(0, 0, 0, 0.04);

        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .calc-input:focus {
        transform: scale(1.01);

        box-shadow:
          0 0 0 3px rgba(83, 109, 254, 0.2),
          0 10px 25px rgba(83, 109, 254, 0.12);
      }

      body.dark .calc-input {
        background: rgba(255, 255, 255, 0.06);
        color: white;
      }

      /* ================= BUTTONS ================= */

      .button-row {
        display: flex;
        gap: 14px;
        margin-top: 18px;
        flex-wrap: wrap;
      }

      .game-link {
        position: relative;
        overflow: hidden;

        border: none;
        cursor: pointer;

        height: 54px;
        min-width: 150px;

        padding: 0 24px;

        border-radius: 16px;

        background: linear-gradient(
          135deg,
          rgba(83, 109, 254, 0.95),
          rgba(120, 140, 255, 0.95)
        );

        color: white;

        font-size: 17px;
        font-weight: 500;
        font-family: "Fredoka", sans-serif;

        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease,
          filter 0.25s ease;

        box-shadow: 0 12px 30px rgba(83, 109, 254, 0.25);
      }

      .game-link::before {
        content: "";

        position: absolute;
        inset: 0;

        background: linear-gradient(
          120deg,
          transparent,
          rgba(255, 255, 255, 0.25),
          transparent
        );

        transform: translateX(-120%);
        transition: transform 0.7s ease;
      }

      .game-link:hover::before {
        transform: translateX(120%);
      }

      .game-link:hover {
        transform: translateY(-4px) scale(1.03);

        filter: brightness(1.08);

        box-shadow: 0 20px 40px rgba(83, 109, 254, 0.35);
      }

      /* ================= RESULT ================= */
#result {
  margin-top: 22px;
  padding: 16px;
  border-radius: 16px;

  background: rgba(255, 255, 255, 0.35);

  font-size: 18px;
  font-weight: 500;

  min-height: 60px;
  display: flex;
  align-items: center;

  color: #333;
}

body.dark #result {
  background: rgba(255, 255, 255, 0.08);
  color: #cfcfcf;
}
body.dark #result {
  background: rgba(255, 255, 255, 0.08);
  color: #cfcfcf; /* 👈 matches your Tools page vibe */
}

body.dark #result {
  background: rgba(255, 255, 255, 0.08);
  color: #d6d6d6;
}

      /* ================= DARK MODE ================= */

body.dark {
  color: #d0d0d0;
  background: linear-gradient(-45deg, #0f1117, #1a1f3a, #0f1117, #1c2240);
  background-size: 400% 400%;
  animation: gradientMove 18s ease infinite;
}

      @keyframes gradientMove {
        0% {
          background-position: 0% 50%;
        }

        50% {
          background-position: 100% 50%;
        }

        100% {
          background-position: 0% 50%;
        }
      }

      /* ================= TOGGLE ================= */

      .toggle {
        width: 65px;
        height: 34px;

        border-radius: 50px;

        cursor: pointer;
        position: relative;

        background: #dcdde1;

        border: 2px solid rgba(0, 0, 0, 0.2);
      }

      body.dark .toggle {
        background: #2f3640;
        border: 2px solid rgba(255, 255, 255, 0.25);
      }

      .toggle.active {
        background: #536dfe;
        border-color: #536dfe;

        box-shadow: 0 0 12px rgba(83, 109, 254, 0.5);
      }

      .toggle-circle {
        width: 28px;
        height: 28px;

        background: white;

        position: absolute;
        top: 1px;
        left: 2px;

        border-radius: 50%;

        display: flex;
        align-items: center;
        justify-content: center;

        transition: 0.35s ease;
      }

      .toggle.active .toggle-circle {
        left: 33px;
      }

      /* ================= CURSOR GLOW ================= */

      .cursor-glow {
        position: fixed;

        width: 260px;
        height: 260px;

        background: radial-gradient(
          circle,
          rgba(83, 109, 254, 0.22),
          transparent 70%
        );

        pointer-events: none;

        transform: translate(-50%, -50%);

        z-index: -1;
      }

      /* ================= FLOATING PARTICLES ================= */

      .particle {
        position: fixed;

        width: 6px;
        height: 6px;

        border-radius: 50%;

        background: rgba(255, 255, 255, 0.12);

        animation: floatUp linear infinite;
      }

      @keyframes floatUp {
        from {
          transform: translateY(100vh);
        }

        to {
          transform: translateY(-10vh);
        }
      }

      /* ================= MOBILE ================= */

      @media (max-width: 600px) {
        .navbar {
          height: auto;
          min-height: 60px;

          padding: 10px 12px;

          flex-direction: column;
          gap: 10px;
        }

        .navbar-content {
          flex-wrap: wrap;
          justify-content: center;
          gap: 12px;
        }

        .navbar a {
          font-size: 15px;
        }

.main-content {
  margin-top: 80px;
  padding: 20px;
}

        h1 {
          font-size: 34px;
        }

        .calc-box {
          padding: 20px;
          border-radius: 22px;
        }

        .button-row {
          flex-direction: column;
        }

        .game-link {
          width: 100%;
        }

        .cursor-glow {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="navbar">
      <div class="navbar-content">
        <a href="/"><img src="/images/logo.png" class="nav-logo" /></a>

        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
        <a href="/downloadpage">Exhibit</a>
      </div>

      <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
      </div>
    </div>

    <div class="cursor-glow"></div>

    <div class="main-content">
      <h1>Scientific Calculator</h1>



      <div class="calc-box">
        <input
          type="text"
          id="calc"
          class="calc-input"
          placeholder="e.g. sin(45), sqrt(9), 2+2"
        />

        <div class="button-row">
          <button class="game-link" onclick="calculate()">
            Calculate
          </button>

          <button class="game-link" onclick="clearCalc()">
            Clear
          </button>
        </div>

        <p id="result">Waiting for input...</p>
      </div>
    </div>

    <script>
      /* DARK MODE */

      const toggle = document.getElementById("toggle");
      const icon = document.getElementById("icon");

      if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("dark");
        toggle.classList.add("active");
        icon.textContent = "☀️";
      }

      toggle.onclick = () => {
        document.body.classList.toggle("dark");
        toggle.classList.toggle("active");

        icon.textContent = document.body.classList.contains("dark")
          ? "☀️"
          : "🌙";

        localStorage.setItem(
          "darkMode",
          document.body.classList.contains("dark") ? "on" : "off",
        );
      };

      /* CALCULATOR */

      function calculate() {
        let val = document.getElementById("calc").value;

        try {
          val = val
            .replace(/sin/g, "Math.sin")
            .replace(/cos/g, "Math.cos")
            .replace(/tan/g, "Math.tan")
            .replace(/sqrt/g, "Math.sqrt")
            .replace(/log/g, "Math.log10");

          document.getElementById("result").textContent =
            "Result: " + eval(val);
        } catch {
          document.getElementById("result").textContent = "Invalid input";
        }
      }

      function clearCalc() {
        document.getElementById("calc").value = "";
        document.getElementById("result").textContent =
          "Waiting for input...";
      }

      /* NAVBAR SCROLL */

      window.addEventListener("scroll", () => {
        const navbar = document.querySelector(".navbar");

        if (window.scrollY > 50) {
          navbar.style.background = "rgba(15,17,23,0.72)";
          navbar.style.boxShadow = "0 8px 30px rgba(0,0,0,0.12)";
        } else {
          navbar.style.background = "rgba(255,255,255,0.18)";
          navbar.style.boxShadow = "none";
        }
      });


    </script>
  </body>
</html>
