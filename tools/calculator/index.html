<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jasonyen.me</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin:0; padding:0; font-family:'Fredoka',sans-serif; }

body {
    font-size:18px;
    line-height:1.6;
    background-color:#f5f6fa;
    color:black;
    padding-top:60px;
    transition: background 0.4s, color 0.4s;
    overflow-x:hidden;
}

/* ================= NAVBAR ================= */
.navbar {
    position: fixed;
    top:0;
    width:100%;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(20px);
    z-index:9999;
}

.navbar-content {
    display:flex;
    align-items:center;
    gap:30px;
}

.navbar a {
    color:#536DFE;
    text-decoration:none;
    font-size:20px;
    font-weight:500;
    position:relative;
}

.navbar a::after {
    content:"";
    position:absolute;
    left:0;
    bottom:-4px;
    width:0%;
    height:3px;
    background:#536DFE;
    border-radius:2px;
    transition: width 0.3s ease;
}

.navbar a:hover::after { width:100%; }

.nav-logo {
    width:42px;
    height:42px;
    border-radius:12px;
    display:block;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.nav-logo:hover { transform:scale(1.08); box-shadow:0 8px 18px rgba(0,0,0,0.25); }

/* ================= MAIN ================= */
.main-title {
    font-size:42px;
    font-weight:bold;
    margin:40px 40px 20px 40px;
}

.content {
    margin:0 40px 30px 40px;
    font-size:18px;
}

/* ================= CALCULATOR ================= */
.calculator {
    width:300px;
    margin:20px 40px 40px 40px;
    padding:20px;
    background-color:#ffffff;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

#display {
    width:100%;
    height:50px;
    background-color:#f0f0f0;
    text-align:right;
    font-size:24px;
    padding:10px;
    margin-bottom:20px;
    border-radius:8px;
    border:none;
}

/* Button grid */
.button-grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.button {
    height:60px;
    background-color:#e4e7ff;
    text-align:center;
    font-size:20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s ease;
}

.button:hover { background-color:#d0d6ff; transform:translateY(-2px); }

.button.operator { background-color:#4c5eaf; color:white; }
.button.operator:hover { background-color:#2f4a88; }

.button.clear { background-color:#ff4c4c; color:white; }
.button.clear:hover { background-color:#d93b3b; }

.button.equal { background-color:#4caf50; color:white; }
.button.equal:hover { background-color:#3d9442; }

/* ================= DARK MODE ================= */
body.dark {
    color:#e6e6e6;
    background: linear-gradient(-45deg,#0f1117,#1a1f3a,#0f1117,#1c2240);
    background-size:400% 400%;
    animation: gradientMove 18s ease infinite;
}

@keyframes gradientMove {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ================= TOGGLE ================= */
.toggle {
    width:65px;
    height:34px;
    border-radius:50px;
    cursor:pointer;
    position:relative;
    background:#dcdde1;
    border:2px solid rgba(0,0,0,0.2);
}

body.dark .toggle {
    background:#2f3640;
    border:2px solid rgba(255,255,255,0.3);
}

.toggle.active {
    background:#536DFE;
    border:2px solid #536DFE;
    box-shadow:0 0 10px rgba(83,109,254,0.6);
}

.toggle-circle {
    width:28px; height:28px;
    background:white;
    position:absolute;
    top:1px;
    left:2px;
    border-radius:50%;
    transition:0.35s;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:14px;
}

.toggle.active .toggle-circle { left:33px; }
</style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="navbar-content">
        <a href="/"><img src="/images/WardenmonsterLogo.PNG" class="nav-logo" alt="Logo"></a>
        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
    </div>
    <div class="toggle" id="toggle"><div class="toggle-circle" id="icon">🌙</div></div>
</div>

<div class="main-title">Calculator</div>

<div class="calculator">
    <input type="text" id="display" disabled />

    <div class="button-grid">
        <button class="button" onclick="appendNumber(7)">7</button>
        <button class="button" onclick="appendNumber(8)">8</button>
        <button class="button" onclick="appendNumber(9)">9</button>
        <button class="button operator" onclick="appendOperator('+')">+</button>

        <button class="button" onclick="appendNumber(4)">4</button>
        <button class="button" onclick="appendNumber(5)">5</button>
        <button class="button" onclick="appendNumber(6)">6</button>
        <button class="button operator" onclick="appendOperator('-')">-</button>

        <button class="button" onclick="appendNumber(1)">1</button>
        <button class="button" onclick="appendNumber(2)">2</button>
        <button class="button" onclick="appendNumber(3)">3</button>
        <button class="button operator" onclick="appendOperator('*')">*</button>

        <button class="button" onclick="appendNumber(0)">0</button>
        <button class="button clear" onclick="clearDisplay()">C</button>
        <button class="button equal" onclick="calculateResult()">=</button>
        <button class="button operator" onclick="appendOperator('/')">/</button>
    </div>
</div>

<script>
// DARK MODE
const toggle = document.getElementById("toggle");
const icon = document.getElementById("icon");

if(localStorage.getItem("darkMode")==="on"){
    document.body.classList.add("dark");
    toggle.classList.add("active");
    icon.textContent="☀️";
} else {
    icon.textContent="🌙";
}

toggle.onclick = () => {
    const isDark = document.body.classList.toggle("dark");
    toggle.classList.toggle("active");
    icon.textContent = isDark ? "☀️" : "🌙";
    localStorage.setItem("darkMode", isDark ? "on" : "off");
};

// CALCULATOR LOGIC
let currentInput = '';
let operator = '';
let previousInput = '';

function appendNumber(number) {
    currentInput += number;
    document.getElementById('display').value = currentInput;
}

function appendOperator(op) {
    if (currentInput === '') return;
    previousInput = currentInput;
    currentInput = '';
    operator = op;
    document.getElementById('display').value = operator;
}

function clearDisplay() {
    currentInput = '';
    previousInput = '';
    operator = '';
    document.getElementById('display').value = '';
}

function calculateResult() {
    if (currentInput === '' || previousInput === '') return;
    let result;
    switch (operator) {
        case '+': result = parseFloat(previousInput)+parseFloat(currentInput); break;
        case '-': result = parseFloat(previousInput)-parseFloat(currentInput); break;
        case '*': result = parseFloat(previousInput)*parseFloat(currentInput); break;
        case '/': result = parseFloat(previousInput)/parseFloat(currentInput); break;
    }
    currentInput = result.toString();
    document.getElementById('display').value = currentInput;
}
</script>

</body>
</html>
