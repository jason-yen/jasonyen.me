<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jasonyen.me</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
    font-family:'Fredoka',sans-serif;
    font-size:18px;
    background-color:#f5f6fa;
    overflow-x:hidden;
    transition: background 0.4s,color 0.4s;
    line-height:1.6;
}

/* ================= NAVBAR ================= */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(20px);
    z-index:9999;
}

.navbar-content{
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.navbar a{
    color:#536DFE;
    text-decoration:none;
    font-size:18px;
    position:relative;
    white-space:nowrap;
}

.navbar a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-3px;
    width:0%;
    height:3px;
    background:#536DFE;
    border-radius:2px;
    transition:width 0.3s ease;
}

.navbar a:hover::after{
    width:100%;
}

/* LOGO */
.nav-logo{
    width:42px;
    height:42px;
    border-radius:12px;
    display:block;
    transition:transform 0.25s ease,box-shadow 0.25s ease;
}

.nav-logo:hover{
    transform:scale(1.08);
    box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

/* ================= MAIN ================= */
.main-content{
    margin-top:80px;
    padding:20px;
}

h1{
    font-size:36px;
    margin-bottom:20px;
}

/* ================= WORD GENERATOR ================= */
.word-generator{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    max-width:400px;
}

#wordDisplay{
    flex:1 1 100%;
    height:55px;
    font-size:26px;
    font-weight:600;
    text-align:center;
    padding:10px;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.25);
    letter-spacing:1px;
    transition:opacity 0.3s ease;
    font-family:'Fredoka',sans-serif;
}

.fade-out{opacity:0;}

#meaningDisplay{
    flex:1 1 100%;
    padding:10px;
    font-size:16px;
    border-radius:8px;
    min-height:70px;
    background:rgba(255,255,255,0.15);
    font-family:'Fredoka',sans-serif;
}

/* ================= BUTTONS ================= */
.game-link{
    padding:12px 24px;
    background-color:#4c5eaf;
    color:white;
    border-radius:10px;
    text-decoration:none;
    font-size:18px;
    border:none;
    cursor:pointer;
    transition:transform 0.2s ease,box-shadow 0.2s ease;
    font-family:'Fredoka',sans-serif;
}

.game-link:hover{
    transform:scale(1.05);
    box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

/* ================= DARK MODE ================= */
body.dark{
    color:#e6e6e6;
    background:linear-gradient(-45deg,#0f1117,#1a1f3a,#0f1117,#1c2240);
    background-size:400% 400%;
    animation:gradientMove 18s ease infinite;
}

body.dark #wordDisplay,
body.dark #meaningDisplay{
    background:rgba(255,255,255,0.05);
    color:#e6e6e6;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ================= TOGGLE ================= */
.toggle{
    width:65px;
    height:34px;
    border-radius:50px;
    cursor:pointer;
    position:relative;
    background:#dcdde1;
    border:2px solid rgba(0,0,0,0.2);
}

body.dark .toggle{
    background:#2f3640;
    border:2px solid rgba(255,255,255,0.3);
}

.toggle.active{
    background:#536DFE;
    border:2px solid #536DFE;
    box-shadow:0 0 10px rgba(83,109,254,0.6);
}

.toggle-circle{
    width:28px;
    height:28px;
    background:white;
    position:absolute;
    top:1px;
    left:2px;
    border-radius:50%;
    transition:0.35s;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:14px;
}

.toggle.active .toggle-circle{
    left:33px;
}

/* ================= FX ================= */
.cursor-glow{
    position:fixed;
    width:250px;height:250px;
    background:radial-gradient(circle,rgba(83,109,254,0.25),transparent 70%);
    pointer-events:none;
    transform:translate(-50%,-50%);
}

.dust{
    position:fixed;
    width:6px;height:6px;
    background:rgba(120,150,255,0.7);
    border-radius:50%;
    pointer-events:none;
    filter:blur(2px);
    animation:dustFade 1s linear forwards;
}

@keyframes dustFade{
    to{opacity:0;transform:translateY(-20px) scale(0.5);}
}

.particle{
    position:fixed;
    width:5px;height:5px;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    animation:floatUp linear infinite;
}

@keyframes floatUp{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

/* ================= MOBILE RESPONSIVE ================= */
@media (max-width:600px){
    .navbar{
        padding:0 15px;
        height:55px;
    }
    .navbar-content{
        gap:10px;
        flex-wrap:wrap; /* links wrap if screen is too small, but stay beside logo */
    }
    .navbar a{
        font-size:16px;
    }
    .main-content{
        margin-top:70px;
        padding:15px;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <div class="navbar-content">
        <a href="/"><img src="/images/WardenmonsterLogo.PNG" class="nav-logo"></a>
        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
    </div>
    <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
    </div>
</div>

<div class="main-content">
    <h1>Advanced Word Generator</h1>

    <div class="word-generator">
        <input id="wordDisplay" disabled placeholder="Word will appear here">
        <div id="meaningDisplay"></div>
        <button class="game-link" id="generateBtn">Generate</button>
        <button class="game-link" id="speakBtn">🔊 Speak</button>
        <button class="game-link" id="copyBtn">📋 Copy</button>
    </div>
</div>

<script>
const wordDisplay=document.getElementById("wordDisplay");
const meaningDisplay=document.getElementById("meaningDisplay");
const generateBtn=document.getElementById("generateBtn");
const speakBtn=document.getElementById("speakBtn");
const copyBtn=document.getElementById("copyBtn");

/* 60 advanced words */
const wordsList=[
"aberration","abstruse","accolade","acrimony","adulation","alacrity","anachronism","antithesis",
"archetype","ardent","assiduous","belligerent","benevolent","catharsis","cacophony","chicanery",
"circumspect","conflagration","conundrum","copious","cursory","dearth","deleterious","demagogue",
"didactic","dichotomy","disparate","divergent","ebullient","effervescent","egregious","enervate",
"equivocate","esoteric","evanescent","exacerbate","fastidious","fatuous","flippant","fortuitous",
"garrulous","grandiloquent","hapless","harangue","iconoclast","idiosyncrasy","impetuous","inimical",
"insidious","insipid","intrepid","inundate","laconic","lethargic","lugubrious","magnanimous",
"mendacious","munificent","nefarious","obsequious","parsimonious","pedantic","perfunctory","phlegmatic"
];

let recentWords=[]; // prevent repeats until 4 others

async function generateWord(){
    if(wordsList.length===0) return;
    wordDisplay.classList.add("fade-out");
    setTimeout(async ()=>{
        let availableWords=wordsList.filter(w=>!recentWords.includes(w));
        if(availableWords.length===0) recentWords=[];
        let word=availableWords[Math.floor(Math.random()*availableWords.length)];
        recentWords.push(word);
        if(recentWords.length>4) recentWords.shift();
        wordDisplay.value=word;
        meaningDisplay.innerHTML="Loading...";
        try{
            const res=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
            const data=await res.json();
            meaningDisplay.innerHTML=data[0].meanings[0].definitions[0].definition;
        }catch{
            meaningDisplay.innerHTML="Definition not found.";
        }
        wordDisplay.classList.remove("fade-out");
    },200);
}

function speakWord(){
    if(!wordDisplay.value) return;
    speakBtn.textContent="Speaking...";
    const utter=new SpeechSynthesisUtterance(wordDisplay.value);
    utter.onend=()=>{speakBtn.textContent="🔊 Speak";}
    speechSynthesis.speak(utter);
}

function copyWord(){
    if(!wordDisplay.value) return;
    navigator.clipboard.writeText(wordDisplay.value);
    const original=copyBtn.textContent;
    copyBtn.textContent="Copied!";
    setTimeout(()=>{copyBtn.textContent=original;},3000);
}

generateBtn.addEventListener("click",generateWord);
speakBtn.addEventListener("click",speakWord);
copyBtn.addEventListener("click",copyWord);

/* DARK MODE TOGGLE */
const toggle=document.getElementById("toggle");
const icon=document.getElementById("icon");
if(localStorage.getItem("darkMode")==="on"){
    document.body.classList.add("dark");
    toggle.classList.add("active");
    icon.textContent="☀️";
}
toggle.onclick=()=>{
    document.body.classList.toggle("dark");
    toggle.classList.toggle("active");
    icon.textContent=document.body.classList.contains("dark")?"☀️":"🌙";
    localStorage.setItem("darkMode",document.body.classList.contains("dark")?"on":"off");
};

/* cursor glow + particles */
const glow=document.createElement("div");
glow.className="cursor-glow";
document.body.appendChild(glow);

document.addEventListener("mousemove",e=>{
    glow.style.left=e.clientX+"px";
    glow.style.top=e.clientY+"px";
    for(let i=0;i<2;i++){
        let d=document.createElement("div");
        d.className="dust";
        d.style.left=(e.clientX+Math.random()*10-5)+"px";
        d.style.top=(e.clientY+Math.random()*10-5)+"px";
        document.body.appendChild(d);
        setTimeout(()=>d.remove(),1000);
    }
});

for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(12+Math.random()*18)+"s";
    document.body.appendChild(p);
}
</script>
</body>
</html>
