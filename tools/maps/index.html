<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jasonyen.me</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
    font-family:'Fredoka',sans-serif;
    font-size:18px;
    background-color:#f5f6fa;
    overflow-x:hidden;
    transition:background 0.4s,color 0.4s;
    line-height:1.6;
}

/* NAVBAR */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(20px);
    z-index:9999;
    flex-wrap:wrap;
}
.navbar-content{
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}
.navbar a{
    color:#536DFE;
    text-decoration:none;
    font-size:18px;
    font-weight:500;
}
.nav-logo{
    width:42px;
    height:42px;
    border-radius:12px;
    transition:transform .25s ease,box-shadow .25s ease;
}
.nav-logo:hover{
    transform:scale(1.08);
    box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

/* DARK MODE TOGGLE */
.toggle{
    width:65px;height:34px;
    border-radius:50px;
    cursor:pointer;
    position:relative;
    background:#dcdde1; /* off gray */
    border:2px solid rgba(0,0,0,0.2);
    display:flex;
    align-items:center;
    justify-content:flex-start;
    transition:background 0.3s, border 0.3s, box-shadow 0.3s;
}
.toggle.active{
    background:#2f3640; /* on dark gray */
    border:2px solid rgba(255,255,255,0.3);
    box-shadow:0 0 10px rgba(83,109,254,0.6);
    justify-content:flex-end;
}
.toggle-circle{
    width:28px;height:28px;
    background:white;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:14px;
    transition:0.35s;
}

/* MAIN CONTENT */
.main-content{
    margin-top:80px;
    padding:20px;
}
h1{font-size:36px;margin-bottom:20px;}
.game-link{
    font-family:'Fredoka',sans-serif;
    display:inline-flex;
    align-items:center;
    gap:10px;
    margin:15px 10px 20px 0;
    padding:12px 24px;
    background:#4c5eaf;
    color:white;
    border-radius:10px;
    font-size:18px;
    font-weight:500;
    border:none;
    cursor:pointer;
    transition:transform .2s ease,box-shadow .2s ease;
}
.game-link:hover{
    transform:scale(1.05);
    box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

/* LOADER */
.loader{
    width:18px;height:18px;
    border:3px solid #fff;border-top:3px solid transparent;
    border-radius:50%;
    animation:spin 1s linear infinite;
    display:inline-block;
}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

/* LOCATION TEXT */
#locationText{margin-top:8px;opacity:0.85;}

/* MAP */
.map-container{
    margin:20px 0;
    height:500px;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
.map-container iframe{width:100%;height:100%;border:0;}

/* DARK MODE */
body.dark{
    color:#e6e6e6;
    background:linear-gradient(-45deg,#0f1117,#1a1f3a,#0f1117,#1c2240);
    background-size:400% 400%;
    animation:gradientMove 18s ease infinite;
}
@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

@keyframes dustFade{to{opacity:0;transform:translateY(-20px) scale(.5);}}
.particle{
    position:fixed;width:5px;height:5px;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    animation:floatUp linear infinite;
}
@keyframes floatUp{from{transform:translateY(100vh);}to{transform:translateY(-10vh);}}

/* MOBILE */
@media(max-width:600px){
    .navbar{padding:0 15px;height:55px;}
    .navbar-content{gap:10px;}
    .navbar a{font-size:16px;}
    .main-content{margin-top:70px;padding:15px;}
    h1{font-size:28px;}
    .game-link{font-size:16px;padding:10px 18px;}
    .map-container{height:350px;}
    .cursor-glow,.dust{display:none;}
}
</style>
</head>

<body>
<div class="navbar">
    <div class="navbar-content">
        <a href="/"><img src="/images/WardenmonsterLogo.PNG" class="nav-logo"></a>
        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
    </div>
    <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
    </div>
</div>

<div class="main-content">
    <h1>Map</h1>

    <button class="game-link" id="reloadBtn" onclick="loadMap()">
        Reset Location
        <span class="loader" id="loader" style="display:none;"></span>
    </button>

    <div id="locationText"></div>

    <div class="map-container">
        <iframe id="mapFrame" 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3303.5798993484687!2d-117.8265!3d33.6846!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80c34e4a34f61b3f%3A0x8b055d04f7cd622d!2sIrvine%2C%20CA!5e0!3m2!1sen!2sus!4v1626747158031!5m2!1sen!2sus"
            allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>
</div>

<script>
/* DARK MODE */
const toggle = document.getElementById("toggle");
const icon = document.getElementById("icon");
if(localStorage.getItem("darkMode")==="on"){
    document.body.classList.add("dark");
    toggle.classList.add("active");
    icon.textContent="☀️";
}
toggle.onclick = () => {
    document.body.classList.toggle("dark");
    toggle.classList.toggle("active");
    if(document.body.classList.contains("dark")){
        icon.textContent="☀️";
        localStorage.setItem("darkMode","on");
    } else {
        icon.textContent="🌙";
        localStorage.setItem("darkMode","off");
    }
};

/* CURSOR FX */
const glow = document.createElement("div");
glow.className="cursor-glow";
document.body.appendChild(glow);
document.addEventListener("mousemove",e=>{
    glow.style.left=e.clientX+"px";
    glow.style.top=e.clientY+"px";
    for(let i=0;i<2;i++){
        let d=document.createElement("div");
        d.className="dust";
        d.style.left=e.clientX+"px";
        d.style.top=e.clientY+"px";
        document.body.appendChild(d);
        setTimeout(()=>d.remove(),1000);
    }
});
for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(12+Math.random()*18)+"s";
    document.body.appendChild(p);
}

/* MAP + LOCATION + IP */
async function loadMap(){
    const loader = document.getElementById("loader");
    const locText = document.getElementById("locationText");
    const frame = document.getElementById("mapFrame");

    loader.style.display="inline-block";
    locText.textContent="Detecting location...";

    try{
        const res = await fetch("https://ipapi.co/json/");
        const data = await res.json();
        const lat = data.latitude;
        const lon = data.longitude;
        const ip = data.ip;

        frame.src=`https://www.google.com/maps?q=${lat},${lon}&z=12&output=embed`;
        locText.textContent=`📍 ${data.city}, ${data.country_name} | IP: ${ip}`;
    }catch{
        locText.textContent="Location unavailable";
    }finally{
        loader.style.display="none";
    }
}
loadMap();
</script>
</body>
</html>
