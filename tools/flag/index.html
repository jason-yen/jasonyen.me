<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jasonyen.me</title>
    <head>
  <div class="cursor"></div>
</head>
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/images/favicon.png" />
    <style>
      /* ================= FOOTER ================= */
      /* ================= LAYOUT FIX (sticky footer) ================= */
      .footer {
        margin-top: 80px;
        padding: 80px 20px 40px;

        background: linear-gradient(
          to bottom,
          transparent 0%,
          rgba(212, 220, 251, 0.5) 25%,
          #d4dcfb 55%,
          #cfd8ff 100%
        );

        color: #111;
        text-align: center;
        font-family: "Spectral", serif;
        font-size: 15px;
        line-height: 1.7;
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(6px);
      }

      /* animated glow line */
      .footer::before {
        content: "";
        position: absolute;
        top: 0;
        left: -50%;
        width: 200%;
        height: 2px;

        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 200, 255, 0.6),
          rgba(180, 120, 255, 0.6),
          transparent
        );

        animation: footerGlow 6s linear infinite;
        will-change: transform;
      }

      @keyframes footerGlow {
        0% {
          transform: translateX(-25%);
        }

        100% {
          transform: translateX(25%);
        }
      }

      /* links */
      .footer a {
        color: #444;
        text-decoration: none;
        margin: 0 6px;
        transition: color 0.25s ease;
      }

      .footer a:hover {
        color: #000;
      }

      /* ================= DARK MODE ================= */
      body.dark .footer {
        background: #000;
        color: #fff;
      }

      body.dark .footer a {
        color: #aaa;
      }

      body.dark .footer a:hover {
        color: #fff;
      }

      body.dark .footer::before {
        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 200, 255, 0.7),
          rgba(180, 120, 255, 0.7),
          transparent
        );
      }

      /* ================= GLOBAL ================= */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Fredoka", sans-serif;
        font-size: 18px;
        background-color: #f5f6fa;
        overflow-x: hidden;
        transition:
          background 0.4s,
          color 0.4s;
        line-height: 1.6;
      }

      /* ================= DISABLE ON MOBILE ================= */
      @media (max-width: 600px) {
        body::before,
        body::after {
          display: none;
        }
      }

      /* ================= DISABLE FRAME ON MOBILE (SAFE) ================= */
      @media (max-width: 600px) {
        body::before,
        body::after {
          content: none !important;
        }
      }

      /* ================= NAVBAR ================= */
      .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(20px);
        z-index: 9999;
      }

      .navbar-content {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .navbar a {
        color: #536dfe;
        text-decoration: none;
        font-size: 18px;
        position: relative;
        white-space: nowrap;
      }

      .navbar a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -3px;
        width: 0%;
        height: 3px;
        background: #536dfe;
        border-radius: 2px;
        transition: width 0.3s ease;
      }

      .navbar a:hover::after {
        width: 100%;
      }

      /* LOGO */
      .nav-logo {
        width: 42px;
        height: 42px;
        border-radius: 5px;
        display: block;
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
      }

      .nav-logo:hover {
        transform: scale(1.08);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
      }

      /* ================= MAIN ================= */
      .main-content {
        margin-top: 80px;
        padding: 20px;
      }

      h1 {
        font-size: clamp(24px, 4vw, 48px);
        line-height: 1.15;
        letter-spacing: -1px;
        font-weight: 600;
        margin-bottom: 20px;

        background: linear-gradient(135deg, #536dfe, #8f9fff, #ffffff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* About Me Section */
      .about-me {
        text-align: left;
        font-size: 16px;
        color: #555;
        margin: 10px 0 20px 0;
      }

      body.dark .about-me {
        color: #ccc;
      }

      /* ================= SECTIONS ================= */
      .section {
        margin-bottom: 30px;
        padding-bottom: 10px;
        border-bottom: 2px solid rgba(0, 0, 0, 0.1);
      }

      body.dark .section {
        border-bottom: 2px solid rgba(255, 255, 255, 0.25);
      }

      /* ================= BUTTONS ================= */
      /* ================= BUTTONS ================= */
      .game-link {
        position: relative;
        overflow: hidden;

        display: inline-flex;
        align-items: center;
        justify-content: center;

        width: 220px;
        /* same width for all */
        height: 56px;
        /* same height for all */

        margin: 10px;
        padding: 0 20px;

        border-radius: 14px;

        background: linear-gradient(
          135deg,
          rgba(83, 109, 254, 0.95),
          rgba(120, 140, 255, 0.95)
        );

        color: white;
        text-decoration: none;
        font-size: 16px;
        font-weight: 500;
        text-align: center;

        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease,
          filter 0.25s ease;

        box-shadow: 0 10px 30px rgba(83, 109, 254, 0.25);
      }

      /* shine effect */
      .game-link::before {
        content: "";
        position: absolute;
        inset: 0;

        background: linear-gradient(
          120deg,
          transparent,
          rgba(255, 255, 255, 0.25),
          transparent
        );

        transform: translateX(-120%);
        transition: transform 0.7s ease;
      }

      .game-link:hover::before {
        transform: translateX(120%);
      }
      .game-link {
        font-family: "Fredoka", sans-serif;
      }
      .game-link:hover {
        transform: translateY(-4px) scale(1.03);

        filter: brightness(1.08);

        box-shadow: 0 18px 40px rgba(83, 109, 254, 0.4);
      }
      .footer .game-link {
        color: white !important;
      }
      /* ================= IMAGE ================= */
      .bottom-image {
        margin-top: 20px;
        max-width: 260px;
      }

      .bottom-image img {
        width: 100%;
        border-radius: 12px;
        display: block;
        animation: floatImage 3.5s ease-in-out infinite;
        box-shadow: 0 0 12px rgba(83, 109, 254, 0.4);
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      .bottom-image img:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(83, 109, 254, 0.7);
      }

      @keyframes floatImage {
        0% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-4px);
        }

        100% {
          transform: translateY(0);
        }
      }

      /* ================= DARK MODE ================= */
      body.dark {
        color: #e6e6e6;
        background: linear-gradient(-45deg, #0f1117, #1a1f3a, #0f1117, #1c2240);
        background-size: 400% 400%;
        animation: gradientMove 18s ease infinite;
      }

      @keyframes gradientMove {
        0% {
          background-position: 0% 50%;
        }

        50% {
          background-position: 100% 50%;
        }

        100% {
          background-position: 0% 50%;
        }
      }

      /* ================= TOGGLE ================= */
      .toggle {
        width: 65px;
        height: 34px;
        border-radius: 50px;
        cursor: pointer;
        position: relative;
        background: #dcdde1;
        border: 2px solid rgba(0, 0, 0, 0.2);
      }

      body.dark .toggle {
        background: #2f3640;
        border: 2px solid rgba(255, 255, 255, 0.3);
      }

      .toggle.active {
        background: #536dfe;
        border: 2px solid #536dfe;
        box-shadow: 0 0 10px rgba(83, 109, 254, 0.6);
      }

      .toggle-circle {
        width: 28px;
        height: 28px;
        background: white;
        position: absolute;
        top: 1px;
        left: 2px;
        border-radius: 50%;
        transition: 0.35s;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 14px;
      }

      .toggle.active .toggle-circle {
        left: 33px;
      }

      /* ================= FX ================= */
      .cursor-glow {
        position: fixed;
        width: 250px;
        height: 250px;
        background: radial-gradient(
          circle,
          rgba(83, 109, 254, 0.25),
          transparent 70%
        );
        pointer-events: none;
        transform: translate(-50%, -50%);
      }

      @keyframes floatUp {
        from {
          transform: translateY(100vh);
        }

        to {
          transform: translateY(-10vh);
        }
      }

      /* ================= MOBILE + TABLET RESPONSIVE ================= */

      /* Tablets */
      @media (max-width: 900px) {
        .main-content {
          padding: 18px;
        }
        h1 {
          font-size: clamp(24px, 4vw, 48px);
          line-height: 1.15;
          letter-spacing: -1px;
          font-weight: 600;
          margin-bottom: 20px;

          background: linear-gradient(135deg, #536dfe, #8f9fff, #ffffff);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        .section {
          margin-bottom: 24px;
        }

        .game-link {
          font-size: 16px;
          padding: 10px 18px;
        }

        .footer {
          padding: 60px 18px 30px;
          font-size: 14px;
        }
      }

      /* Phones */
      @media (max-width: 600px) {
        body {
          font-size: 16px;
        }

        .navbar {
          height: auto;
          min-height: 60px;
          padding: 10px 12px;
          flex-direction: column;
          gap: 10px;
        }

        .navbar-content {
          width: 100%;
          justify-content: center;
          gap: 12px;
          flex-wrap: wrap;
        }

        .navbar a {
          font-size: 15px;
        }

        .nav-logo {
          width: 36px;
          height: 36px;
        }

        .toggle {
          transform: scale(0.9);
        }

        .main-content {
          margin-top: 120px;
          padding: 14px;
        }

        h1 {
          font-size: 22px !important;
          line-height: 1.2;
          letter-spacing: -1px;
          font-weight: 600;
          margin-bottom: 20px;

          background: linear-gradient(135deg, #536dfe, #8f9fff, #ffffff);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        .about-me {
          text-align: center;
          font-size: 15px;
        }

        .section {
          margin-bottom: 24px;
          padding-bottom: 16px;
        }

        .game-link {
          display: block;
          width: 100%;
          text-align: center;
          margin: 10px 0;
          font-size: 15px;
          padding: 12px;
        }

        .bottom-image {
          max-width: 160px;
          margin: 25px auto 0;
        }

        .footer {
          margin-top: 50px;
          padding: 50px 14px 25px;
          font-size: 13px;
          line-height: 1.6;
        }

        .footer br {
          display: none;
        }

        .footer a.game-link {
          width: 220px;
          height: 56px;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          margin: 14px auto 0;
        }

        /* reduce heavy effects on phones */
        .cursor-glow {
          display: none;
        }

        .bottom-image img {
          animation: none;
        }
      }

      /* Very small phones */
      @media (max-width: 380px) {
        h1 {
          font-size: 22px !important;
          line-height: 1.2;
          letter-spacing: -1px;
          font-weight: 600;
          margin-bottom: 20px;

          background: linear-gradient(135deg, #536dfe, #8f9fff, #ffffff);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        h1 {
          font-size: clamp(24px, 4vw, 48px);
          line-height: 1.15;
          letter-spacing: -1px;
          font-weight: 600;
          margin-bottom: 20px;

          background: linear-gradient(135deg, #536dfe, #8f9fff, #ffffff);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        .navbar a {
          font-size: 14px;
        }

        .game-link {
          font-size: 14px;
          padding: 10px;
        }
      }

      @media (max-width: 600px) {
        .game-link {
          width: 100%;
          height: 52px;
          margin: 10px 0;
        }
      }

      .reveal {
        opacity: 0;
        transform: translateY(60px);
        transition:
          opacity 1s ease,
          transform 1s ease;
      }

      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }
body {

}

.cursor {

  pointer-events: none;

      .ai-popup {
        position: fixed;
        right: 24px;
        bottom: 24px;

        width: 280px;
        padding: 18px;

        border-radius: 22px;

        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(24px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);

        border: 1px solid rgba(255, 255, 255, 0.12);

        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.25),
          inset 0 1px rgba(255, 255, 255, 0.08);

        z-index: 99999;

        animation: popupFloat 4s ease-in-out infinite;
      }

      .ai-popup h3 {
        margin-bottom: 8px;
        font-size: 18px;
      }

      .ai-popup p {
        font-size: 14px;
        opacity: 0.8;
      }

      @keyframes popupFloat {
        0% {
          transform: translateY(0px);
        }

        50% {
          transform: translateY(-8px);
        }

        100% {
          transform: translateY(0px);
        }
      }

      .navbar {
        transition:
          background 0.4s ease,
          box-shadow 0.4s ease;
      }

      .section {
        transition:
          transform 0.4s ease,
          background 0.4s ease;
      }

      .section:hover {
        transform: translateY(-4px);
      }

      .scroll-progress {
        position: fixed;
        top: 0;
        left: 0;

        height: 3px;

        background: linear-gradient(90deg, #536dfe, #b478ff);

        width: 0%;

        z-index: 100000;
      }

      .popup-close:active {
        transform: scale(0.95);
      }

      .ai-popup {
        position: fixed;
        right: 24px;
        bottom: 24px;

        width: 280px;
        padding: 18px;

        border-radius: 22px;

        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(24px);

        border: 1px solid rgba(255, 255, 255, 0.12);

        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.25),
          inset 0 1px rgba(255, 255, 255, 0.08);

        z-index: 999999;

        animation: popupFloat 4s ease-in-out infinite;

        position: fixed;
      }

      .popup-close {
        position: absolute;
        top: 10px;
        right: 10px;

        width: 28px;
        height: 28px;

        border: none;
        border-radius: 50%;

        background: rgba(0, 0, 0, 0.35);
        color: white;

        font-size: 16px;
        line-height: 1;

        cursor: pointer;

        display: flex;
        align-items: center;
        justify-content: center;

        z-index: 1000000;
      }
    </style>
  </head>

  <body>
    <div class="navbar">
      <div class="navbar-content">
        <a href="/"><img src="/images/logo.png" class="nav-logo" /></a>
        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
        <a href="/downloadpage">Exhibit</a>
      </div>
      <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
      </div>
    </div>

    <div class="main-content">
      <h1>Flag Generator {Beta}</h1>

      <div class="section">
        <button class="game-link" onclick="generateRandomFlag()">
          Generate Random Flag
        </button>

        <div class="flag-box" id="flagDisplay"></div>
      </div>
    </div>

    <script>
      /* DARK MODE */
      const toggle = document.getElementById("toggle");
      const icon = document.getElementById("icon");

      if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("dark");
        toggle.classList.add("active");
        icon.textContent = "☀️";
      }

      toggle.onclick = () => {
        document.body.classList.toggle("dark");
        toggle.classList.toggle("active");
        icon.textContent = document.body.classList.contains("dark")
          ? "☀️"
          : "🌙";
        localStorage.setItem(
          "darkMode",
          document.body.classList.contains("dark") ? "on" : "off",
        );
      };


      for (let i = 0; i < 25; i++) {
        let p = document.createElement("div");
        p.className = "particle";
        p.style.left = Math.random() * 100 + "vw";
        p.style.animationDuration = 12 + Math.random() * 18 + "s";
        document.body.appendChild(p);
      }

      /* FLAG GENERATOR */
      const countries = [
        { code: "us", name: "United States" },
        { code: "jp", name: "Japan" },
        { code: "fr", name: "France" },
        { code: "br", name: "Brazil" },
        { code: "in", name: "India" },
        { code: "gb", name: "United Kingdom" },
      ];

      function generateRandomFlag() {
        const box = document.getElementById("flagDisplay");
        const c = countries[Math.floor(Math.random() * countries.length)];
        const url = `https://flagcdn.com/w320/${c.code}.png`;

        box.innerHTML = "Loading...";
        setTimeout(() => {
          box.innerHTML = `<img src="${url}"><div class="country-name">${c.name}</div>`;
          const img = box.querySelector("img");
          img.onload = () => img.classList.add("loaded");
        }, 800);
      }
      const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
    </script>

  </body>
</html>
