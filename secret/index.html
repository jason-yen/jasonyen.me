<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jasonye.me</title>
    <style>
        /* --- Dark Mode/Core Styling --- */
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --container-bg: #1e1e1e;
            --accent-color: #bb86fc;
            --button-bg: #333333;
            --button-hover: #444444;
            --button-active: #222222;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            cursor: default;
        }

        .container {
            background-color: var(--container-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            color: var(--accent-color);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        /* --- Clickable Button Styling (Matches Code 1) --- */
        .audio-button {
            background-color: var(--button-bg);
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 10px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #222;
            outline: none;
            user-select: none;
        }

        .audio-button:hover {
            background-color: var(--button-hover);
        }

        /* Click effect: Moves button down to simulate pressing */
        .audio-button:active {
            background-color: var(--button-active);
            transform: translateY(4px);
            box-shadow: 0 0px 0 #222;
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }
            .audio-button {
                width: 100%;
                margin: 5px 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>jasonye.me</h1>
        
        <!-- Audio Elements -->
        <audio id="soundEffect">
            <source src="sound.mp3" type="audio/mpeg">
            Your browser does not support audio.
        </audio>

        <!-- Buttons -->
        <button class="audio-button" onclick="playSound()">Play Sound</button>
        <button class="audio-button" onclick="stopSound()">Stop</button>
    </div>

    <script>
        // --- Sound Handling ---
        const audio = document.getElementById("soundEffect");

        function playSound() {
            audio.play();
        }

        function stopSound() {
            audio.pause();
            audio.currentTime = 0;
        }
        
        // --- NOTE: /realsound or /noise removed per instructions ---
    </script>

</body>
</html>
