<!doctype html>
<html lang="en">
  <head>
    <!-- ================= META ================= -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ================= TITLE ================= -->
    <title>jasonyen.me</title>

    <!-- ================= FONTS ================= -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- ================= FAVICON ================= -->
    <link rel="icon" type="image/png" href="/images/favicon.png" />

    <style>
      /* ================= GLOBAL ================= */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;

        font-family: "Fredoka", sans-serif;
      }

      body {
        font-family: "Fredoka", sans-serif;
        font-size: 18px;
        line-height: 1.6;

        background: #f5f6fa;
        color: #111;

        overflow-x: hidden;

        padding-top: 60px;

        transition:
          background 0.4s,
          color 0.4s;
      }

      /* ================= NAVBAR ================= */
      .navbar {
        position: fixed;
        top: 0;

        width: 100%;
        height: 60px;

        display: flex;
        align-items: center;
        justify-content: space-between;

        padding: 0 20px;

        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(20px);

        z-index: 9999;

        transition:
          background 0.4s ease,
          box-shadow 0.4s ease;
      }

      .navbar-content {
        display: flex;
        align-items: center;

        gap: 20px;

        flex-wrap: wrap;
      }

      .navbar a {
        color: #536dfe;
        text-decoration: none;

        font-size: 18px;

        position: relative;

        white-space: nowrap;
      }

      .navbar a::after {
        content: "";

        position: absolute;

        left: 0;
        bottom: -3px;

        width: 0%;
        height: 3px;

        background: #536dfe;

        border-radius: 2px;

        transition: width 0.3s ease;
      }

      .navbar a:hover::after {
        width: 100%;
      }

      /* ================= LOGO ================= */
      .nav-logo {
        width: 42px;
        height: 42px;

        border-radius: 12px;

        display: block;

        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
      }

      .nav-logo:hover {
        transform: scale(1.08);

        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
      }

      /* ================= MAIN CONTENT ================= */
      .main-content {
        margin-top: 0;

        padding: 20px;
      }

      h1 {
        font-size: clamp(24px, 4vw, 42px);

        line-height: 1.15;

        letter-spacing: -1px;

        font-weight: 600;

        margin-bottom: 20px;

        background: linear-gradient(135deg, #536dfe, #8f9fff, #ffffff);

        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* ================= CHATBOX ================= */
      .chatbox {
        max-width: 700px;
      }

      .chatbox ul {
        list-style: none;

        max-height: 450px;

        overflow-y: auto;

        margin-bottom: 14px;
      }

      .chatbox li {
        padding: 14px;

        margin: 8px 0;

        border-radius: 14px;

        white-space: pre-wrap;

        font-size: 15px;

        line-height: 1.6;

        transition:
          transform 0.25s ease,
          background 0.25s ease;
      }

      .chatbox li:hover {
        transform: translateY(-2px);
      }

      .user-msg {
        background: linear-gradient(
          135deg,
          rgba(180, 230, 255, 0.95),
          rgba(120, 200, 255, 0.9)
        );

        text-align: right;

        color: #111;

        box-shadow: 0 8px 20px rgba(120, 200, 255, 0.2);
      }

      .bot-msg {
        background: rgba(255, 255, 255, 0.65);

        backdrop-filter: blur(12px);

        border: 1px solid rgba(255, 255, 255, 0.2);

        box-shadow:
          0 8px 30px rgba(0, 0, 0, 0.08),
          inset 0 1px rgba(255, 255, 255, 0.08);
      }

      /* ================= INPUT AREA ================= */
      .chat-input-area {
        display: flex;

        gap: 10px;

        flex-wrap: wrap;
      }

      #user-input {
        flex: 1;

        padding: 14px 16px;

        border-radius: 14px;

        border: 1px solid rgba(0, 0, 0, 0.12);

        background: rgba(255, 255, 255, 0.75);

        backdrop-filter: blur(12px);

        font-size: 16px;

        outline: none;

        transition:
          border 0.25s ease,
          box-shadow 0.25s ease,
          background 0.25s ease;
      }

      #user-input:focus {
        border: 1px solid rgba(83, 109, 254, 0.5);

        box-shadow: 0 0 0 4px rgba(83, 109, 254, 0.12);
      }

      /* ================= BUTTONS ================= */
      .game-link {
        position: relative;

        overflow: hidden;

        display: inline-flex;
        align-items: center;
        justify-content: center;

        min-width: 140px;
        height: 56px;

        padding: 0 24px;

        border: none;

        border-radius: 14px;

        cursor: pointer;

        background: linear-gradient(
          135deg,
          rgba(83, 109, 254, 0.95),
          rgba(120, 140, 255, 0.95)
        );

        color: white;

        text-decoration: none;

        font-size: 16px;

        font-weight: 500;

        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease,
          filter 0.25s ease;

        box-shadow: 0 10px 30px rgba(83, 109, 254, 0.25);
      }

      .game-link::before {
        content: "";

        position: absolute;

        inset: 0;

        background: linear-gradient(
          120deg,
          transparent,
          rgba(255, 255, 255, 0.25),
          transparent
        );

        transform: translateX(-120%);

        transition: transform 0.7s ease;
      }

      .game-link:hover::before {
        transform: translateX(120%);
      }

      .game-link:hover {
        transform: translateY(-4px) scale(1.03);

        filter: brightness(1.08);

        box-shadow: 0 18px 40px rgba(83, 109, 254, 0.4);
      }

      /* ================= CURSOR GLOW ================= */
      .cursor-glow {
        position: fixed;

        width: 250px;
        height: 250px;

        background: radial-gradient(
          circle,
          rgba(83, 109, 254, 0.25),
          transparent 70%
        );

        pointer-events: none;

        transform: translate(-50%, -50%);

        z-index: -1;
      }

      /* ================= DARK MODE ================= */
      body.dark {
        color: #e6e6e6;

        background: linear-gradient(-45deg, #0f1117, #1a1f3a, #0f1117, #1c2240);

        background-size: 400% 400%;

        animation: gradientMove 18s ease infinite;
      }

      body.dark .bot-msg {
        background: rgba(42, 46, 68, 0.7);

        border: 1px solid rgba(255, 255, 255, 0.08);

        color: #f2f2f2;
      }

      body.dark .user-msg {
        background: linear-gradient(
          135deg,
          rgba(83, 109, 254, 0.95),
          rgba(120, 140, 255, 0.95)
        );

        color: white;
      }

      /* ================= TOGGLE ================= */
      .toggle {
        width: 65px;
        height: 34px;

        border-radius: 50px;

        cursor: pointer;

        position: relative;

        background: #dcdde1;

        border: 2px solid rgba(0, 0, 0, 0.2);
      }

      body.dark .toggle {
        background: #2f3640;

        border: 2px solid rgba(255, 255, 255, 0.3);
      }

      .toggle.active {
        background: #536dfe;

        border: 2px solid #536dfe;

        box-shadow: 0 0 10px rgba(83, 109, 254, 0.6);
      }

      .toggle-circle {
        width: 28px;
        height: 28px;

        background: white;

        position: absolute;

        top: 1px;
        left: 2px;

        border-radius: 50%;

        transition: 0.35s;

        display: flex;
        align-items: center;
        justify-content: center;
      }

      .toggle.active .toggle-circle {
        left: 33px;
      }
      .game-link {
        position: relative;

        overflow: hidden;

        display: inline-flex;
        align-items: center;
        justify-content: center;

        text-align: center; /* ADD THIS */

        min-width: 140px;
        height: 56px;

        padding: 0 24px;

        border: none;

        border-radius: 14px;

        cursor: pointer;

        background: linear-gradient(
          135deg,
          rgba(83, 109, 254, 0.95),
          rgba(120, 140, 255, 0.95)
        );

        color: white;

        text-decoration: none;

        font-size: 16px;

        font-weight: 500;

        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease,
          filter 0.25s ease;

        box-shadow: 0 10px 30px rgba(83, 109, 254, 0.25);
      }
      /* ================= ANIMATIONS ================= */
      @keyframes gradientMove {
        0% {
          background-position: 0% 50%;
        }

        50% {
          background-position: 100% 50%;
        }

        100% {
          background-position: 0% 50%;
        }
      }

      @keyframes dustFade {
        to {
          opacity: 0;

          transform: translateY(-20px) scale(0.5);
        }
      }

      /* ================= MOBILE ================= */
      @media (max-width: 600px) {
        body {
          font-size: 16px;
        }

        .navbar {
          height: auto;

          min-height: 60px;

          padding: 10px 12px;

          flex-direction: column;

          gap: 10px;
        }

        .navbar-content {
          width: 100%;

          justify-content: center;

          gap: 12px;

          flex-wrap: wrap;
        }

        .navbar a {
          font-size: 15px;
        }

        .nav-logo {
          width: 36px;
          height: 36px;
        }

        .toggle {
          transform: scale(0.9);
        }

        .main-content {
          margin-top: 60px;

          padding: 14px;
        }

        h1 {
          font-size: 24px !important;

          line-height: 1.2;
        }

        .chatbox ul {
          max-height: 400px;
        }

        .chat-input-area {
          flex-direction: column;
        }

        #user-input {
          width: 100%;
        }

        .game-link {
          width: 100%;

          height: 52px;

          font-size: 15px;
        }
        #full-article-btn {
          display: inline-flex;
          align-items: center;
          justify-content: center;

          vertical-align: middle;

          line-height: normal;

          padding-top: 0;
          padding-bottom: 0;
        }
        .cursor-glow {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <!-- ================= NAVBAR ================= -->
    <div class="navbar">
      <div class="navbar-content">
        <a href="/"><img src="/images/logo.png" class="nav-logo" /></a>

        <a href="/games">Games</a>

        <a href="/tools">Tools</a>

        <a href="/donatejk">Donate</a>

        <a href="/ai">Search</a>

        <a href="/downloadpage">Exhibit</a>
      </div>

      <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
      </div>
    </div>

    <!-- ================= MAIN ================= -->
    <div class="main-content">
      <h1>✦ Definition Finder {Beta} ✦</h1>

      <div class="chatbox">
        <ul id="chat-log">
          <li class="bot-msg">Type a word...</li>
        </ul>

        <div class="chat-input-area">
          <input type="text" id="user-input" placeholder="Type your word..." />

          <button class="game-link" id="ask-btn">Enter</button>

          <a
            class="game-link"
            id="full-article-btn"
            href="#"
            style="display: none"
          >
            Full Article
          </a>
        </div>
      </div>
    </div>

    <!-- ================= FX ================= -->

    <script>
      /* ================= DARK MODE ================= */
      const toggle = document.getElementById("toggle");

      const icon = document.getElementById("icon");

      if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("dark");

        toggle.classList.add("active");

        icon.textContent = "☀️";
      }

      toggle.onclick = () => {
        const isDark = document.body.classList.toggle("dark");

        toggle.classList.toggle("active");

        icon.textContent = isDark ? "☀️" : "🌙";

        localStorage.setItem("darkMode", isDark ? "on" : "off");
      };

      /* ================= CURSOR GLOW ================= */
      const glow = document.querySelector(".cursor-glow");

      document.addEventListener("mousemove", (e) => {
        glow.style.left = e.clientX + "px";

        glow.style.top = e.clientY + "px";
      });

      /* ================= ELEMENTS ================= */
      const askBtn = document.getElementById("ask-btn");

      const userInput = document.getElementById("user-input");

      const chatLog = document.getElementById("chat-log");

      const fullArticleBtn = document.getElementById("full-article-btn");

      const suggestionsBox = document.getElementById("suggestions");

      /* ================= AI STYLE ================= */
      function generateAnswer(query, text) {
        return "Answer:\n\n" + text;
      }

      async function search(query) {
        let parts = [];

        /* ================= EXPLAIN MODE ================= */
        const explainMode =
          /explain|elaborate|detail|in depth|tell me more|how does/i.test(
            query,
          );

        const cleanQuery = query
          .replace(
            /explain|elaborate|in detail|tell me more about|how does/gi,
            "",
          )
          .trim();

        /* ================= WIKIPEDIA ================= */
        try {
          const wikiRes = await fetch(
            `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(cleanQuery)}`,
          );

          const wikiData = await wikiRes.json();

          const badWiki =
            !wikiData.extract ||
            wikiData.extract.includes("may refer to") ||
            wikiData.extract.length < 40;

          if (!badWiki) {
            parts.push(wikiData.extract);

            fullArticleBtn.href = wikiData.content_urls.desktop.page;

            fullArticleBtn.style.display = "inline-flex";
          }
        } catch {}

        /* ================= DUCKDUCKGO ================= */
        try {
          const ddgRes = await fetch(
            `https://api.duckduckgo.com/?q=${encodeURIComponent(cleanQuery)}&format=json&no_redirect=1`,
          );

          const ddgData = await ddgRes.json();

          if (ddgData.AbstractText) {
            parts.push(ddgData.AbstractText);
          } else if (ddgData.RelatedTopics?.length) {
            parts.push(ddgData.RelatedTopics[0].Text);
          }
        } catch {}

        /* ================= EXTRA DETAIL ================= */
        if (explainMode) {
          try {
            const extraRes = await fetch(
              `https://api.duckduckgo.com/?q=${encodeURIComponent(cleanQuery + " detailed explanation how it works")}&format=json&no_redirect=1`,
            );

            const extraData = await extraRes.json();

            if (extraData.AbstractText) {
              parts.push(extraData.AbstractText);
            } else if (extraData.RelatedTopics?.length) {
              parts.push(extraData.RelatedTopics[0].Text);
            }
          } catch {}
        }

        /* ================= WIKIDATA ================= */
        if (explainMode) {
          try {
            const sparql = `
            SELECT ?item ?itemLabel ?desc WHERE {
              ?item rdfs:label "${cleanQuery}"@en.
              ?item schema:description ?desc.
              FILTER (lang(?desc) = "en")
              SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }
            }
            LIMIT 1`;

            const wdRes = await fetch(
              "https://query.wikidata.org/sparql?query=" +
                encodeURIComponent(sparql),
              {
                headers: {
                  Accept: "application/sparql-results+json",
                },
              },
            );

            const wdData = await wdRes.json();

            const desc = wdData?.results?.bindings?.[0]?.desc?.value;

            if (desc) {
              parts.push(desc);
            }
          } catch (e) {}
        }

        /* ================= DEEP SEARCH ================= */
        if (explainMode) {
          try {
            const deepRes = await fetch(
              `https://api.duckduckgo.com/?q=${encodeURIComponent(cleanQuery + " examples uses importance")}&format=json&no_redirect=1`,
            );

            const deepData = await deepRes.json();

            if (deepData.AbstractText) {
              parts.push(deepData.AbstractText);
            } else if (deepData.RelatedTopics?.length) {
              parts.push(deepData.RelatedTopics[0].Text);
            }
          } catch {}
        }

        /* ================= SMART DEDUPE ================= */
        function isSimilar(a, b) {
          a = a.toLowerCase();

          b = b.toLowerCase();

          return a.includes(b.slice(0, 60)) || b.includes(a.slice(0, 60));
        }

        function smartDeduplicate(arr) {
          const result = [];

          for (let i = 0; i < arr.length; i++) {
            let duplicate = false;

            for (let j = 0; j < result.length; j++) {
              if (isSimilar(arr[i], result[j])) {
                duplicate = true;

                break;
              }
            }

            if (!duplicate) {
              result.push(arr[i]);
            }
          }

          return result;
        }

        if (parts.length > 0) {
          const unique = smartDeduplicate(parts);

          return (
            (explainMode ? "Detailed Explanation:\n\n" : "Answer:\n\n") +
            unique.join("\n\n")
          );
        }

        /* ================= FALLBACK ================= */
        fullArticleBtn.style.display = "none";

        return `Answer:\n\nI couldn’t find a strong explanation for "${query}". Try being more specific.`;
      }

      /* ================= ASK ================= */
      askBtn.onclick = async () => {
        const query = userInput.value.trim();

        if (!query) return;

        if (suggestionsBox) {
          suggestionsBox.style.display = "none";
        }

        const li = document.createElement("li");

        li.className = "user-msg";

        li.textContent = query;

        chatLog.appendChild(li);

        const botLi = document.createElement("li");

        botLi.className = "bot-msg";

        botLi.textContent = "Thinking...";

        chatLog.appendChild(botLi);

        chatLog.scrollTop = chatLog.scrollHeight;

        const answer = await search(query);

        botLi.textContent = answer;

        userInput.value = "";
      };

      /* ================= AUTOCOMPLETE ================= */
      let debounceTimer;

      userInput.addEventListener("input", () => {
        if (!suggestionsBox) return;

        clearTimeout(debounceTimer);

        const query = userInput.value.trim();

        if (query.length < 2) {
          suggestionsBox.style.display = "none";

          return;
        }

        debounceTimer = setTimeout(async () => {
          try {
            const res = await fetch(`https://api.datamuse.com/sug?s=${query}`);

            const data = await res.json();

            suggestionsBox.innerHTML = "";

            data.slice(0, 5).forEach((item) => {
              const div = document.createElement("div");

              div.className = "suggestion";

              div.textContent = item.word;

              div.onclick = () => {
                userInput.value = item.word;

                suggestionsBox.style.display = "none";

                askBtn.click();
              };

              suggestionsBox.appendChild(div);
            });

            suggestionsBox.style.display = "block";
          } catch {
            suggestionsBox.style.display = "none";
          }
        }, 300);
      });

      /* ================= HIDE SUGGESTIONS ================= */
      document.addEventListener("click", (e) => {
        if (!e.target.closest(".chat-input-area")) {
          if (suggestionsBox) {
            suggestionsBox.style.display = "none";
          }
        }
      });
    </script>
  </body>
</html>
