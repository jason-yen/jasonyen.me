<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jasonyen.me</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/images/favicon.png">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Fredoka',sans-serif;}
body{
    font-family:'Fredoka', sans-serif;
    font-size:18px;
    line-height:1.6;
    background:#f5f6fa;
    color:#111;
    transition: background 0.4s,color 0.4s;
    overflow-x:hidden;
    padding-top:60px;
}

/* ================= NAVBAR ================= */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(20px);
    z-index:9999;
}
.navbar-content{
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}
.navbar a{
    color:#536DFE;
    text-decoration:none;
    font-size:18px;
    position:relative;
    white-space:nowrap;
}
.navbar a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-3px;
    width:0%;
    height:3px;
    background:#536DFE;
    border-radius:2px;
    transition:width 0.3s ease;
}
.navbar a:hover::after{ width:100%; }
.nav-logo{
    width:42px;
    height:42px;
    border-radius:12px;
    display:block;
    transition:transform 0.25s ease,box-shadow 0.25s ease;
}
.nav-logo:hover{ transform:scale(1.08); box-shadow:0 8px 18px rgba(0,0,0,0.25); }

/* ================= MAIN CONTENT ================= */
.main-content{
    margin-top:0;
    padding:20px;
}
h1{
    font-size:32px;
    margin-bottom:15px;
}

/* ================= CHATBOX ================= */
.chatbox{
    max-width:700px;
}
.chatbox ul{
    list-style:none;
    max-height:450px;
    overflow-y:auto;
    margin-bottom:10px;
}
.chatbox li{
    padding:12px;
    margin:6px 0;
    border-radius:8px;
    white-space:pre-wrap;
}
.user-msg{background:#d3f4ff;text-align:right;}
.bot-msg{background:#ececec;}
.bot-msg{
    font-size:15px;
    line-height:1.6;}

/* ================= INPUT & BUTTONS ================= */
.chat-input-area{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
#user-input{
    flex:1;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}
.game-link{
    display:inline-block;
    padding:12px 26px;
    background-color:#4c5eaf;
    color:white;
    border-radius:10px;
    font-size:18px;
    border:none;
    cursor:pointer;
    transition:transform 0.2s ease,box-shadow 0.2s ease;
}
.game-link:hover{
    transform:scale(1.05);
    box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

/* ================= DARK MODE ================= */
body.dark{
    color:#e6e6e6;
    background:linear-gradient(-45deg,#0f1117,#1a1f3a,#0f1117,#1c2240);
    background-size:400% 400%;
    animation:gradientMove 18s ease infinite;
}
body.dark .bot-msg{background:#2a2e44;}
body.dark .user-msg{background:#536DFE;}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ================= TOGGLE ================= */
.toggle{
    width:65px;height:34px;
    border-radius:50px;
    cursor:pointer;
    position:relative;
    background:#dcdde1;
    border:2px solid rgba(0,0,0,0.2);
}
body.dark .toggle{
    background:#2f3640;
    border:2px solid rgba(255,255,255,0.3);
}
.toggle.active{
    background:#536DFE;
    border:2px solid #536DFE;
    box-shadow:0 0 10px rgba(83,109,254,0.6);
}
.toggle-circle{
    width:28px;height:28px;
    background:white;
    position:absolute;
    top:1px;left:2px;
    border-radius:50%;
    transition:0.35s;
    display:flex;
    justify-content:center;
    align-items:center;
}
.toggle.active .toggle-circle{left:33px;}



@keyframes dustFade{to{opacity:0;transform:translateY(-20px) scale(0.5);}}

/* ================= MOBILE ================= */
@media(max-width:600px){
    .navbar{padding:0 15px;height:55px;}
    .navbar-content{gap:10px;flex-wrap:wrap;}
    h1{font-size:24px;}
    #user-input{flex:1;}
    .game-link{font-size:16px;padding:12px 20px;}
}
.chatbox li{
    font-size:15px;
    line-height:1.5;
}
</style>
</head>
<body>

<div class="navbar">
    <div class="navbar-content">
    <a href="/"><img src="/images/logo.png" class="nav-logo"></a>
        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
    </div>
    <div class="toggle" id="toggle"><div class="toggle-circle" id="icon">🌙</div></div>
</div>

<div class="main-content">
    <h1>Search Engine {Beta}<h1>
    <div class="chatbox">
        <ul id="chat-log">
            <li class="bot-msg">Ask me anything.</li>
        </ul>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type your question...">
            <button class="game-link" id="ask-btn">Ask</button>
            <a class="game-link" id="full-article-btn" href="#" style="display:none;">Full Article</a>
        </div>
    </div>
</div>

<div class="cursor-glow"></div>
<script>
// ===== DARK MODE =====
const toggle=document.getElementById("toggle");
const icon=document.getElementById("icon");
if(localStorage.getItem("darkMode")==="on"){
    document.body.classList.add("dark");
    toggle.classList.add("active");
    icon.textContent="☀️";
}
toggle.onclick=()=>{
    const isDark=document.body.classList.toggle("dark");
    toggle.classList.toggle("active");
    icon.textContent=isDark?"☀️":"🌙";
    localStorage.setItem("darkMode",isDark?"on":"off");
};

// ===== CURSOR GLOW =====
const glow=document.querySelector(".cursor-glow");
document.addEventListener("mousemove",e=>{
    glow.style.left=e.clientX+"px";
    glow.style.top=e.clientY+"px";
});

// ===== ELEMENTS =====
const askBtn=document.getElementById("ask-btn");
const userInput=document.getElementById("user-input");
const chatLog=document.getElementById("chat-log");
const fullArticleBtn=document.getElementById("full-article-btn");
const suggestionsBox=document.getElementById("suggestions");

// ===== AI STYLE =====
function generateAnswer(query,text){
    return "Answer:\n\n"+text;
}

async function search(query){
    let parts = [];

    // ===== detect "explain mode" =====
    const explainMode = /explain|elaborate|detail|in depth|tell me more|how does/i.test(query);

    // clean query (remove words like "explain")
    const cleanQuery = query
        .replace(/explain|elaborate|in detail|tell me more about|how does/gi,"")
        .trim();

    // ===== 1️⃣ WIKIPEDIA =====
    try{
        const wikiRes = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(cleanQuery)}`);
        const wikiData = await wikiRes.json();

        const badWiki =
            !wikiData.extract ||
            wikiData.extract.includes("may refer to") ||
            wikiData.extract.length < 40;

        if(!badWiki){
            parts.push(wikiData.extract);
            fullArticleBtn.href = wikiData.content_urls.desktop.page;
            fullArticleBtn.style.display = "inline-block";
        }
    }catch{}

    // ===== 2️⃣ DUCKDUCKGO =====
    try{
        const ddgRes = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(cleanQuery)}&format=json&no_redirect=1`);
        const ddgData = await ddgRes.json();

        if(ddgData.AbstractText){
            parts.push(ddgData.AbstractText);
        } 
        else if(ddgData.RelatedTopics?.length){
            parts.push(ddgData.RelatedTopics[0].Text);
        }
    }catch{}

    // ===== 3️⃣ EXTRA DETAIL (only if explain mode) =====
    if(explainMode){
        try{
            const extraRes = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(cleanQuery + " detailed explanation how it works")}&format=json&no_redirect=1`);
            const extraData = await extraRes.json();

            if(extraData.AbstractText){
                parts.push(extraData.AbstractText);
            } 
            else if(extraData.RelatedTopics?.length){
                parts.push(extraData.RelatedTopics[0].Text);
            }
        }catch{}
    }
    // ===== 3️⃣ WIKIDATA (DEEP EXPLANATIONS) =====
    if (explainMode) {
        try {
            const sparql = `
            SELECT ?item ?itemLabel ?desc WHERE {
              ?item rdfs:label "${cleanQuery}"@en.
              ?item schema:description ?desc.
              FILTER (lang(?desc) = "en")
              SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }
            }
            LIMIT 1`;

            const wdRes = await fetch(
                "https://query.wikidata.org/sparql?query=" +
                encodeURIComponent(sparql),
                {
                    headers: {
                        "Accept": "application/sparql-results+json"
                    }
                }
            );

            const wdData = await wdRes.json();

            const desc = wdData?.results?.bindings?.[0]?.desc?.value;
            if (desc) {
                parts.push(desc);
            }

        } catch (e) {}
    }
    // ===== 4️⃣ EVEN MORE DEPTH (second pass if explain mode) =====
    if(explainMode){
        try{
            const deepRes = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(cleanQuery + " examples uses importance")}&format=json&no_redirect=1`);
            const deepData = await deepRes.json();

            if(deepData.AbstractText){
                parts.push(deepData.AbstractText);
            } 
            else if(deepData.RelatedTopics?.length){
                parts.push(deepData.RelatedTopics[0].Text);
            }
        }catch{}
    }

// ===== FINAL MERGE (SMART DEDUPE) =====
function isSimilar(a, b) {
    a = a.toLowerCase();
    b = b.toLowerCase();

    // if one contains most of the other → treat as duplicate
    return a.includes(b.slice(0, 60)) || b.includes(a.slice(0, 60));
}

function smartDeduplicate(arr) {
    const result = [];

    for (let i = 0; i < arr.length; i++) {
        let duplicate = false;

        for (let j = 0; j < result.length; j++) {
            if (isSimilar(arr[i], result[j])) {
                duplicate = true;
                break;
            }
        }

        if (!duplicate) result.push(arr[i]);
    }

    return result;
}

if (parts.length > 0) {
    const unique = smartDeduplicate(parts);

    return (explainMode ? "Detailed Explanation:\n\n" : "Answer:\n\n")
        + unique.join("\n\n");
}

    // ===== FALLBACK =====
    fullArticleBtn.style.display = "none";
    return `Answer:\n\nI couldn’t find a strong explanation for "${query}". Try being more specific.`;
}

// ===== ASK =====
askBtn.onclick=async()=>{
    const query=userInput.value.trim();
    if(!query) return;

    if(suggestionsBox) suggestionsBox.style.display="none";

    const li=document.createElement("li");
    li.className="user-msg";
    li.textContent=query;
    chatLog.appendChild(li);

    const botLi=document.createElement("li");
    botLi.className="bot-msg";
    botLi.textContent="Thinking...";
    chatLog.appendChild(botLi);

    chatLog.scrollTop=chatLog.scrollHeight;

    const answer=await search(query);
    botLi.textContent=answer;

    userInput.value="";
};

// ===== AUTOCOMPLETE =====
let debounceTimer;

userInput.addEventListener("input",()=>{
    if(!suggestionsBox) return;

    clearTimeout(debounceTimer);

    const query=userInput.value.trim();
    if(query.length<2){
        suggestionsBox.style.display="none";
        return;
    }

    debounceTimer=setTimeout(async()=>{
        try{
            const res=await fetch(`https://api.datamuse.com/sug?s=${query}`);
            const data=await res.json();

            suggestionsBox.innerHTML="";

            data.slice(0,5).forEach(item=>{
                const div=document.createElement("div");
                div.className="suggestion";
                div.textContent=item.word;

                div.onclick=()=>{
                    userInput.value=item.word;
                    suggestionsBox.style.display="none";
                    askBtn.click();
                };

                suggestionsBox.appendChild(div);
            });

            suggestionsBox.style.display="block";

        }catch{
            suggestionsBox.style.display="none";
        }
    },300);
});

// Hide suggestions
document.addEventListener("click",(e)=>{
    if(!e.target.closest(".chat-input-area")){
        if(suggestionsBox) suggestionsBox.style.display="none";
    }
});
</script>

</body>
</html>
