<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret</title>
</head>

<body style="font-family:Fredoka,sans-serif;text-align:center;padding-top:100px;">

<h1>🔒 Protected Page</h1>
<p id="status">Checking access...</p>

<script>
const code = localStorage.getItem("secureCode");

if(!code){
    document.body.innerHTML = "<h1>Access Denied</h1>";
} else {
    document.getElementById("status").innerText = "Access Granted 🎉";
}
</script>

</body>
</html>
