<!doctype html>
<html lang="en">
  <head>
    <!-- ================= META ================= -->
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ================= TITLE ================= -->
    <title>jasonyen.me</title>

    <!-- ================= FONTS ================= -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- ================= FAVICON ================= -->
    <link rel="icon" type="image/png" href="/images/favicon.png" />
<head>
  <div class="cursor"></div>
</head>
    <style>
      body {
  cursor: none;
}

.cursor {
  position: fixed;
  width: 12px;
  height: 12px;
  border: 2px solid #fff;
  border-radius: 50%;
  background: transparent;
  pointer-events: none;
  z-index: 2147483647;
  transform: translate(-50%, -50%);
}
      /* ================= GLOBAL ================= */
      * {
        box-sizing: border-box;

        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Fredoka", sans-serif;

        font-size: 18px;

        line-height: 1.6;

        background-color: #f5f6fa;

        overflow-x: hidden;

        transition:
          background 0.4s,
          color 0.4s;
      }

      /* ================= NAVBAR ================= */
      .navbar {
        position: fixed;

        top: 0;

        width: 100%;
        height: 60px;

        display: flex;
        align-items: center;
        justify-content: space-between;

        padding: 0 20px;

        background: rgba(255, 255, 255, 0.2);

        backdrop-filter: blur(20px);

        z-index: 9999;

        transition:
          background 0.4s ease,
          box-shadow 0.4s ease;
      }

      .navbar-content {
        display: flex;
        align-items: center;

        gap: 20px;

        flex-wrap: wrap;
      }

      .navbar a {
        color: #536dfe;

        text-decoration: none;

        font-size: 18px;

        position: relative;

        white-space: nowrap;
      }

      .navbar a::after {
        content: "";

        position: absolute;

        left: 0;
        bottom: -3px;

        width: 0%;
        height: 3px;

        background: #536dfe;

        border-radius: 2px;

        transition: width 0.3s ease;
      }

      .navbar a:hover::after {
        width: 100%;
      }

      /* ================= LOGO ================= */
      .nav-logo {
        width: 42px;
        height: 42px;

        border-radius: 12px;

        display: block;

        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
      }

      .nav-logo:hover {
        transform: scale(1.08);

        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
      }

      /* ================= MAIN ================= */
      .main-content {
        margin-top: 80px;

        padding: 20px;
      }

      h1 {
        font-size: clamp(28px, 4vw, 42px);

        line-height: 1.15;

        letter-spacing: -1px;

        font-weight: 600;

        margin-bottom: 24px;

        background: linear-gradient(135deg, #536dfe, #8f9fff, #ffffff);

        -webkit-background-clip: text;

        -webkit-text-fill-color: transparent;
      }

      /* ================= SECTION ================= */
      .section {
        margin-bottom: 30px;

        padding-bottom: 16px;

        border-bottom: 2px solid rgba(0, 0, 0, 0.1);

        transition:
          transform 0.35s ease,
          background 0.35s ease;
      }

      .section:hover {
        transform: translateY(-3px);
      }

      body.dark .section {
        border-bottom: 2px solid rgba(255, 255, 255, 0.25);
      }

      /* ================= BUTTONS ================= */
      .game-link {
        position: relative;

        overflow: hidden;

        display: inline-flex;
        align-items: center;
        justify-content: center;

        min-width: 150px;
        height: 56px;

        margin: 12px 10px 0 0;

        padding: 0 24px;

        border-radius: 14px;

        border: none;

        cursor: pointer;

        background: linear-gradient(
          135deg,
          rgba(83, 109, 254, 0.95),
          rgba(120, 140, 255, 0.95)
        );

        color: white;

        text-decoration: none;

        font-size: 16px;

        font-weight: 500;

        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease,
          filter 0.25s ease;

        box-shadow: 0 10px 30px rgba(83, 109, 254, 0.25);
      }

      .game-link::before {
        content: "";

        position: absolute;

        inset: 0;

        background: linear-gradient(
          120deg,
          transparent,
          rgba(255, 255, 255, 0.25),
          transparent
        );

        transform: translateX(-120%);

        transition: transform 0.7s ease;
      }

      .game-link:hover::before {
        transform: translateX(120%);
      }

      .game-link:hover {
        transform: translateY(-4px) scale(1.03);

        filter: brightness(1.08);

        box-shadow: 0 18px 40px rgba(83, 109, 254, 0.4);
      }

      /* ================= INPUT ================= */
      .code-input {
        margin-top: 16px;

        padding: 14px 16px;

        width: 260px;

        border: 1px solid rgba(0, 0, 0, 0.12);

        border-radius: 14px;

        outline: none;

        background: rgba(255, 255, 255, 0.75);

        backdrop-filter: blur(12px);

        font-size: 16px;

        transition:
          border 0.25s ease,
          box-shadow 0.25s ease,
          background 0.25s ease;
      }

      .code-input:focus {
        border: 1px solid rgba(83, 109, 254, 0.45);

        box-shadow: 0 0 0 4px rgba(83, 109, 254, 0.12);
      }

      /* ================= CODE BOX ================= */
      .code-box {
        margin-top: 18px;

        width: 240px;

        padding: 14px;

        border-radius: 16px;

        background: rgba(15, 23, 42, 0.95);

        color: white;

        font-size: 30px;

        letter-spacing: 4px;

        text-align: center;

        box-shadow:
          0 12px 40px rgba(0, 0, 0, 0.25),
          inset 0 1px rgba(255, 255, 255, 0.06);

        backdrop-filter: blur(12px);
      }

      /* ================= DARK MODE ================= */
      body.dark {
        color: #e6e6e6;

        background: linear-gradient(-45deg, #0f1117, #1a1f3a, #0f1117, #1c2240);

        background-size: 400% 400%;

        animation: gradientMove 18s ease infinite;
      }

      @keyframes gradientMove {
        0% {
          background-position: 0% 50%;
        }

        50% {
          background-position: 100% 50%;
        }

        100% {
          background-position: 0% 50%;
        }
      }

      /* ================= TOGGLE ================= */
      .toggle {
        width: 65px;
        height: 34px;

        border-radius: 50px;

        cursor: pointer;

        position: relative;

        background: #dcdde1;

        border: 2px solid rgba(0, 0, 0, 0.2);
      }

      body.dark .toggle {
        background: #2f3640;

        border: 2px solid rgba(255, 255, 255, 0.3);
      }

      .toggle.active {
        background: #536dfe;

        border: 2px solid #536dfe;

        box-shadow: 0 0 10px rgba(83, 109, 254, 0.6);
      }

      .toggle-circle {
        width: 28px;
        height: 28px;

        background: white;

        position: absolute;

        top: 1px;
        left: 2px;

        border-radius: 50%;

        transition: 0.35s;

        display: flex;
        align-items: center;
        justify-content: center;

        font-size: 14px;
      }

      .toggle.active .toggle-circle {
        left: 33px;
      }

      /* ================= PARTICLES ================= */
      .particle {
        position: fixed;

        width: 5px;
        height: 5px;

        border-radius: 50%;

        background: rgba(255, 255, 255, 0.15);

        animation: floatUp linear infinite;
      }

      @keyframes floatUp {
        from {
          transform: translateY(100vh);
        }

        to {
          transform: translateY(-10vh);
        }
      }

      /* ================= FX ================= */
      .cursor-glow {
        position: fixed;

        width: 250px;
        height: 250px;

        background: radial-gradient(
          circle,
          rgba(83, 109, 254, 0.25),
          transparent 70%
        );

        pointer-events: none;

        transform: translate(-50%, -50%);

        z-index: -1;
      }

      @keyframes dustFade {
        to {
          opacity: 0;

          transform: translateY(-20px) scale(0.5);
        }
      }

      /* ================= MOBILE ================= */
      @media (max-width: 600px) {
        body {
          font-size: 16px;
        }

        .navbar {
          height: auto;

          min-height: 60px;

          padding: 10px 12px;

          flex-direction: column;

          gap: 10px;
        }

        .navbar-content {
          width: 100%;

          justify-content: center;

          gap: 12px;

          flex-wrap: wrap;
        }

        .navbar a {
          font-size: 15px;
        }

        .nav-logo {
          width: 36px;
          height: 36px;
        }

        .toggle {
          transform: scale(0.9);
        }

        .main-content {
          margin-top: 120px;

          padding: 14px;
        }

        h1 {
          font-size: 26px !important;

          line-height: 1.2;
        }

        .game-link {
          width: 100%;

          height: 52px;

          margin: 10px 0;

          font-size: 15px;
        }

        .code-input {
          width: 100%;
        }

        .code-box {
          width: 100%;
        }

        .cursor-glow,
        .dust {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <!-- ================= NAVBAR ================= -->
    <div class="navbar">
      <div class="navbar-content">
        <a href="/"><img src="/images/logo.png" class="nav-logo" /></a>

        <a href="/games">Games</a>

        <a href="/tools">Tools</a>

        <a href="/donatejk">Donate</a>

        <a href="/ai">Search</a>

        <a href="/downloadpage">Exhibit</a>
      </div>

      <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
      </div>
    </div>

    <!-- ================= MAIN ================= -->
    <div class="main-content">
      <h1>✦ Enter Access Code ✦</h1>

      <div class="section">
        <strong>Generate Code:</strong>

        <br />

        <div class="game-link" onclick="generateCode()">Generate</div>

        <div class="code-box" id="codeDisplay">------</div>
      </div>

      <div class="section">
        <strong>Enter Code:</strong>

        <br />

        <input class="code-input" id="codeInput" placeholder="Enter code" />

        <br />

        <div class="game-link" onclick="checkCode()">Enter</div>
      </div>
    </div>

    <!-- ================= FX ================= -->
    <div class="cursor-glow"></div>

    <script>
      /* ================= GENERATE CODE ================= */
      function generateCode() {
        const code = Math.floor(100000 + Math.random() * 900000).toString();

        localStorage.setItem("secureCode", code);

        document.getElementById("codeDisplay").innerText = code;
      }

      /* ================= CHECK CODE ================= */
      function checkCode() {
        const input = document.getElementById("codeInput").value.trim();

        const stored = localStorage.getItem("secureCode");

        if (input === stored) {
          const newPage = window.open("about:blank", "_blank");

          newPage.document.open();

          newPage.document.write(`
          THIS IS AN UNSECURE ABOUT:BLANK PAGE.
`);

          newPage.document.close();
        } else {
          alert("Wrong code");
        }
      }

      /* ================= ENTER KEY ================= */
      document.getElementById("codeInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          checkCode();
        }
      });

      /* ================= DARK MODE ================= */
      const toggle = document.getElementById("toggle");

      const icon = document.getElementById("icon");

      if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("dark");

        toggle.classList.add("active");

        icon.textContent = "☀️";
      }

      toggle.onclick = () => {
        document.body.classList.toggle("dark");

        toggle.classList.toggle("active");

        if (document.body.classList.contains("dark")) {
          icon.textContent = "☀️";

          localStorage.setItem("darkMode", "on");
        } else {
          icon.textContent = "🌙";

          localStorage.setItem("darkMode", "off");
        }
      };

const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
    </script>
  </body>
</html>
