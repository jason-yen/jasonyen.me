<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Code | jasonyen.me</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/images/favicon.png">

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
*{box-sizing:border-box;margin:0;padding:0;}

body{
    font-family:'Fredoka',sans-serif;
    font-size:18px;
    background-color:#f5f6fa;
    overflow-x:hidden;
    transition: background 0.4s,color 0.4s;
    line-height:1.6;
}

/* NAVBAR */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(20px);
    z-index:9999;
}

.navbar-content{
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.navbar a{
    color:#536DFE;
    text-decoration:none;
    font-size:18px;
    position:relative;
    white-space:nowrap;
}

.navbar a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-3px;
    width:0%;
    height:3px;
    background:#536DFE;
    border-radius:2px;
    transition:width 0.3s ease;
}

.navbar a:hover::after{
    width:100%;
}

.nav-logo{
    width:42px;
    height:42px;
    border-radius:12px;
    display:block;
    transition:transform 0.25s ease,box-shadow 0.25s ease;
}

.nav-logo:hover{
    transform:scale(1.08);
    box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

/* MAIN */
.main-content{
    margin-top:80px;
    padding:20px;
}

h1{
    font-size:36px;
    margin-bottom:20px;
}

/* SECTION */
.section{
    margin-bottom:30px;
    padding-bottom:10px;
    border-bottom:2px solid rgba(0,0,0,0.1);
}

body.dark .section{
    border-bottom:2px solid rgba(255,255,255,0.25);
}

/* BUTTON */
.game-link{
    display:inline-block;
    margin:10px 10px 0 0;
    padding:12px 24px;
    background-color:#4c5eaf;
    color:white;
    border-radius:10px;
    text-decoration:none;
    font-size:18px;
    transition:transform 0.2s ease,box-shadow 0.2s ease;
    cursor:pointer;
}
.game-link:hover{
    transform:scale(1.05);
    box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

/* INPUT */
.code-input{
    margin-top:15px;
    padding:12px;
    width:250px;
    border-radius:10px;
    border:none;
    outline:none;
    font-size:16px;
}

/* CODE BOX */
.code-box{
    margin-top:15px;
    font-size:28px;
    padding:12px;
    width:220px;
    border-radius:10px;
    background:#0f172a;
    color:white;
    letter-spacing:3px;
}

/* DARK MODE */
body.dark{
    color:#e6e6e6;
    background:linear-gradient(-45deg,#0f1117,#1a1f3a,#0f1117,#1c2240);
    background-size:400% 400%;
    animation:gradientMove 18s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* TOGGLE */
.toggle{
    width:65px;
    height:34px;
    border-radius:50px;
    cursor:pointer;
    position:relative;
    background:#dcdde1;
    border:2px solid rgba(0,0,0,0.2);
}

body.dark .toggle{
    background:#2f3640;
    border:2px solid rgba(255,255,255,0.3);
}

.toggle.active{
    background:#536DFE;
    border:2px solid #536DFE;
    box-shadow:0 0 10px rgba(83,109,254,0.6);
}

.toggle-circle{
    width:28px;
    height:28px;
    background:white;
    position:absolute;
    top:1px;
    left:2px;
    border-radius:50%;
    transition:0.35s;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:14px;
}

.toggle.active .toggle-circle{
    left:33px;
}

 

@keyframes dustFade{
    to{opacity:0;transform:translateY(-20px) scale(0.5);}
}

.particle{
    position:fixed;
    width:5px;height:5px;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    animation:floatUp linear infinite;
}

@keyframes floatUp{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

/* MOBILE */
@media (max-width:600px){
    .navbar{height:55px;padding:0 15px;}
    .navbar a{font-size:16px;}
    .main-content{margin-top:70px;padding:15px;}
    h1{font-size:28px;}
    .game-link{font-size:16px;padding:10px 18px;}
    .cursor-glow,.dust{display:none;}
}
</style>
</head>

<body>

<div class="navbar">
  <div class="navbar-content">
    <a href="/"><img src="/images/logo.png" class="nav-logo"></a>
    <a href="/games">Games</a>
    <a href="/tools">Tools</a>
    <a href="/donatejk">Donate</a>
    <a href="/ai">Search</a>
      <a href="/downloadpage">Exhibit</a>
  </div>
    <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
    </div>
</div>

<div class="main-content">
    <h1>Enter Access Code</h1>

    <div class="section">
        <strong>Generate Code:</strong><br>
        <div class="game-link" onclick="generateCode()">Generate</div>
        <div class="code-box" id="codeDisplay">------</div>
    </div>

    <div class="section">
        <strong>Enter Code:</strong><br>
        <input class="code-input" id="codeInput" placeholder="Enter code">
        <br>
        <div class="game-link" onclick="checkCode()">Enter</div>
    </div>
</div>

<script>
function generateCode(){
    const code = Math.floor(100000 + Math.random()*900000).toString();
    localStorage.setItem("secureCode", code);
    document.getElementById("codeDisplay").innerText = code;
}

function checkCode(){
    const input = document.getElementById("codeInput").value.trim();
    const stored = localStorage.getItem("secureCode");

    if(input === stored){
        const newPage = window.open("", "_blank");

        newPage.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
        <meta charset="UTF-8">
        <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
        <style>${document.querySelector("style").innerHTML}</style>
        </head>
        <body>

        ${document.querySelector(".navbar").outerHTML}

        <div class="main-content">
            <h1>Welcome!</h1>
            <div class="section">
                <p>Your code <strong>${stored}</strong> worked! This is your new page.</p>
            </div>
        </div>

        <script>
        window.onload = function(){
            const toggle = document.getElementById('toggle');
            const icon = document.getElementById('icon');

            if(localStorage.getItem("darkMode")==="on"){
                document.body.classList.add("dark");
                toggle.classList.add("active");
                icon.textContent="☀️";
            }

            toggle.onclick=()=>{
                document.body.classList.toggle("dark");
                toggle.classList.toggle("active");
                if(document.body.classList.contains("dark")){
                    icon.textContent="☀️";
                    localStorage.setItem("darkMode","on");
                } else {
                    icon.textContent="🌙";
                    localStorage.setItem("darkMode","off");
                }
            };

            const glow=document.createElement("div");
            glow.className="cursor-glow";
            document.body.appendChild(glow);

            document.addEventListener("mousemove",e=>{
                glow.style.left=e.clientX+"px";
                glow.style.top=e.clientY+"px";
            });

            for(let i=0;i<25;i++){
                let p=document.createElement("div");
                p.className="particle";
                p.style.left=Math.random()*100+"vw";
                p.style.animationDuration=(12+Math.random()*18)+"s";
                document.body.appendChild(p);
            }
        };
        <\/script>

        </body>
        </html>
        `);

        newPage.document.close();

    } else {
        alert("Wrong code");
    }
}

/* ENTER KEY */
document.getElementById("codeInput").addEventListener("keypress", e=>{
    if(e.key === "Enter") checkCode();
});

/* DARK MODE (main page) */
const toggle = document.getElementById("toggle");
const icon = document.getElementById("icon");

if(localStorage.getItem("darkMode")==="on"){
    document.body.classList.add("dark");
    toggle.classList.add("active");
    icon.textContent="☀️";
}

toggle.onclick=()=>{
    document.body.classList.toggle("dark");
    toggle.classList.toggle("active");
    if(document.body.classList.contains("dark")){
        icon.textContent="☀️";
        localStorage.setItem("darkMode","on");
    } else {
        icon.textContent="🌙";
        localStorage.setItem("darkMode","off");
    }
};
</script>

</body>
</html>
