<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enter Code | jasonyen.me</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/images/favicon.png" />

    <style>
      /* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Fredoka", sans-serif;
        font-size: 18px;
        background-color: #f5f6fa;
        overflow-x: hidden;
        transition:
          background 0.4s,
          color 0.4s;
        line-height: 1.6;
      }

      /* NAVBAR */
      .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(20px);
        z-index: 9999;
      }

      .navbar-content {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .navbar a {
        color: #536dfe;
        text-decoration: none;
        font-size: 18px;
        position: relative;
        white-space: nowrap;
      }

      .navbar a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -3px;
        width: 0%;
        height: 3px;
        background: #536dfe;
        border-radius: 2px;
        transition: width 0.3s ease;
      }

      .navbar a:hover::after {
        width: 100%;
      }

      .nav-logo {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        display: block;
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
      }

      .nav-logo:hover {
        transform: scale(1.08);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
      }

      /* MAIN */
      .main-content {
        margin-top: 80px;
        padding: 20px;
      }

      h1 {
        font-size: 36px;
        margin-bottom: 20px;
      }

      /* SECTION */
      .section {
        margin-bottom: 30px;
        padding-bottom: 10px;
        border-bottom: 2px solid rgba(0, 0, 0, 0.1);
      }

      body.dark .section {
        border-bottom: 2px solid rgba(255, 255, 255, 0.25);
      }

      /* BUTTON */
      .game-link {
        display: inline-block;
        margin: 10px 10px 0 0;
        padding: 12px 24px;
        background-color: #4c5eaf;
        color: white;
        border-radius: 10px;
        text-decoration: none;
        font-size: 18px;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        cursor: pointer;
      }
      .game-link:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
      }

      /* INPUT */
      .code-input {
        margin-top: 15px;
        padding: 12px;
        width: 250px;
        border-radius: 10px;
        border: none;
        outline: none;
        font-size: 16px;
      }

      /* CODE BOX */
      .code-box {
        margin-top: 15px;
        font-size: 28px;
        padding: 12px;
        width: 220px;
        border-radius: 10px;
        background: #0f172a;
        color: white;
        letter-spacing: 3px;
      }

      /* DARK MODE */
      body.dark {
        color: #e6e6e6;
        background: linear-gradient(-45deg, #0f1117, #1a1f3a, #0f1117, #1c2240);
        background-size: 400% 400%;
        animation: gradientMove 18s ease infinite;
      }

      @keyframes gradientMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* TOGGLE */
      .toggle {
        width: 65px;
        height: 34px;
        border-radius: 50px;
        cursor: pointer;
        position: relative;
        background: #dcdde1;
        border: 2px solid rgba(0, 0, 0, 0.2);
      }

      body.dark .toggle {
        background: #2f3640;
        border: 2px solid rgba(255, 255, 255, 0.3);
      }

      .toggle.active {
        background: #536dfe;
        border: 2px solid #536dfe;
        box-shadow: 0 0 10px rgba(83, 109, 254, 0.6);
      }

      .toggle-circle {
        width: 28px;
        height: 28px;
        background: white;
        position: absolute;
        top: 1px;
        left: 2px;
        border-radius: 50%;
        transition: 0.35s;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 14px;
      }

      .toggle.active .toggle-circle {
        left: 33px;
      }

      @keyframes dustFade {
        to {
          opacity: 0;
          transform: translateY(-20px) scale(0.5);
        }
      }

      .particle {
        position: fixed;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        animation: floatUp linear infinite;
      }

      @keyframes floatUp {
        from {
          transform: translateY(100vh);
        }
        to {
          transform: translateY(-10vh);
        }
      }

      /* MOBILE */
      @media (max-width: 600px) {
        .navbar {
          height: 55px;
          padding: 0 15px;
        }
        .navbar a {
          font-size: 16px;
        }
        .main-content {
          margin-top: 70px;
          padding: 15px;
        }
        h1 {
          font-size: 28px;
        }
        .game-link {
          font-size: 16px;
          padding: 10px 18px;
        }
        .cursor-glow,
        .dust {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="navbar">
      <div class="navbar-content">
        <a href="/"><img src="/images/logo.png" class="nav-logo" /></a>
        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
        <a href="/downloadpage">Exhibit</a>
      </div>
      <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
      </div>
    </div>

    <div class="main-content">
      <h1>Enter Access Code</h1>

      <div class="section">
        <strong>Generate Code:</strong><br />
        <div class="game-link" onclick="generateCode()">Generate</div>
        <div class="code-box" id="codeDisplay">------</div>
      </div>

      <div class="section">
        <strong>Enter Code:</strong><br />
        <input class="code-input" id="codeInput" placeholder="Enter code" />
        <br />
        <div class="game-link" onclick="checkCode()">Enter</div>
      </div>
    </div>

    <script>
      function generateCode() {
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        localStorage.setItem("secureCode", code);
        document.getElementById("codeDisplay").innerText = code;
      }

      function checkCode() {
        const input = document.getElementById("codeInput").value.trim();
        const stored = localStorage.getItem("secureCode");

        if (input === stored) {
          const newPage = window.open("about:blank", "_blank");

          newPage.document.open();
          newPage.document.write(`
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beta Unblockable Game</title>
<style>
  body { margin:0; overflow:hidden; background:#111; }
  canvas { display:block; background:#1a1a1a; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let W = c.width = innerWidth;
let H = c.height = innerHeight;

const p = {
  x: 100,
  y: H - 140,
  s: 40,
  vy: 0,
  g: 0.55,
  j: -15.2,
  on: true
};

const MAX = 50;
const o = Array.from({length: MAX}, () => ({
  x: -9999, y: 0, s: 40, a: false
}));

let head = 0;
let lastSpawnX = W;

let frame = 0;
let over = 0;
let coyote = 0;

let start = performance.now();
let time = 0;

let enter = 0;

let flash = 0;
let nextFlash = performance.now() + 12000;

addEventListener("keydown", e=>{
  if(e.code==="Space") over ? reset() : jump();
  if(e.code==="Enter") enter = 1;
});
addEventListener("keyup", e=>{
  if(e.code==="Enter") enter = 0;
});
addEventListener("mousedown", ()=> over ? reset() : jump());

function jump(){
  if(p.on || coyote>0){
    p.vy = p.j;
    p.on = false;
    coyote = 0;
  }
}

function reset(){
  for(let i=0;i<MAX;i++) o[i].a = 0;
  p.y = H - 140;
  p.vy = 0;
  over = 0;
  start = performance.now();
  lastSpawnX = W;
}

function add(x,y){
  const obj = o[head];
  obj.x = x;
  obj.y = y;
  obj.a = true;
  obj.s = 40;
  head = (head + 1) % MAX;
}

function spawn(){
  const base = H - 140;
  const gap = 180 + Math.random()*120;
  const x = lastSpawnX + gap;
  lastSpawnX = x;

  const r = Math.random();

  if(r < 0.5){
    add(x, base);
  }
  else if(r < 0.8){
    add(x, base);
    add(x + 45, base);
  }
  else{
    add(x, base);
    add(x + 40, base);
    add(x + 80, base);
  }
}

function spike(x,y,s){
  ctx.beginPath();
  ctx.moveTo(x, y+s);
  ctx.lineTo(x + s/2, y);
  ctx.lineTo(x + s, y+s);
  ctx.closePath();
  ctx.fill();
}

function loop(t){
  const now = t;

  if(!flash && now > nextFlash){
    flash = 1;
  }
  if(flash && now > nextFlash + 400){
    flash = 0;
    nextFlash = now + 12000 + Math.random()*8000;
  }

  const shake = flash ? 8 : 0;

  ctx.setTransform(1,0,0,1,
    shake*(Math.random()-0.5),
    shake*(Math.random()-0.5)
  );

  ctx.clearRect(0,0,W,H);

  ctx.fillStyle = "#0f0";
  ctx.fillRect(0,H-100,W,5);

  if(!over){
    frame++;

    time = ((now-start)*0.001).toFixed(2);

    p.vy += p.g;
    p.y += p.vy;

    if(p.y >= H-140){
      p.y = H-140;
      p.vy = 0;
      p.on = true;
      coyote = 8;
    } else if(coyote > 0){
      coyote--;
    }

    if((frame % 85) === 0) spawn();

    ctx.fillStyle = "#ff3b3b";

    for(let i=0;i<MAX;i++){
      const b = o[i];
      if(!b.a) continue;

      b.x -= 5;

      spike(b.x,b.y,b.s);

      if(!enter &&
         p.x < b.x+b.s &&
         p.x+p.s > b.x &&
         p.y < b.y+b.s &&
         p.y+p.s > b.y){
        over = 1;
      }

      if(b.x < -80) b.a = false;
    }
  }

  ctx.fillStyle = enter ? "#ffd700" : "#00e5ff";
  ctx.fillRect(p.x,p.y,p.s,p.s);

  ctx.fillStyle = "#fff";
  ctx.font = "20px Arial";
  ctx.fillText("Time: " + time + "s", 20, 40);

  if(over){
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    ctx.font = "50px Arial";
    ctx.fillText("GAME OVER", W/2, H/2);
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
<\/script>

</body>
</html>
`);
          newPage.document.close();
        } else {
          alert("Wrong code");
        }
      }

      /* ENTER KEY */
      document.getElementById("codeInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") checkCode();
      });

      /* DARK MODE (main page) */
      const toggle = document.getElementById("toggle");
      const icon = document.getElementById("icon");

      if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("dark");
        toggle.classList.add("active");
        icon.textContent = "☀️";
      }

      toggle.onclick = () => {
        document.body.classList.toggle("dark");
        toggle.classList.toggle("active");
        if (document.body.classList.contains("dark")) {
          icon.textContent = "☀️";
          localStorage.setItem("darkMode", "on");
        } else {
          icon.textContent = "🌙";
          localStorage.setItem("darkMode", "off");
        }
      };
    </script>
  </body>
</html>
