<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jasonyen.me</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/images/favicon.png" />
    <style>
      /* ================= FOOTER ================= */
      /* ================= LAYOUT FIX (sticky footer) ================= */
      .footer {
        margin-top: 80px;
        padding: 80px 20px 40px;

        background: linear-gradient(
          to bottom,
          transparent 0%,
          rgba(212, 220, 251, 0.5) 25%,
          #d4dcfb 55%,
          #cfd8ff 100%
        );

        color: #111;
        text-align: center;
        font-family: "Spectral", serif;
        font-size: 15px;
        line-height: 1.7;
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(6px);
      }

      /* animated glow line */
      .footer::before {
        content: "";
        position: absolute;
        top: 0;
        left: -50%;
        width: 200%;
        height: 2px;

        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 200, 255, 0.6),
          rgba(180, 120, 255, 0.6),
          transparent
        );

        animation: footerGlow 6s linear infinite;
        will-change: transform;
      }

      @keyframes footerGlow {
        0% {
          transform: translateX(-25%);
        }
        100% {
          transform: translateX(25%);
        }
      }

      /* links */
      .footer a {
        color: #444;
        text-decoration: none;
        margin: 0 6px;
        transition: color 0.25s ease;
      }

      .footer a:hover {
        color: #000;
      }

      /* ================= DARK MODE ================= */
      body.dark .footer {
        background: #000;
        color: #fff;
      }

      body.dark .footer a {
        color: #aaa;
      }
      body.dark .footer a:hover {
        color: #fff;
      }

      body.dark .footer::before {
        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 200, 255, 0.7),
          rgba(180, 120, 255, 0.7),
          transparent
        );
      }

      /* ================= GLOBAL ================= */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Fredoka", sans-serif;
        font-size: 18px;
        background-color: #f5f6fa;
        overflow-x: hidden;
        transition:
          background 0.4s,
          color 0.4s;
        line-height: 1.6;
      }

      /* ================= DISABLE ON MOBILE ================= */
      @media (max-width: 600px) {
        body::before,
        body::after {
          display: none;
        }
      }

      /* ================= DISABLE FRAME ON MOBILE (SAFE) ================= */
      @media (max-width: 600px) {
        body::before,
        body::after {
          content: none !important;
        }
      }

      /* ================= NAVBAR ================= */
      .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(20px);
        z-index: 9999;
      }

      .navbar-content {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .navbar a {
        color: #536dfe;
        text-decoration: none;
        font-size: 18px;
        position: relative;
        white-space: nowrap;
      }

      .navbar a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -3px;
        width: 0%;
        height: 3px;
        background: #536dfe;
        border-radius: 2px;
        transition: width 0.3s ease;
      }

      .navbar a:hover::after {
        width: 100%;
      }

      /* LOGO */
      .nav-logo {
        width: 42px;
        height: 42px;
        border-radius: 5px;
        display: block;
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
      }

      .nav-logo:hover {
        transform: scale(1.08);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
      }

      /* ================= MAIN ================= */
      .main-content {
        margin-top: 80px;
        padding: 20px;
      }

      h1 {
        font-size: 36px;
        margin-bottom: 20px;
      }

      /* About Me Section */
      .about-me {
        text-align: left;
        font-size: 16px;
        color: #555;
        margin: 10px 0 20px 0;
      }

      body.dark .about-me {
        color: #ccc;
      }

      /* ================= SECTIONS ================= */
      .section {
        margin-bottom: 30px;
        padding-bottom: 10px;
        border-bottom: 2px solid rgba(0, 0, 0, 0.1);
      }

      body.dark .section {
        border-bottom: 2px solid rgba(255, 255, 255, 0.25);
      }

      /* ================= BUTTONS ================= */
      .game-link {
        display: inline-block;
        margin: 10px 10px 0 0;
        padding: 12px 24px;
        background-color: #4c5eaf;
        color: white;
        border-radius: 10px;
        text-decoration: none;
        font-size: 18px;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .game-link:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
      }

      /* ================= IMAGE ================= */
      .bottom-image {
        margin-top: 20px;
        max-width: 260px;
      }

      .bottom-image img {
        width: 100%;
        border-radius: 12px;
        display: block;
        animation: floatImage 3.5s ease-in-out infinite;
        box-shadow: 0 0 12px rgba(83, 109, 254, 0.4);
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      .bottom-image img:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(83, 109, 254, 0.7);
      }

      @keyframes floatImage {
        0% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
        100% {
          transform: translateY(0);
        }
      }

      /* ================= DARK MODE ================= */
      body.dark {
        color: #e6e6e6;
        background: linear-gradient(-45deg, #0f1117, #1a1f3a, #0f1117, #1c2240);
        background-size: 400% 400%;
        animation: gradientMove 18s ease infinite;
      }

      @keyframes gradientMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* ================= TOGGLE ================= */
      .toggle {
        width: 65px;
        height: 34px;
        border-radius: 50px;
        cursor: pointer;
        position: relative;
        background: #dcdde1;
        border: 2px solid rgba(0, 0, 0, 0.2);
      }

      body.dark .toggle {
        background: #2f3640;
        border: 2px solid rgba(255, 255, 255, 0.3);
      }

      .toggle.active {
        background: #536dfe;
        border: 2px solid #536dfe;
        box-shadow: 0 0 10px rgba(83, 109, 254, 0.6);
      }

      .toggle-circle {
        width: 28px;
        height: 28px;
        background: white;
        position: absolute;
        top: 1px;
        left: 2px;
        border-radius: 50%;
        transition: 0.35s;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 14px;
      }

      .toggle.active .toggle-circle {
        left: 33px;
      }

      /* ================= FX ================= */
      .cursor-glow {
        position: fixed;
        width: 250px;
        height: 250px;
        background: radial-gradient(
          circle,
          rgba(83, 109, 254, 0.25),
          transparent 70%
        );
        pointer-events: none;
        transform: translate(-50%, -50%);
      }

      @keyframes floatUp {
        from {
          transform: translateY(100vh);
        }
        to {
          transform: translateY(-10vh);
        }
      }

      /* ================= MOBILE RESPONSIVE ================= */
      @media (max-width: 600px) {
        .navbar {
          padding: 0 15px;
          height: 55px;
        }

        .navbar-content {
          gap: 10px;
          flex-wrap: wrap;
        }

        .navbar a {
          font-size: 16px;
        }

        .main-content {
          margin-top: 70px;
          padding: 15px;
        }

        h1 {
          font-size: 28px;
        }

        .game-link {
          font-size: 16px;
          padding: 10px 18px;
        }

        .bottom-image {
          max-width: 180px;
        }
      }
      #gameCanvas {
        display: block;
        margin-top: 20px;
        border-radius: 12px;
        background: linear-gradient(to top, #222, #444);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      #score {
        margin-top: 10px;
        font-size: 18px;
      }
    </style>
  </head>

  <body>
    <div class="navbar">
      <div class="navbar-content">
        <a href="/"><img src="/images/logo.png" class="nav-logo" /></a>
        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
        <a href="/downloadpage">Exhibit</a>
      </div>

      <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
      </div>
    </div>

    <div class="main-content">
      <h1>Geometry Dash {Beta}</h1>

      <canvas id="gameCanvas" width="800" height="300"></canvas>
      <p id="score">Score: 0</p>
    </div>
    <script>
      let isPaused = false;
      const toggle = document.getElementById("toggle");
      const icon = document.getElementById("icon");

      if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("dark");
        toggle.classList.add("active");
        icon.textContent = "☀️";
      }

      toggle.onclick = () => {
        document.body.classList.toggle("dark");
        toggle.classList.toggle("active");

        if (document.body.classList.contains("dark")) {
          icon.textContent = "☀️";
          localStorage.setItem("darkMode", "on");
        } else {
          icon.textContent = "🌙";
          localStorage.setItem("darkMode", "off");
        }
      };

      /* ===== HOOK INTO EXISTING EFFECTS (no rewrites) ===== */

      /* block dust + glow movement */
      document.addEventListener(
        "mousemove",
        (e) => {
          if (!isPaused) return;
          e.stopImmediatePropagation();
        },
        true,
      );
      function getFormattedDateTime() {
        return new Date().toLocaleString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      const dateEl = document.getElementById("current-date");
      const yearEl = document.getElementById("current-dates");

      if (dateEl && yearEl) {
        dateEl.textContent = getFormattedDateTime();
        yearEl.textContent = new Date().getFullYear();

        setInterval(() => {
          dateEl.textContent = getFormattedDateTime();
        }, 1000);
      }
      window.onload = () => {
        let isPaused = false;

        const canvas = document.getElementById("gameCanvas");
        if (!canvas) return;

        const ctx = canvas.getContext("2d");

        // ===== GROUND LEVEL =====
        const GROUND_Y = 250;

        // ===== PLAYER SETTINGS =====
        let player = {
          x: 80,
          y: GROUND_Y - 30, // place player EXACTLY on ground
          size: 30,
          velocityY: 0,
          // ===== TIGHTER JUMP (faster + more responsive) =====
          gravity: 1.2,
          jumpPower: -18,
          grounded: true,
          rotation: 0, // used for spinning effect
        };

        let obstacles = [];
        let rollingSpikes = [];
        let platforms = [];
        let frame = 0;
        // ===== SCORE =====
        let score = 0;
        let highScore = localStorage.getItem("gd_highscore") || 0;
        let gameOver = false;
        let lastSpawnX = canvas.width;
        const MIN_GAP = 2 * 34 + 40; // ~2 spikes + extra safety space

        // ===== TIME TRACKING (for real seconds) =====
        let startTime = Date.now();

        // ===== SPAWN SPIKE OBSTACLES =====
        // ===== SPAWN SPIKE CLUMPS =====
        function spawnObstacle() {
          // ===== FIND RIGHTMOST OBJECT =====
          let furthestX = -Infinity;

          if (obstacles.length > 0) {
            furthestX = Math.max(
              furthestX,
              ...obstacles.map((o) => o.x + o.size),
            );
          }

          if (rollingSpikes.length > 0) {
            furthestX = Math.max(
              furthestX,
              ...rollingSpikes.map((r) => r.x + r.size),
            );
          }

          // ===== PREVENT OVERLAP BETWEEN TYPES =====
          const SAFE_GAP = 220;

          if (canvas.width - furthestX < SAFE_GAP) return;

          const isRolling = Math.random() < 0.35;

          // =========================================
          // ===== ROLLING RED SPIKE =====
          // =========================================
          if (isRolling) {
            // FRONT spinning spike
            rollingSpikes.push({
              x: canvas.width - 42,
              y: GROUND_Y - 8,
              size: 34,
              rotation: 0,
            });

            // MIDDLE spinning spike
            rollingSpikes.push({
              x: canvas.width,
              y: GROUND_Y - 8,
              size: 34,
              rotation: 0,
            });

            // BACK spinning spike
            rollingSpikes.push({
              x: canvas.width + 42,
              y: GROUND_Y - 8,
              size: 34,
              rotation: 0,
            });

            // platform only above middle spike
            platforms.push({
              x: canvas.width - 5,
              y: GROUND_Y - 75,
              width: 45,
              height: 12,
            });

            return;
          }

          // =========================================
          // ===== NORMAL SPIKE CLUMPS =====
          // =========================================
          const count = Math.floor(Math.random() * 3) + 1;

          for (let i = 0; i < count; i++) {
            obstacles.push({
              x: canvas.width + i * 34,
              y: GROUND_Y,
              size: 30,
            });
          }
        }
        function resetGame() {
          obstacles = [];
          platforms = [];
          player.y = GROUND_Y - player.size;
          player.velocityY = 0;
          score = 0;
          gameOver = false;

          // ===== RESET TIMER =====
          startTime = Date.now();
        }

        function update() {
          if (gameOver) return;

          frame++;

          // ===== RANDOM SPAWN TIMING =====
          // ===== CONTROLLED SPAWN DELAY =====
          if (Math.random() < 0.02) {
            spawnObstacle();
          }
          // ===== GRAVITY + MOVEMENT =====
          player.velocityY += player.gravity;
          player.y += player.velocityY;

          // ===== ROTATION WHILE IN AIR =====
          if (!player.grounded) {
            player.rotation += 0.1; // spin
          } else {
            player.rotation = 0; // reset when on ground
          }

          // ===== PLATFORM COLLISION =====
          let onPlatform = false;

          platforms.forEach((p) => {
            const withinX =
              player.x + player.size > p.x && player.x < p.x + p.width;

            const touchingTop =
              player.y + player.size >= p.y &&
              player.y + player.size <= p.y + p.height + 8 &&
              player.velocityY >= 0;

            if (withinX && touchingTop) {
              player.y = p.y - player.size;
              player.velocityY = 0;
              player.grounded = true;
              onPlatform = true;
            }
          });

          // ===== GROUND COLLISION =====
          if (player.y >= GROUND_Y - player.size) {
            player.y = GROUND_Y - player.size;
            player.velocityY = 0;
            player.grounded = true;
          } else if (!onPlatform) {
            player.grounded = false;
          }
          // ===== GAME SPEED =====
          const GAME_SPEED = 7;

          platforms.forEach((p) => (p.x -= GAME_SPEED));
          platforms = platforms.filter((p) => p.x > -100);

          obstacles.forEach((obs) => (obs.x -= GAME_SPEED)); // ===== COLLISION DETECTION (spike hitbox) =====
          rollingSpikes.forEach((r) => {
            r.x -= GAME_SPEED;
            r.rotation += 0.18;
          });

          rollingSpikes = rollingSpikes.filter((r) => r.x > -60);

          // ===== PRECISE SPIKE HITBOX (FIXED) =====
          obstacles.forEach((obs) => {
            const px = player.x;
            const py = player.y;
            const ps = player.size;

            // spike bounds
            const left = obs.x;
            const right = obs.x + obs.size;
            const bottom = obs.y;
            const top = obs.y - obs.size;

            // AABB check first (fast rejection)
            const overlapX = px < right && px + ps > left;
            const overlapY = py < bottom && py + ps > top;

            if (overlapX && overlapY) {
              gameOver = true;

              // ===== SAVE HIGH SCORE =====
              if (score > highScore) {
                highScore = score;
                localStorage.setItem("gd_highscore", highScore);
              }
            }
          });

          obstacles = obstacles.filter((obs) => obs.x > -50);

          // ===== SCORE BASED ON REAL TIME (seconds) =====
          score = Math.floor((Date.now() - startTime) / 1000);
          // ===== DISPLAY SCORE + HIGH SCORE =====
          document.getElementById("score").textContent =
            "Score: " + score + " | Best: " + highScore;
        }

        function draw() {
          // ===== CLEAR SCREEN =====
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // ===== BACKGROUND (matches your dark gradient UI) =====
          const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
          bg.addColorStop(0, "#1a1f3a");
          bg.addColorStop(1, "#0f1117");
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // ===== GLOWING GROUND LINE =====
          ctx.fillStyle = "#536dfe";
          ctx.fillRect(0, GROUND_Y, canvas.width, 4);

          ctx.shadowBlur = 15;
          ctx.shadowColor = "#536dfe";
          ctx.fillStyle = "#00ff88";

          platforms.forEach((p) => {
            ctx.fillRect(p.x, p.y, p.width, p.height);
          });
          // ===== PLAYER (ROTATING CUBE) =====
          ctx.save();
          ctx.translate(player.x + player.size / 2, player.y + player.size / 2);
          ctx.rotate(player.rotation);
          ctx.fillStyle = "#00e5ff";
          ctx.fillRect(
            -player.size / 2,
            -player.size / 2,
            player.size,
            player.size,
          );
          ctx.restore();

          ctx.shadowBlur = 0;
          ctx.shadowBlur = 0;

          // 👇 PASTE SECTION 5 HERE

          // ===== ROLLING SPIKES =====
          ctx.strokeStyle = "#ffea00";
          ctx.lineWidth = 4;

          rollingSpikes.forEach((r) => {
            ctx.save();

            ctx.translate(r.x, r.y);
            ctx.rotate(r.rotation);

            ctx.beginPath();
            ctx.arc(0, 0, r.radius, 0, Math.PI * 2);
            ctx.stroke();

            for (let i = 0; i < 8; i++) {
              ctx.rotate(Math.PI / 4);

              ctx.beginPath();
              ctx.moveTo(0, 0);
              ctx.lineTo(r.radius, 0);
              ctx.stroke();
            }

            ctx.restore();
          });

          // ===== SPIKES (TRIANGLES) =====
          ctx.fillStyle = "#ff3d00";

          obstacles.forEach((obs) => {
            ctx.beginPath();
            ctx.moveTo(obs.x, obs.y);
            ctx.lineTo(obs.x + obs.size / 2, obs.y - obs.size);
            ctx.lineTo(obs.x + obs.size, obs.y);
            ctx.closePath();
            ctx.fill();
          });
          // ===== ROLLING RED SPIKES =====
          ctx.fillStyle = "#ff3d00";

          rollingSpikes.forEach((r) => {
            ctx.save();

            ctx.translate(r.x + r.size / 2, r.y - r.size / 2);
            ctx.rotate(r.rotation);

            ctx.beginPath();
            ctx.moveTo(-r.size / 2, r.size / 2);
            ctx.lineTo(0, -r.size / 2);
            ctx.lineTo(r.size / 2, r.size / 2);
            ctx.closePath();

            ctx.fill();

            ctx.restore();
          });
          // ===== NORMAL SPIKE COLLISION =====
          obstacles.forEach((obs) => {
            const px = player.x;
            const py = player.y;
            const ps = player.size;

            const left = obs.x;
            const right = obs.x + obs.size;
            const bottom = obs.y;
            const top = obs.y - obs.size;

            const overlapX = px < right && px + ps > left;
            const overlapY = py < bottom && py + ps > top;

            if (overlapX && overlapY) {
              gameOver = true;

              if (score > highScore) {
                highScore = score;
                localStorage.setItem("gd_highscore", highScore);
              }
            }
          });

          // 👇 PASTE SECTION 4 RIGHT HERE

          rollingSpikes.forEach((r) => {
            const px = player.x;
            const py = player.y;
            const ps = player.size;

            const left = r.x;
            const right = r.x + r.size;
            const bottom = r.y;
            const top = r.y - r.size;

            const overlapX = px < right && px + ps > left;
            const overlapY = py < bottom && py + ps > top;

            if (overlapX && overlapY) {
              gameOver = true;

              if (score > highScore) {
                highScore = score;
                localStorage.setItem("gd_highscore", highScore);
              }
            }
          });
          obstacles = obstacles.filter((obs) => obs.x > -50);
          // ===== GAME OVER UI =====
          if (gameOver) {
            ctx.fillStyle = "white";
            ctx.font = "bold 28px Fredoka";
            ctx.fillText("Game Over", 300, 120);

            ctx.font = "16px Fredoka";
            ctx.fillText("Click to Restart", 310, 150);
          }
        }

        function loop() {
          update();
          draw();
          requestAnimationFrame(loop);
        }

        loop();

        document.addEventListener("keydown", (e) => {
          if (e.code === "Space" && player.grounded && !gameOver) {
            player.velocityY = player.jumpPower;
            player.grounded = false;
          }
        });

        canvas.addEventListener("click", () => {
          if (gameOver) resetGame();
          else if (player.grounded) {
            player.velocityY = player.jumpPower;
            player.grounded = false;
          }
        });
      };
    </script>
  </body>
</html>
