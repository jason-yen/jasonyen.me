<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jasonyen.me</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/images/favicon.png" />
    <style>
      /* ================= FOOTER ================= */
      /* ================= LAYOUT FIX (sticky footer) ================= */
      .footer {
        margin-top: 80px;
        padding: 80px 20px 40px;

        background: linear-gradient(
          to bottom,
          transparent 0%,
          rgba(212, 220, 251, 0.5) 25%,
          #d4dcfb 55%,
          #cfd8ff 100%
        );

        color: #111;
        text-align: center;
        font-family: "Spectral", serif;
        font-size: 15px;
        line-height: 1.7;
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(6px);
      }

      /* animated glow line */
      .footer::before {
        content: "";
        position: absolute;
        top: 0;
        left: -50%;
        width: 200%;
        height: 2px;

        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 200, 255, 0.6),
          rgba(180, 120, 255, 0.6),
          transparent
        );

        animation: footerGlow 6s linear infinite;
        will-change: transform;
      }

      @keyframes footerGlow {
        0% {
          transform: translateX(-25%);
        }

        100% {
          transform: translateX(25%);
        }
      }

      /* links */
      .footer a {
        color: #444;
        text-decoration: none;
        margin: 0 6px;
        transition: color 0.25s ease;
      }

      .footer a:hover {
        color: #000;
      }

      /* ================= DARK MODE ================= */
      body.dark .footer {
        background: #000;
        color: #fff;
      }

      body.dark .footer a {
        color: #aaa;
      }

      body.dark .footer a:hover {
        color: #fff;
      }

      body.dark .footer::before {
        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 200, 255, 0.7),
          rgba(180, 120, 255, 0.7),
          transparent
        );
      }

      /* ================= GLOBAL ================= */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Fredoka", sans-serif;
        font-size: 18px;
        background-color: #f5f6fa;
        overflow-x: hidden;
        transition:
          background 0.4s,
          color 0.4s;
        line-height: 1.6;
      }

      /* ================= DISABLE ON MOBILE ================= */

      /* ================= NAVBAR ================= */
      .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(20px);
        z-index: 9999;
      }

      .navbar-content {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .navbar a {
        color: #536dfe;
        text-decoration: none;
        font-size: 18px;
        position: relative;
        white-space: nowrap;
      }

      .navbar a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -3px;
        width: 0%;
        height: 3px;
        background: #536dfe;
        border-radius: 2px;
        transition: width 0.3s ease;
      }

      .navbar a:hover::after {
        width: 100%;
      }

      /* LOGO */
      .nav-logo {
        width: 42px;
        height: 42px;
        border-radius: 5px;
        display: block;
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
      }

      .nav-logo:hover {
        transform: scale(1.08);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
      }

      /* ================= MAIN ================= */
      .main-content {
        margin-top: 80px;
        padding: 20px;
      }

      h1 {
        font-size: 36px;
        margin-bottom: 20px;
      }

      /* About Me Section */
      .about-me {
        text-align: left;
        font-size: 16px;
        color: #555;
        margin: 10px 0 20px 0;
      }

      body.dark .about-me {
        color: #ccc;
      }

      /* ================= SECTIONS ================= */
      .section {
        margin-bottom: 30px;
        padding-bottom: 10px;
        border-bottom: 2px solid rgba(0, 0, 0, 0.1);
      }

      body.dark .section {
        border-bottom: 2px solid rgba(255, 255, 255, 0.25);
      }

      /* ================= BUTTONS ================= */
      .game-link {
        display: inline-block;
        margin: 10px 10px 0 0;
        padding: 12px 24px;
        background-color: #4c5eaf;
        color: white;
        border-radius: 10px;
        text-decoration: none;
        font-size: 18px;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .game-link:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
      }

      /* ================= IMAGE ================= */
      .bottom-image {
        margin-top: 20px;
        max-width: 260px;
      }

      .bottom-image img {
        width: 100%;
        border-radius: 12px;
        display: block;
        animation: floatImage 3.5s ease-in-out infinite;
        box-shadow: 0 0 12px rgba(83, 109, 254, 0.4);
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      .bottom-image img:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(83, 109, 254, 0.7);
      }

      @keyframes floatImage {
        0% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-4px);
        }

        100% {
          transform: translateY(0);
        }
      }

      /* ================= DARK MODE ================= */
      body.dark {
        color: #e6e6e6;
        background: linear-gradient(-45deg, #0f1117, #1a1f3a, #0f1117, #1c2240);
        background-size: 400% 400%;
        animation: gradientMove 18s ease infinite;
      }

      @keyframes gradientMove {
        0% {
          background-position: 0% 50%;
        }

        50% {
          background-position: 100% 50%;
        }

        100% {
          background-position: 0% 50%;
        }
      }

      /* ================= TOGGLE ================= */
      .toggle {
        width: 65px;
        height: 34px;
        border-radius: 50px;
        cursor: pointer;
        position: relative;
        background: #dcdde1;
        border: 2px solid rgba(0, 0, 0, 0.2);
      }

      body.dark .toggle {
        background: #2f3640;
        border: 2px solid rgba(255, 255, 255, 0.3);
      }

      .toggle.active {
        background: #536dfe;
        border: 2px solid #536dfe;
        box-shadow: 0 0 10px rgba(83, 109, 254, 0.6);
      }

      .toggle-circle {
        width: 28px;
        height: 28px;
        background: white;
        position: absolute;
        top: 1px;
        left: 2px;
        border-radius: 50%;
        transition: 0.35s;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 14px;
      }

      .toggle.active .toggle-circle {
        left: 33px;
      }

      /* ================= FX ================= */
      .cursor-glow {
        position: fixed;
        width: 250px;
        height: 250px;
        background: radial-gradient(
          circle,
          rgba(83, 109, 254, 0.25),
          transparent 70%
        );
        pointer-events: none;
        transform: translate(-50%, -50%);
      }

      @keyframes floatUp {
        from {
          transform: translateY(100vh);
        }

        to {
          transform: translateY(-10vh);
        }
      }

      /* ================= MOBILE RESPONSIVE ================= */
      @media (max-width: 600px) {
        .navbar {
          padding: 0 15px;
          height: 55px;
        }

        .navbar-content {
          gap: 10px;
          flex-wrap: wrap;
        }

        .navbar a {
          font-size: 16px;
        }

        .main-content {
          margin-top: 70px;
          padding: 15px;
        }

        h1 {
          font-size: 28px;
        }

        .game-link {
          font-size: 16px;
          padding: 10px 18px;
        }

        .bottom-image {
          max-width: 180px;
        }
      }

      #gameCanvas {
        display: block;
        margin-top: 20px;
        border-radius: 12px;
        background: linear-gradient(to top, #222, #444);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      #score {
        margin-top: 10px;
        font-size: 18px;
      }

      #gameCanvas {
        width: 100%;
        max-width: 800px;
        height: auto;
      }
      .score-ui {
        margin-top: 14px;
        font-size: 22px;
        color: white;
        text-shadow:
          0 0 8px #536dfe,
          0 0 16px #536dfe;
        animation: pulseScore 2s infinite ease-in-out;
      }

      @keyframes pulseScore {
        0% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.03);
        }

        100% {
          transform: scale(1);
        }
      }
      canvas {
        border: 2px solid rgba(255, 255, 255, 0.08);
      }
      /* ================= RANDOM BLACKOUT ================= */
      .blackout {
        position: fixed;
        inset: 0;
        background: black;
        opacity: 0;
        pointer-events: none;
        z-index: 999999;
        transition: opacity 0.08s linear;
      }

      .blackout.active {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="blackout" id="blackout"></div>
    <div class="navbar">
      <div class="navbar-content">
        <a href="/"><img src="/images/logo.png" class="nav-logo" /></a>
        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
        <a href="/downloadpage">Exhibit</a>
      </div>

      <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
      </div>
    </div>

    <div class="main-content">
      <h1>Geometry Dash {Beta}</h1>

      <canvas id="gameCanvas" width="800" height="300"></canvas>
      <p id="score" class="score-ui">Score: 0</p>
    </div>
    <script>
      let isPaused = false;
      const toggle = document.getElementById("toggle");
      const icon = document.getElementById("icon");

      if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("dark");
        toggle.classList.add("active");
        icon.textContent = "☀️";
      }

      toggle.onclick = () => {
        document.body.classList.toggle("dark");
        toggle.classList.toggle("active");

        if (document.body.classList.contains("dark")) {
          icon.textContent = "☀️";
          localStorage.setItem("darkMode", "on");
        } else {
          icon.textContent = "🌙";
          localStorage.setItem("darkMode", "off");
        }
      };

      /* ===== HOOK INTO EXISTING EFFECTS (no rewrites) ===== */

      /* block dust + glow movement */
      document.addEventListener(
        "mousemove",
        (e) => {
          if (!isPaused) return;
          e.stopImmediatePropagation();
        },
        true,
      );
      function getFormattedDateTime() {
        return new Date().toLocaleString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      const dateEl = document.getElementById("current-date");
      const yearEl = document.getElementById("current-dates");

      if (dateEl && yearEl) {
        dateEl.textContent = getFormattedDateTime();
        yearEl.textContent = new Date().getFullYear();

        setInterval(() => {
          dateEl.textContent = getFormattedDateTime();
        }, 1000);
      }
      window.onload = () => {
        const canvas = document.getElementById("gameCanvas");
        if (!canvas) return;

        const ctx = canvas.getContext("2d");
        function resizeCanvas() {
          canvas.width = canvas.clientWidth;
          canvas.height = 300;
        }

        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();
        // ===== GROUND LEVEL =====
        const GROUND_Y = 250;

        // ===== PLAYER SETTINGS =====
        let player = {
          x: 80,
          y: GROUND_Y - 30, // place player EXACTLY on ground
          size: 30,
          velocityY: 0,
          // ===== TIGHTER JUMP (faster + more responsive) =====
          gravity: 1.45, //Change jump speed
          jumpPower: -16,
          grounded: true,
          rotation: 0, // used for spinning effect
        };

        let obstacles = []; // Variables
        let rollingSpikes = [];
        let platforms = [];
        let stars = [];
        let particles = [];
        let clouds = [];
        let floatingBlocks = [];
        let spawnTimer = 0;
        let ballSpikes = [];
        let nextSpawn = 90; // ===== SCORE =====
        let score = 0;
        let worldOffset = 0;
        let gridOffset = 0;
        let highScore = localStorage.getItem("gd_highscore") || 0;
        let gameOver = false;
        let shakeTime = 0;
        let lastSpawnX = canvas.width;
        const MIN_GAP = 2 * 34 + 40; // ~2 spikes + extra safety space

        // ===== TIME TRACKING (for real seconds) =====
        let startTime = Date.now();
        // ===== BACKGROUND STARS =====
        for (let i = 0; i < 80; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speed: 0.2 + Math.random() * 0.5,
          });
        }

        // ===== CLOUDS =====
        for (let i = 0; i < 8; i++) {
          clouds.push({
            x: Math.random() * canvas.width,
            y: 40 + Math.random() * 100,
            width: 100 + Math.random() * 120,
            speed: 0.3 + Math.random() * 0.5,
          });
        }
        // ===== SPAWN SPIKE OBSTACLES =====
        // ===== SPAWN SPIKE CLUMPS =====
        function spawnObstacle() {
          // ===== FIND RIGHTMOST OBJECT =====
          let furthestX = -Infinity;

          if (obstacles.length > 0) {
            furthestX = Math.max(
              furthestX,
              ...obstacles.map((o) => o.x + o.size),
            );
          }

          if (rollingSpikes.length > 0) {
            furthestX = Math.max(
              furthestX,
              ...rollingSpikes.map((r) => r.x + r.size),
            );
          }

          // ===== PREVENT OVERLAP =====
          const SAFE_GAP = 140;
          if (canvas.width - furthestX < SAFE_GAP) return;

          const isRolling = Math.random() < 0.35;

          // =========================================
          // ===== SPAWN ROLLING SPIKES ==============
          // =========================================
          if (isRolling) {
            rollingSpikes.push({
              x: canvas.width - 42,
              y: GROUND_Y,
              size: 34,
              rotation: 0,
            });

            rollingSpikes.push({
              x: canvas.width,
              y: GROUND_Y,
              size: 34,
              rotation: 0,
            });

            rollingSpikes.push({
              x: canvas.width + 42,
              y: GROUND_Y,
              size: 34,
              rotation: 0,
            });

            // optional platform
            platforms.push({
              x: canvas.width - 5,
              y: GROUND_Y - 75,
              width: 45,
              height: 12,
            });

            return;
          }
          // =========================================
          // ===== BALL SPIKES =======================
          // =========================================
          // ===== BALL SPIKE CLUMPS =================
          // =========================================
          if (Math.random() < 0.35) {
            // only 1–2 ball spikes together
            const count = Math.floor(Math.random() * 2) + 1;

            for (let i = 0; i < count; i++) {
              ballSpikes.push({
                x: canvas.width + i * 46,
                y: GROUND_Y - 18,

                size: 36,
                rotation: 0,

                // slower rolling
                spinSpeed: 0.018 + Math.random() * 0.008,
              });
            }

            return;
          }
          // =========================================
          // ===== NORMAL SPIKE CLUMPS ===============
          // =========================================
          const count = Math.floor(Math.random() * 3) + 1;

          for (let i = 0; i < count; i++) {
            obstacles.push({
              x: canvas.width + i * 34,
              y: GROUND_Y,
              size: 30,
            });
            // random floating decoration block
            if (Math.random() < 0.45) {
              floatingBlocks.push({
                x: canvas.width + Math.random() * 100,
                y: 80 + Math.random() * 100,
                size: 25 + Math.random() * 25,
                rotation: 0,
              });
            }
          }
        }
        function resetGame() {
          obstacles = [];
          rollingSpikes = [];
          platforms = [];
          ballSpikes = [];

          player.y = GROUND_Y - player.size;
          player.velocityY = 0;
          player.rotation = 0;
          player.grounded = true;

          score = 0;
          gameOver = false;

          // reset timer
          startTime = Date.now();

          // stop screen shake
          canvas.style.transform = "translate(0,0)";
        }
        function update(deltaTime) {
          const GAME_SPEED = 13 * deltaTime; // Change game speed

          // ===== MOVE STARS =====
          stars.forEach((s) => {
            s.x -= s.speed * deltaTime;

            if (s.x < 0) {
              s.x = canvas.width;
              s.y = Math.random() * canvas.height;
            }
          });

          // ===== MOVE CLOUDS =====
          clouds.forEach((c) => {
            c.x -= c.speed * deltaTime;

            if (c.x + c.width < 0) {
              c.x = canvas.width + 100;
              c.y = 40 + Math.random() * 100;
            }
          });

          // ===== FLOATING BLOCKS =====
          floatingBlocks.forEach((b) => {
            b.x -= GAME_SPEED * 0.7;
            b.rotation += 0.01 * deltaTime;
          });

          floatingBlocks = floatingBlocks.filter((b) => b.x > -100);

          // ===== PLAYER PARTICLES =====
          particles.push({
            x: player.x,
            y: player.y + player.size,
            size: 3 + Math.random() * 4,
            life: 25,
          });

          particles.forEach((p) => {
            p.x -= 2;
            p.life--;
          });

          particles = particles.filter((p) => p.life > 0);
          if (gameOver) return;
          worldOffset += 0.6 * deltaTime;
          spawnTimer += deltaTime;
          player.velocityY += player.gravity * deltaTime;

          if (player.velocityY > 0) {
            player.velocityY += 0.9 * deltaTime;
          }

          player.y += player.velocityY * deltaTime;
          if (spawnTimer >= nextSpawn) {
            spawnObstacle();

            spawnTimer = 0;
            nextSpawn = 38 + Math.random() * 28; // Change obstacle frequency
          }
          // ===== GRAVITY + MOVEMENT =====

          // ===== ROTATION WHILE IN AIR =====
          if (!player.grounded) {
            player.rotation += 0.25 * deltaTime;
          } else {
            player.rotation = 0; // reset when on ground
          }
          if (player.grounded) {
            player.rotation =
              Math.round(player.rotation / (Math.PI / 2)) * (Math.PI / 2);
          }
          // ===== PLATFORM COLLISION =====
          let onPlatform = false;

          platforms.forEach((p) => {
            const withinX =
              player.x + player.size > p.x && player.x < p.x + p.width;

            const touchingTop =
              player.y + player.size >= p.y &&
              player.y + player.size <= p.y + p.height + 8 &&
              player.velocityY >= 0;

            if (withinX && touchingTop) {
              player.y = p.y - player.size;
              player.velocityY = 0;
              player.grounded = true;
              onPlatform = true;
            }
            if (Math.abs(player.velocityY) < 0.5) {
              player.velocityY *= 0.95;
            }
          });

          // ===== GROUND COLLISION =====
          if (player.y >= GROUND_Y - player.size) {
            player.y = GROUND_Y - player.size;
            player.velocityY = 0;
            player.grounded = true;
          } else if (!onPlatform) {
            player.grounded = false;
          }
          // ===== Game speed =====
          platforms.forEach((p) => (p.x -= GAME_SPEED));
          platforms = platforms.filter((p) => p.x > -100);

          obstacles.forEach((obs) => (obs.x -= GAME_SPEED)); // ===== COLLISION DETECTION (spike hitbox) =====
          rollingSpikes.forEach((r) => {
            r.x -= GAME_SPEED;
            r.rotation += 0.18 * deltaTime;
          });

          rollingSpikes = rollingSpikes.filter((r) => r.x > -60);
          ballSpikes.forEach((b) => {
            // slower movement
            b.x -= GAME_SPEED * 0.88;

            // slower rolling
            b.rotation += b.spinSpeed * deltaTime;
          });

          ballSpikes = ballSpikes.filter((b) => b.x > -100);
          // ===== FAIRER TRIANGLE HITBOX =====
          obstacles.forEach((obs) => {
            const paddingX = 8;
            const paddingTop = 12;
            const paddingBottom = 4;

            const spikeLeft = obs.x + paddingX;
            const spikeRight = obs.x + obs.size - paddingX;

            const spikeTop = obs.y - obs.size + paddingTop;
            const spikeBottom = obs.y - paddingBottom;

            const playerLeft = player.x + 4;
            const playerRight = player.x + player.size - 4;
            const playerTop = player.y + 4;
            const playerBottom = player.y + player.size - 4;

            const hit =
              playerRight > spikeLeft &&
              playerLeft < spikeRight &&
              playerBottom > spikeTop &&
              playerTop < spikeBottom;

            if (hit) {
              if (!gameOver) {
                gameOver = true;
                shakeTime = 20;
              }

              if (score > highScore) {
                highScore = score;
                localStorage.setItem("gd_highscore", highScore);
              }
            }
          });

          // ===== FAIRER ROLLING SPIKE HITBOX =====
          rollingSpikes.forEach((r) => {
            const paddingX = 8;
            const paddingTop = 12;
            const paddingBottom = 4;

            const spikeLeft = r.x + paddingX;
            const spikeRight = r.x + r.size - paddingX;

            const spikeTop = r.y - r.size + paddingTop;
            const spikeBottom = r.y - paddingBottom;

            const playerLeft = player.x + 4;
            const playerRight = player.x + player.size - 4;
            const playerTop = player.y + 4;
            const playerBottom = player.y + player.size - 4;

            const hit =
              playerRight > spikeLeft &&
              playerLeft < spikeRight &&
              playerBottom > spikeTop &&
              playerTop < spikeBottom;

            if (hit) {
              if (!gameOver) {
                gameOver = true;
                shakeTime = 20;
              }

              if (score > highScore) {
                highScore = score;
                localStorage.setItem("gd_highscore", highScore);
              }
            }
          });
          ballSpikes.forEach((b) => {
            const cx = b.x + b.size / 2;
            const cy = b.y;

            const px = player.x + player.size / 2;
            const py = player.y + player.size / 2;

            const dx = px - cx;
            const dy = py - cy;

            const distance = Math.sqrt(dx * dx + dy * dy);

            const ballRadius = b.size * 0.34;
            const playerRadius = player.size * 0.36;

            if (distance < ballRadius + playerRadius) {
              gameOver = true;
              shakeTime = 20;

              if (score > highScore) {
                highScore = score;
                localStorage.setItem("gd_highscore", highScore);
              }
            }
          });
          obstacles = obstacles.filter((obs) => obs.x > -50);

          // ===== SCORE BASED ON REAL TIME (seconds) =====
          score = Math.floor((Date.now() - startTime) / 1000);
          // ===== DISPLAY SCORE + HIGH SCORE =====
          document.getElementById("score").textContent =
            "Score: " + score + " | Best: " + highScore;
        }

        function draw() {
          // ===== CLEAR SCREEN =====
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // ===== BACKGROUND =====
          const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
          bg.addColorStop(0, "#1a1f3a");
          bg.addColorStop(1, "#0f1117");

          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // =========================================
          // ===== PARALLAX MOUNTAINS (BACKGROUND) ===
          // =========================================
          ctx.fillStyle = "rgba(21,25,43,0.75)";

          for (let i = 0; i < 12; i++) {
            let x = i * 120 - (worldOffset % 120);
            ctx.beginPath();
            ctx.moveTo(x, GROUND_Y);

            ctx.lineTo(x + 60, GROUND_Y - 90);

            ctx.lineTo(x + 120, GROUND_Y);

            ctx.closePath();
            ctx.fill();
          }
          // =========================================
          // ===== CLOUDS ============================
          // =========================================
          ctx.fillStyle = "rgba(255,255,255,0.08)";

          clouds.forEach((c) => {
            ctx.beginPath();
            ctx.roundRect(c.x, c.y, c.width, 35, 20);
            ctx.fill();
          });
          // =========================================
          // ===== GRID BACKGROUND ===================
          // =========================================
          ctx.strokeStyle = "rgba(255,255,255,0.05)";
          ctx.lineWidth = 1;
          for (let x = 0; x < canvas.width; x += 40) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
          }

          for (let y = 0; y < canvas.height; y += 40) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
          }
          // =========================================
          // ===== STARS =============================
          // =========================================
          ctx.fillStyle = "white";

          stars.forEach((s) => {
            ctx.globalAlpha = 0.7;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill();
          });

          ctx.globalAlpha = 1;
          // =========================================
          // ===== GLOWING GROUND ====================
          // =========================================
          ctx.shadowBlur = 15;
          ctx.shadowColor = "#536dfe";

          ctx.fillStyle = "#536dfe";
          ctx.fillRect(0, GROUND_Y, canvas.width, 4);

          ctx.shadowBlur = 0;
          // =========================================
          // ===== FLOATING BLOCKS ===================
          // =========================================
          floatingBlocks.forEach((b) => {
            ctx.save();

            ctx.translate(b.x, b.y);
            ctx.rotate(b.rotation);

            ctx.fillStyle = "#8e99f3";

            ctx.shadowBlur = 15;
            ctx.shadowColor = "#8e99f3";

            ctx.fillRect(-b.size / 2, -b.size / 2, b.size, b.size);

            ctx.restore();
          });

          ctx.shadowBlur = 0;
          // =========================================
          // ===== PLATFORMS =========================
          // =========================================
          ctx.shadowBlur = 15;
          ctx.shadowColor = "#00ff88";

          ctx.fillStyle = "#00ff88";

          platforms.forEach((p) => {
            ctx.fillRect(p.x, p.y, p.width, p.height);
          });

          ctx.shadowBlur = 0;

          // =========================================
          // ===== PLAYER ============================
          // =========================================
          ctx.save();

          ctx.translate(player.x + player.size / 2, player.y + player.size / 2);

          ctx.rotate(player.rotation);

          // glow
          ctx.shadowBlur = 20;
          ctx.shadowColor = "#00e5ff";

          ctx.fillStyle = "#00e5ff";

          ctx.fillRect(
            -player.size / 2,
            -player.size / 2,
            player.size,
            player.size,
          );

          ctx.restore();

          ctx.shadowBlur = 0;

          // =========================================
          // ===== ROLLING SPIKES ====================
          // =========================================
          rollingSpikes.forEach((r) => {
            ctx.save();

            ctx.translate(r.x + r.size / 2, r.y - r.size / 2);

            ctx.rotate(r.rotation);

            ctx.shadowBlur = 18;
            ctx.shadowColor = "#ff1744";

            ctx.fillStyle = "#ff1744";

            ctx.beginPath();

            ctx.moveTo(-r.size / 2, r.size / 2);
            ctx.lineTo(0, -r.size / 2);
            ctx.lineTo(r.size / 2, r.size / 2);

            ctx.closePath();
            ctx.fill();

            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 2;

            ctx.beginPath();

            ctx.moveTo(-8, 6);
            ctx.lineTo(0, -10);
            ctx.lineTo(8, 6);

            ctx.stroke();

            ctx.restore();
          });

          ctx.shadowBlur = 0;
          // =========================================
          // ===== NORMAL SPIKES =====================
          // =========================================
          obstacles.forEach((obs) => {
            ctx.save();

            // center the spike
            ctx.translate(obs.x + obs.size / 2, obs.y - obs.size / 2);

            // red glow
            ctx.shadowBlur = 18;
            ctx.shadowColor = "#ff1744";

            ctx.fillStyle = "#ff1744";

            // main triangle
            ctx.beginPath();

            ctx.moveTo(-obs.size / 2, obs.size / 2);
            ctx.lineTo(0, -obs.size / 2);
            ctx.lineTo(obs.size / 2, obs.size / 2);

            ctx.closePath();
            ctx.fill();

            // inner white detail
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 2;

            ctx.beginPath();

            ctx.moveTo(-8, 6);
            ctx.lineTo(0, -10);
            ctx.lineTo(8, 6);

            ctx.stroke();

            ctx.restore();
          });

          ctx.shadowBlur = 0;

          // rolling spikes
          // =========================================
          // ===== BALL SPIKES DRAW ==================
          // =========================================
          ballSpikes.forEach((b) => {
            ctx.save();

            ctx.translate(b.x + b.size / 2, b.y);
            ctx.rotate(b.rotation);

            ctx.shadowBlur = 20;
            ctx.shadowColor = "#ff1744";

            const spikes = 14;
            const outerR = b.size / 2;
            const innerR = b.size / 3;

            ctx.beginPath();

            for (let i = 0; i < spikes * 2; i++) {
              const angle = (Math.PI / spikes) * i;

              const r = i % 2 === 0 ? outerR : innerR;

              const x = Math.cos(angle) * r;
              const y = Math.sin(angle) * r;

              if (i === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            }

            ctx.closePath();

            ctx.fillStyle = "#c0c0c0";
            ctx.fill();

            ctx.beginPath();
            ctx.arc(0, 0, outerR * 0.25, 0, Math.PI * 2);

            ctx.fillStyle = "#ff1744";
            ctx.fill();

            ctx.restore();
          });
          // =========================================
          // ===== GAME OVER SCREEN ==================
          // =========================================
          if (gameOver) {
            // screen darken
            ctx.fillStyle = "rgba(0,0,0,0.45)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // screen shake
            if (shakeTime > 0) {
              canvas.style.transform = `translate(${Math.floor(Math.random() * 8 - 4)}px,
               ${Math.floor(Math.random() * 8 - 4)}px)`;

              shakeTime--;
            } else {
              canvas.style.transform = "translate(0,0)";
            }

            ctx.fillStyle = "white";

            ctx.font = "bold 32px Fredoka";
            ctx.fillText("Game Over", 285, 120);

            ctx.font = "18px Fredoka";

            ctx.fillText("Click to Restart", 300, 155);
          } else {
            canvas.style.transform = "translate(0,0)";
          }
        }
        let lastTime = 0;
        function loop(timestamp) {
          const deltaTime = Math.min((timestamp - lastTime) / 16.67, 2);
          lastTime = timestamp;

          update(deltaTime);
          draw();

          requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
        document.addEventListener("keydown", (e) => {
          // jump
          if (e.code === "Space" && player.grounded && !gameOver) {
            player.velocityY = player.jumpPower;
            player.grounded = false;
          }

          // press 5 to clear high score
          if (e.key === "5") {
            highScore = 0;
            localStorage.removeItem("gd_highscore");

            document.getElementById("score").textContent =
              "Score: " + score + " | Best: " + highScore;
          }
        });

        canvas.addEventListener("click", () => {
          if (gameOver) resetGame();
          else if (player.grounded) {
            player.velocityY = player.jumpPower;
            player.grounded = false;
          }
        });
      };
      /* ===== RANDOM BLACKOUT EFFECT ===== */

      const blackout = document.getElementById("blackout");

      function triggerBlackout() {
        blackout.classList.add("active");

        // blackout lasts 100–350ms
        const duration = 100 + Math.random() * 250;

        setTimeout(() => {
          blackout.classList.remove("active");

          // next blackout in 5–20 seconds
          const nextTime = 5000 + Math.random() * 15000;

          setTimeout(triggerBlackout, nextTime);
        }, duration);
      }

      // start first blackout
      setTimeout(triggerBlackout, 5000 + Math.random() * 15000);
    </script>
  </body>
</html>
