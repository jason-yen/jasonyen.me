<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jasonyen.me</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/images/favicon.png" />

    <style>
      /* ================= GLOBAL ================= */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Fredoka", sans-serif;
        font-size: 18px;
        background-color: #f5f6fa;
        overflow-x: hidden;
        transition: background 0.4s, color 0.4s;
        line-height: 1.6;
      }

      /* ================= NAVBAR ================= */
      .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(20px);
        z-index: 9999;
      }

      .navbar-content {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .navbar a {
        color: #536dfe;
        text-decoration: none;
        font-size: 18px;
        position: relative;
        white-space: nowrap;
      }

      .navbar a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -3px;
        width: 0%;
        height: 3px;
        background: #536dfe;
        border-radius: 2px;
        transition: width 0.3s ease;
      }

      .navbar a:hover::after {
        width: 100%;
      }

      .nav-logo {
        width: 42px;
        height: 42px;
        border-radius: 5px;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }

      .nav-logo:hover {
        transform: scale(1.08);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
      }

      /* ================= MAIN ================= */
      .main-content {
        margin-top: 80px;
        padding: 20px;
        min-height: 100vh;
      }

      h1 {
        font-size: clamp(26px, 4vw, 48px);
        font-weight: 600;
        margin-bottom: 20px;

        background: linear-gradient(135deg, #536dfe, #8f9fff, #ffffff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      h3 {
        margin-bottom: 10px;
        color: #555;
        font-weight: 400;
      }

      body.dark h3 {
        color: #ccc;
      }

      /* ================= DARK MODE ================= */
      body.dark {
        color: #e6e6e6;
        background: linear-gradient(-45deg, #0f1117, #1a1f3a, #0f1117, #1c2240);
        background-size: 400% 400%;
        animation: gradientMove 18s ease infinite;
      }

      @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* ================= TOGGLE ================= */
      .toggle {
        width: 65px;
        height: 34px;
        border-radius: 50px;
        cursor: pointer;
        position: relative;
        background: #dcdde1;
        border: 2px solid rgba(0, 0, 0, 0.2);
      }

      body.dark .toggle {
        background: #2f3640;
        border: 2px solid rgba(255, 255, 255, 0.3);
      }

      .toggle.active {
        background: #536dfe;
        box-shadow: 0 0 10px rgba(83, 109, 254, 0.6);
      }

      .toggle-circle {
        width: 28px;
        height: 28px;
        background: white;
        position: absolute;
        top: 1px;
        left: 2px;
        border-radius: 50%;
        transition: 0.35s;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }

      .toggle.active .toggle-circle {
        left: 33px;
      }

      /* ================= CAROUSEL ================= */
      .carousel {
        position: relative;
        width: 100%;
        margin: 40px 0;
        overflow: hidden;
        padding: 0 60px;
      }

      .carousel-track {
        display: flex;
        gap: 20px;
        transition: transform 0.4s ease;
      }

      .slide {
        min-width: calc((100% - 40px) / 3);
        text-align: center;
        transition: transform 0.3s ease;
      }

      .slide:hover {
        transform: translateY(-6px);
      }

      .slide img {
        width: 100%;
        max-width: 300px;
        border-radius: 12px;
        display: block;
        margin: 0 auto;
        box-shadow: 0 10px 25px rgba(83, 109, 254, 0.15);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .slide img:hover {
        transform: scale(1.03);
        box-shadow: 0 18px 40px rgba(83, 109, 254, 0.35);
      }

      .nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0, 0, 0, 0.4);
        color: white;
        border: none;
        font-size: 24px;
        padding: 10px;
        cursor: pointer;
        border-radius: 50%;
        z-index: 10;
      }

      .prev { left: 10px; }
      .next { right: 10px; }

      /* ================= MOBILE ================= */
      .mobile-block {
        display: none;
      }

      @media (max-width: 768px) {
        .main-content {
          display: none;
        }

        .mobile-block {
          display: flex;
          position: fixed;
          top: 60px;
          left: 0;
          width: 100%;
          height: calc(100vh - 60px);
          background: #f5f6fa;
          align-items: center;
          justify-content: center;
          text-align: center;
          padding: 20px;
        }

        body.dark .mobile-block {
          background: #0f1117;
          color: #e6e6e6;
        }
      }

      /* ================= IMAGE MODAL ================= */
      .img-wrapper {
        position: relative;
        display: inline-block;
        cursor: zoom-in;
      }

      .img-wrapper img {
        width: 100%;
        max-width: 300px;
        border-radius: 12px;
        user-select: none;
        pointer-events: none;
      }

      .img-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 99999;
      }

      .img-modal img {
        max-width: 90%;
        max-height: 90%;
        border-radius: 12px;
      }
    </style>
  </head>

  <body>
    <div class="mobile-block">No mobile access</div>

    <div class="navbar">
      <div class="navbar-content">
        <a href="/"><img src="/images/logo.png" class="nav-logo" /></a>
        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
        <a href="/downloadpage">Exhibit</a>
      </div>

      <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
      </div>
    </div>

    <div class="main-content">
      <h1>Read Free Articles {Still Updating!}</h1>
      <h3>You shall not steal, copy, or advertise any of the following.</h3>

      <div class="carousel">
        <button class="nav prev">&#10094;</button>

        <div class="carousel-track">
          <div class="slide">
            <img src="/images/e1.png" draggable="false" />
            <h3>Unhealthy School Lunches Version 5</h3>
          </div>

          <div class="slide">
            <img src="/images/e2.png" draggable="false" />
            <h3>Maine Bio</h3>
          </div>

          <div class="slide">
            <img src="/images/replace.jpg" draggable="false" />
            <h3>In Progress</h3>
          </div>
        </div>

        <button class="nav next">&#10095;</button>
      </div>
    </div>

    <div id="imgModal" class="img-modal">
      <img id="modalImg" />
    </div>

    <script>
      const toggle = document.getElementById("toggle");
      const icon = document.getElementById("icon");

      if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("dark");
        toggle.classList.add("active");
        icon.textContent = "☀️";
      }

      toggle.onclick = () => {
        document.body.classList.toggle("dark");
        toggle.classList.toggle("active");

        const isDark = document.body.classList.contains("dark");
        icon.textContent = isDark ? "☀️" : "🌙";
        localStorage.setItem("darkMode", isDark ? "on" : "off");
      };

      const modal = document.getElementById("imgModal");
      const modalImg = document.getElementById("modalImg");

      document.querySelectorAll(".img-wrapper").forEach((wrapper) => {
        wrapper.addEventListener("click", () => {
          modal.style.display = "flex";
          modalImg.src = wrapper.querySelector("img").src;
        });
      });

      modal.addEventListener("click", () => {
        modal.style.display = "none";
      });
    </script>
  </body>
</html>
