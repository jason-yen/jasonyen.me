<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jasonyen.me</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/images/favicon.png">

<style>

/* ================= GLOBAL ================= */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Fredoka',sans-serif;
  font-size:18px;
  background-color:#f5f6fa;
  overflow-x:hidden;
  transition: background 0.4s,color 0.4s;
  line-height:1.6;
}

/* ================= NAVBAR ================= */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  z-index:9999;
}

.navbar-content{
  display:flex;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.navbar a{
  color:#536DFE;
  text-decoration:none;
  font-size:18px;
  position:relative;
  white-space:nowrap;
}

.navbar a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-3px;
  width:0%;
  height:3px;
  background:#536DFE;
  border-radius:2px;
  transition:width 0.3s ease;
}

.navbar a:hover::after{
  width:100%;
}

.nav-logo{
  width:42px;
  height:42px;
  border-radius:5px;
  display:block;
}

/* ================= MAIN ================= */
.main-content{
  margin-top:80px;
  padding:20px;
  min-height:100vh;
}

h1{
  font-size:36px;
  margin-bottom:20px;
}

/* ================= DARK MODE ================= */
body.dark{
  color:#e6e6e6;
  background:linear-gradient(-45deg,#0f1117,#1a1f3a,#0f1117,#1c2240);
  background-size:400% 400%;
  animation:gradientMove 18s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ================= TOGGLE ================= */
.toggle{
  width:65px;
  height:34px;
  border-radius:50px;
  cursor:pointer;
  position:relative;
  background:#dcdde1;
  border:2px solid rgba(0,0,0,0.2);
}

body.dark .toggle{
  background:#2f3640;
  border:2px solid rgba(255,255,255,0.3);
}

.toggle.active{
  background:#536DFE;
  border:2px solid #536DFE;
  box-shadow:0 0 10px rgba(83,109,254,0.6);
}

.toggle-circle{
  width:28px;
  height:28px;
  background:white;
  position:absolute;
  top:1px;
  left:2px;
  border-radius:50%;
  transition:0.35s;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:14px;
}

.toggle.active .toggle-circle{
  left:33px;
}

/* ================= CAROUSEL ================= */
.carousel{
  position:relative;
  width:100%;
  margin:40px 0;
  overflow:hidden;
  padding:0 60px; /* space for arrows */
}

.carousel-track{
  display:flex;
  gap:20px;
  transition:transform 0.4s ease;
}
.slide{
  min-width:calc((100% - 40px) / 3); /* 3 per row with gap */
  text-align:center;
}

.slide img{
  width:100%;
  max-width:300px;
  border-radius:12px;
  margin:0 auto;
  display:block;
}

.download-btn{
  display:inline-block;
  margin-top:10px;
  padding:10px 20px;
  background:#536DFE;
  color:white;
  border-radius:8px;
  text-decoration:none;
  font-size:16px;
  transition:0.2s;
}

.download-btn:hover{
  background:#3f51b5;
}

/* arrows */
.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.4);
  color:white;
  border:none;
  font-size:24px;
  padding:10px;
  cursor:pointer;
  border-radius:50%;
  z-index:10; /* FIX */
}

.prev{ left:10px; }
.next{ right:10px; }
/* ================= MOBILE BLOCK ================= */
.mobile-block{
  display:none;
}

@media (max-width:768px){
  .main-content{
    display:none;
  }

  .mobile-block{
    display:flex;
    position:fixed;
    top:60px; /* below navbar */
    left:0;
    width:100%;
    height:calc(100vh - 60px);
    background:#f5f6fa;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
    z-index:9998;
    font-size:24px;
    font-weight:500;
  }

  body.dark .mobile-block{
    background:#0f1117;
    color:#e6e6e6;
  }
}
/* ================= MOBILE NAVBAR (IMPROVED) ================= */
@media (max-width: 600px){

  .navbar{
    height:55px;
    padding:0 12px;

    background:#f5f6fa; /* solid fallback = no white glitch */
    border-bottom:1px solid rgba(0,0,0,0.06);

    backdrop-filter:none;
    -webkit-backdrop-filter:none;

    z-index:9999;
  }

  body.dark .navbar{
    background:#0f1117;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }

  .navbar-content{
    display:flex;
    flex-wrap:nowrap;
    gap:12px;

    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }

  .navbar-content::-webkit-scrollbar{
    display:none;
  }

  .navbar a{
    font-size:14px;
    white-space:nowrap;
    flex-shrink:0;
  }

  .nav-logo{
    width:34px;
    height:34px;
    flex-shrink:0;
  }

  .toggle{
    transform:scale(0.85);
    flex-shrink:0;
  }

  .main-content{
    margin-top:55px;
  }

  .mobile-block{
    top:55px;
    height:calc(100vh - 55px);
  }
}
</style>
</head>

<body>
<div class="mobile-block">
  No mobile access
</div>
<!-- NAVBAR -->
<div class="navbar">
  <div class="navbar-content">
    <a href="/"><img src="/images/logo.png" class="nav-logo"></a>
    <a href="/games">Games</a>
    <a href="/tools">Tools</a>
    <a href="/donatejk">Donate</a>
    <a href="/ai">Search</a>
      <a href="/downloadpage">Exhibit</a>
  </div>

  <div class="toggle" id="toggle">
    <div class="toggle-circle" id="icon">🌙</div>
  </div>
</div>

<!-- CONTENT -->
<div class="main-content">
  <h1>Download Free STLs {Still Updating!}</h1>

  <div class="carousel">
    <button class="nav prev">&#10094;</button>

    <div class="carousel-track">
      <div class="slide">
        <img src="/images/p1.png">
        <h3>Panda Pencil Holder</h3>
        <a href="/stl/panda.stl" download class="download-btn">Download STL</a>
      </div>

      <div class="slide">
        <img src="/images/p2.png">
        <h3>Tanjiro Statue
        </h3>
        <a href="/stl/tanjiro.stl" download class="download-btn">Download STL</a>
      </div>

      <div class="slide">
        <img src="/images/p3.png">
        <h3>Asian Temple</h3>
        <a href="/stl/temple.stl" download class="download-btn">Download STL</a>
      </div>
    </div>

    <button class="nav next">&#10095;</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // DARK MODE
  const toggle=document.getElementById("toggle");
  const icon=document.getElementById("icon");

  if(localStorage.getItem("darkMode")==="on"){
    document.body.classList.add("dark");
    toggle.classList.add("active");
    icon.textContent="☀️";
  }

  toggle.onclick=()=>{
    document.body.classList.toggle("dark");
    toggle.classList.toggle("active");

    if(document.body.classList.contains("dark")){
      icon.textContent="☀️";
      localStorage.setItem("darkMode","on");
    } else {
      icon.textContent="🌙";
      localStorage.setItem("darkMode","off");
    }
  };

  // CAROUSEL
  const track = document.querySelector(".carousel-track");
  const slides = document.querySelectorAll(".slide");
  const nextBtn = document.querySelector(".next");
  const prevBtn = document.querySelector(".prev");

  let index = 0;
nextBtn.addEventListener("click", () => {
  if(index < slides.length - 3){
    index++;
    updateCarousel();
  }
});

prevBtn.addEventListener("click", () => {
  if(index > 0){
    index--;
    updateCarousel();
  }
});
});
</script>

</body>
</html>
