<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jasonyen.me - STL Downloads</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/png" href="/images/favicon.png" />

    <style>
      /* ================= GLOBAL ================= */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Fredoka", sans-serif;
        font-size: 18px;
        line-height: 1.6;
        background-color: #f5f6fa;
        overflow-x: hidden;
        transition: background 0.4s, color 0.4s;
      }

      /* ================= NAVBAR ================= */
      .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(20px);
        z-index: 9999;
      }

      .navbar-content {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .navbar a {
        color: #536dfe;
        text-decoration: none;
        font-size: 18px;
        position: relative;
      }

      .navbar a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -3px;
        width: 0%;
        height: 3px;
        background: #536dfe;
        transition: width 0.3s ease;
      }

      .navbar a:hover::after {
        width: 100%;
      }

      .nav-logo {
        width: 42px;
        height: 42px;
        border-radius: 6px;
        transition: transform 0.25s ease;
      }

      .nav-logo:hover {
        transform: scale(1.08);
      }

      /* ================= MAIN ================= */
      .main-content {
        margin-top: 80px;
        padding: 20px;
      }

      h1 {
        font-size: clamp(28px, 4vw, 48px);
        font-weight: 700;
        letter-spacing: -1px;
        margin-bottom: 20px;

        background: linear-gradient(135deg, #536dfe, #8f9fff, #ffffff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      h3 {
        font-weight: 500;
        margin-bottom: 10px;
        color: #444;
      }

      /* ================= SECTION ================= */
      .section {
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 2px solid rgba(0, 0, 0, 0.08);
        max-width: 900px;
      }

      body.dark .section {
        border-bottom: 2px solid rgba(255, 255, 255, 0.15);
      }

      /* ================= GRID ================= */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }

      /* ================= CARD ================= */
      .card {
        background: white;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }

      .card:hover {
        transform: translateY(-6px);
        box-shadow: 0 18px 40px rgba(83, 109, 254, 0.25);
      }

      .card img {
        width: 100%;
        display: block;
      }

      .card-content {
        padding: 14px;
      }

      .card-title {
        font-weight: 600;
        margin-bottom: 10px;
      }

      /* ================= BUTTON ================= */
      .download-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 44px;

        border-radius: 10px;
        background: linear-gradient(135deg, #536dfe, #788cff);
        color: white;
        text-decoration: none;
        font-weight: 600;

        transition: transform 0.2s ease;
      }

      .download-btn:hover {
        transform: scale(1.03);
      }

      /* ================= DARK MODE ================= */
      body.dark {
        color: #e6e6e6;
        background: linear-gradient(-45deg, #0f1117, #1a1f3a, #0f1117, #1c2240);
        background-size: 400% 400%;
        animation: gradientMove 18s ease infinite;
      }

      @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* ================= TOGGLE ================= */
      .toggle {
        width: 65px;
        height: 34px;
        border-radius: 50px;
        cursor: pointer;
        position: relative;
        background: #dcdde1;
        border: 2px solid rgba(0, 0, 0, 0.2);
      }

      body.dark .toggle {
        background: #2f3640;
        border: 2px solid rgba(255, 255, 255, 0.3);
      }

      .toggle.active {
        background: #536dfe;
      }

      .toggle-circle {
        width: 28px;
        height: 28px;
        background: white;
        position: absolute;
        top: 1px;
        left: 2px;
        border-radius: 50%;
        transition: 0.35s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .toggle.active .toggle-circle {
        left: 33px;
      }

      /* ================= MOBILE ================= */
      @media (max-width: 768px) {
        .main-content {
          margin-top: 100px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <div class="navbar">
      <div class="navbar-content">
        <a href="/"><img src="/images/logo.png" class="nav-logo" /></a>
        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
        <a href="/downloadpage">Exhibit</a>
      </div>

      <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="main-content">
      <h1>✦ STL Downloads ✦</h1>

      <div class="section">
        <h3>Download Free 3D Models</h3>

        <div class="grid">
          <div class="card">
            <img src="/images/p1.png" />
            <div class="card-content">
              <div class="card-title">Panda Pencil Holder</div>
              <a href="/stl/panda.stl" class="download-btn" download>Download</a>
            </div>
          </div>

          <div class="card">
            <img src="/images/p2.png" />
            <div class="card-content">
              <div class="card-title">Tanjiro Statue</div>
              <a href="/stl/tanjiro.stl" class="download-btn" download>Download</a>
            </div>
          </div>

          <div class="card">
            <img src="/images/p3.png" />
            <div class="card-content">
              <div class="card-title">Asian Temple</div>
              <a href="/stl/temple.stl" class="download-btn" download>Download</a>
            </div>
          </div>

          <div class="card">
            <img src="/images/p4.png" />
            <div class="card-content">
              <div class="card-title">Dragon Model</div>
              <a href="/stl/dragon.stl" class="download-btn" download>Download</a>
            </div>
          </div>

          <div class="card">
            <img src="/images/p5.png" />
            <div class="card-content">
              <div class="card-title">Mini Castle</div>
              <a href="/stl/castle.stl" class="download-btn" download>Download</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- DARK MODE -->
    <script>
      const toggle = document.getElementById("toggle");
      const icon = document.getElementById("icon");

      if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("dark");
        toggle.classList.add("active");
        icon.textContent = "☀️";
      }

      toggle.onclick = () => {
        document.body.classList.toggle("dark");
        toggle.classList.toggle("active");

        const dark = document.body.classList.contains("dark");
        icon.textContent = dark ? "☀️" : "🌙";
        localStorage.setItem("darkMode", dark ? "on" : "off");
      };
    </script>
  </body>
</html>
