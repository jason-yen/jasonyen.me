<!doctype html>
<html lang="en">
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jasonyen.me</title>
    <head>
  <div class="cursor"></div>
</head>
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/images/favicon.png" />

<style>
  body {
  cursor: none;
}

.cursor {
  position: fixed;
  width: 12px;
  height: 12px;
  border: 2px solid #fff;
  border-radius: 50%;
  background: transparent;
  pointer-events: none;
  z-index: 2147483647;
  transform: translate(-50%, -50%);
}
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: "Fredoka", sans-serif;
    font-size: 18px;
    background: #f5f6fa;
    color: #1b1f3b;
    overflow-x: hidden;
    line-height: 1.6;
    transition: background 0.4s, color 0.4s;
  }

  /* ================= NAVBAR ================= */

  .navbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 20px;

    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(20px);

    z-index: 9999;
  }

  .navbar-content {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .navbar a {
    color: #536dfe;
    text-decoration: none;
    font-size: 18px;
    position: relative;
    white-space: nowrap;
  }

  .navbar a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -3px;

    width: 0%;
    height: 3px;

    background: #536dfe;
    border-radius: 2px;

    transition: width 0.3s ease;
  }

  .navbar a:hover::after {
    width: 100%;
  }

  .nav-logo {
    width: 42px;
    height: 42px;
    border-radius: 12px;

    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .nav-logo:hover {
    transform: scale(1.08);
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
  }

  /* ================= MAIN ================= */

  .main-content {
    margin-top: 72px;
    padding: 18px;
    max-width: 520px;
  }

  h1 {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 600;
    margin-bottom: 16px;
    line-height: 1.2;

    background: linear-gradient(135deg, #536dfe, #8f9fff, #ffffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .game-container {
    margin-top: 10px;
  }

  /* ================= GRID ================= */

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 110px);
    gap: 12px;
    justify-content: start;
  }

  /* ================= CELLS ================= */

  .cell {
    width: 110px;
    height: 110px;

    background: rgba(255, 255, 255, 0.55);
    border-radius: 16px;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 38px;
    font-weight: 600;

    cursor: pointer;
    user-select: none;

    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);

    transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .cell:hover {
    transform: scale(1.05);
    box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
  }

  .cell:active {
    transform: scale(0.92);
  }

  .cell.taken {
    pointer-events: none;
  }

  /* ================= WIN / LOSE ================= */

  .winner {
    background: #6dff8f !important;
    box-shadow: 0 0 18px rgba(109, 255, 143, 0.7);
  }

  .loser {
    opacity: 0.4;
  }

  /* ================= UI ================= */

  #message {
    margin-top: 14px;
    font-size: 18px;
    opacity: 0.85;
  }

  #replayButton {
    margin-top: 14px;
    padding: 12px 24px;

    border: none;
    border-radius: 14px;

    background: linear-gradient(135deg, #536dfe, #8f9fff);
    color: white;

    font-size: 16px;
    cursor: pointer;

    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  #replayButton:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 25px rgba(83, 109, 254, 0.35);
  }

  /* ================= TOGGLE ================= */

  .toggle {
    width: 65px;
    height: 34px;
    border-radius: 50px;
    cursor: pointer;
    position: relative;

    background: #dcdde1;
    border: 2px solid rgba(0, 0, 0, 0.15);
    transition: 0.3s ease;
  }

  body.dark .toggle {
    background: #2f3640;
    border: 2px solid rgba(255, 255, 255, 0.25);
  }

  .toggle.active {
    background: #536dfe;
    border: 2px solid #536dfe;
    box-shadow: 0 0 12px rgba(83, 109, 254, 0.5);
  }

  .toggle-circle {
    width: 28px;
    height: 28px;

    background: white;
    position: absolute;
    top: 1px;
    left: 2px;

    border-radius: 50%;
    transition: 0.35s;

    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .toggle.active .toggle-circle {
    left: 33px;
  }

  /* ================= DARK MODE ================= */

  body.dark {
    color: #e6e6e6;
    background: linear-gradient(-45deg, #0f1117, #1a1f3a, #0f1117, #1c2240);
    background-size: 400% 400%;
    animation: gradientMove 18s ease infinite;
  }

  body.dark .cell {
    background: rgba(30, 34, 53, 0.9);
    color: #fff;
  }

  body.dark .loser {
    opacity: 0.3;
  }

  @keyframes gradientMove {
    0% {
      background-position: 0% 50%;
    }
    50% {
      background-position: 100% 50%;
    }
    100% {
      background-position: 0% 50%;
    }
  }

  /* ================= MOBILE ================= */

  @media (max-width: 600px) {
    .navbar {
      padding: 0 12px;
      height: 55px;
    }

    .navbar a {
      font-size: 16px;
    }

    .main-content {
      margin-top: 68px;
      padding: 14px;
    }

    h1 {
      font-size: 30px;
    }

    .grid {
      grid-template-columns: repeat(3, 90px);
      gap: 10px;
    }

    .cell {
      width: 90px;
      height: 90px;
      font-size: 32px;
    }
  }
</style>
  </head>

  <body>
    <div class="navbar">
      <div class="navbar-content">
        <a href="/"><img src="/images/logo.png" class="nav-logo" /></a>
        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
        <a href="/downloadpage">Exhibit</a>
                        <a href="/radio">Radio</a>

      </div>
      <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
      </div>
    </div>

    <div class="main-content">
      <h1>Tic-Tac-Toe</h1>
      <div class="game-container">
        <div class="grid">
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
        </div>

        <div id="message"></div>
        <button id="replayButton" onclick="resetGame()">Replay</button>
      </div>
    </div>

    <script>
      let board = Array(9).fill("");
      let currentPlayer = "X";
      let gameOver = false;

      const cells = document.querySelectorAll(".cell");

      /* ✅ FIX: pointerdown instead of onclick */
      cells.forEach((cell, i) => {
        cell.addEventListener("click", (e) => {
          e.preventDefault();
          makeMove(i);
        });
      });
      const patterns = [
        [0, 1, 2],
        [3, 4, 5],
        [6, 7, 8],
        [0, 3, 6],
        [1, 4, 7],
        [2, 5, 8],
        [0, 4, 8],
        [2, 4, 6],
      ];

      function makeMove(i) {
        if (gameOver || board[i] !== "") return;

        board[i] = currentPlayer;
        cells[i].textContent = currentPlayer;
        cells[i].classList.add("taken");

        if (checkWinner(currentPlayer)) {
          endGame(currentPlayer + " wins!");
          return;
        }

        if (board.every((c) => c !== "")) {
          endGame("Tie!");
          return;
        }

        currentPlayer = currentPlayer === "X" ? "O" : "X";

        /* ✅ FIX: removed setTimeout delay */
        if (currentPlayer === "O") computerMove();
      }

      function checkWinner(p) {
        for (const [a, b, c] of patterns) {
          if (board[a] === p && board[b] === p && board[c] === p) {
            [a, b, c].forEach((i) => cells[i].classList.add("winner"));
            cells.forEach((cell, idx) => {
              if (![a, b, c].includes(idx)) {
                cell.classList.add("loser");
              }
            });
            return true;
          }
        }
        return false;
      }

      function endGame(t) {
        document.getElementById("message").textContent = t;
        gameOver = true;
      }

      function computerMove() {
        let best = -Infinity,
          move;

        for (let i = 0; i < 9; i++) {
          if (board[i] === "") {
            board[i] = "O";
            let score = minimax(board, 0, false);
            board[i] = "";
            if (score > best) {
              best = score;
              move = i;
            }
          }
        }

        setTimeout(() => {
          makeMove(move);
        }, 270);
      }

      function minimax(bd, d, isMax) {
        if (checkWinBoard(bd, "O")) return 10 - d;
        if (checkWinBoard(bd, "X")) return d - 10;
        if (bd.every((c) => c !== "")) return 0;

        if (isMax) {
          let best = -Infinity;
          for (let i = 0; i < 9; i++) {
            if (bd[i] === "") {
              bd[i] = "O";
              best = Math.max(best, minimax(bd, d + 1, false));
              bd[i] = "";
            }
          }
          return best;
        } else {
          let best = Infinity;
          for (let i = 0; i < 9; i++) {
            if (bd[i] === "") {
              bd[i] = "X";
              best = Math.min(best, minimax(bd, d + 1, true));
              bd[i] = "";
            }
          }
          return best;
        }
      }

      function checkWinBoard(bd, p) {
        return patterns.some(
          ([a, b, c]) => bd[a] === p && bd[b] === p && bd[c] === p,
        );
      }

      function resetGame() {
        board = Array(9).fill("");
        document.querySelectorAll(".cell").forEach((c) => {
          c.textContent = "";
          c.classList.remove("taken", "winner", "loser");
        });
        document.getElementById("message").textContent = "";
        currentPlayer = "X";
        gameOver = false;
      }

      /* DARK MODE (unchanged) */
      const toggle = document.getElementById("toggle");
      const icon = document.getElementById("icon");

      if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("dark");
        toggle.classList.add("active");
        icon.textContent = "☀️";
      }

      toggle.onclick = () => {
        document.body.classList.toggle("dark");
        toggle.classList.toggle("active");
        if (document.body.classList.contains("dark")) {
          icon.textContent = "☀️";
          localStorage.setItem("darkMode", "on");
        } else {
          icon.textContent = "🌙";
          localStorage.setItem("darkMode", "off");
        }
      };

      /* FX (unchanged) */
      const glow = document.createElement("div");
      glow.className = "cursor-glow";
      document.body.appendChild(glow);

      document.addEventListener("mousemove", (e) => {
        glow.style.left = e.clientX + "px";
        glow.style.top = e.clientY + "px";

        for (let i = 0; i < 2; i++) {
          let d = document.createElement("div");
          d.className = "dust";
          d.style.left = e.clientX + Math.random() * 10 - 5 + "px";
          d.style.top = e.clientY + Math.random() * 10 - 5 + "px";
          document.body.appendChild(d);
          setTimeout(() => d.remove(), 1000);
        }
      });
      const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
    </script>

  </body>
</html>
