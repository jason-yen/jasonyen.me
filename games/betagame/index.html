<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jasonyen.me</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
    font-family:'Fredoka',sans-serif;
    font-size:18px;
    background-color:#f5f6fa;
    overflow-x:hidden;
    transition: background 0.4s,color 0.4s;
    line-height:1.6;
}

/* ================= NAVBAR (EXACT) ================= */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(20px);
    z-index:9999;
}

.navbar-content{
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.navbar a{
    color:#536DFE;
    text-decoration:none;
    font-size:18px;
    position:relative;
    white-space:nowrap;
}

.navbar a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-3px;
    width:0%;
    height:3px;
    background:#536DFE;
    border-radius:2px;
    transition:width 0.3s ease;
}

.navbar a:hover::after{
    width:100%;
}

.nav-logo{
    width:42px;
    height:42px;
    border-radius:12px;
    display:block;
    transition:transform 0.25s ease,box-shadow 0.25s ease;
}

.nav-logo:hover{
    transform:scale(1.08);
    box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

/* ================= MAIN ================= */
.main-content{
    margin-top:80px;
    padding:20px;
}

/* ================= BUTTON ================= */
.game-link{
    display:inline-block;
    margin:10px 10px 0 0;
    padding:12px 24px;
    background-color:#4c5eaf;
    color:white;
    border-radius:10px;
    text-decoration:none;
    cursor:pointer;
}

/* ================= GAME ================= */
#gameCanvas{
    width:600px;
    height:400px;
    background:#0f1117;
    border-radius:12px;
    margin-top:10px;
    display:none;
}

/* ================= DARK MODE ================= */
body.dark{
    color:#e6e6e6;
    background:linear-gradient(-45deg,#0f1117,#1a1f3a,#0f1117,#1c2240);
    background-size:400% 400%;
    animation:gradientMove 18s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ================= TOGGLE (EXACT) ================= */
.toggle{
    width:65px;
    height:34px;
    border-radius:50px;
    cursor:pointer;
    position:relative;
    background:#dcdde1;
    border:2px solid rgba(0,0,0,0.2);
}

body.dark .toggle{
    background:#2f3640;
    border:2px solid rgba(255,255,255,0.3);
}

.toggle.active{
    background:#536DFE;
    border:2px solid #536DFE;
    box-shadow:0 0 10px rgba(83,109,254,0.6);
}

.toggle-circle{
    width:28px;
    height:28px;
    background:white;
    position:absolute;
    top:1px;
    left:2px;
    border-radius:50%;
    transition:0.35s;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:14px;
}

.toggle.active .toggle-circle{
    left:33px;
}

#ui{margin-top:10px;}
</style>
</head>

<body>

<div class="navbar">
    <div class="navbar-content">
        <a href="/"><img src="/images/WardenmonsterLogo.PNG" class="nav-logo"></a>
        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
    </div>
    <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
    </div>
</div>

<div class="main-content">

<h1>Pixel Survivor</h1>
<a class="game-link" onclick="startGame()">Begin</a>

<canvas id="gameCanvas"></canvas>
<div id="ui"></div>

</div>

<script>
/* DARK MODE */
const toggle=document.getElementById("toggle");
const icon=document.getElementById("icon");

if(localStorage.getItem("darkMode")==="on"){
    document.body.classList.add("dark");
    toggle.classList.add("active");
    icon.textContent="☀️";
}

toggle.onclick=()=>{
    document.body.classList.toggle("dark");
    toggle.classList.toggle("active");
    if(document.body.classList.contains("dark")){
        icon.textContent="☀️";
        localStorage.setItem("darkMode","on");
    } else {
        icon.textContent="🌙";
        localStorage.setItem("darkMode","off");
    }
};

/* GAME */
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
canvas.width=600;
canvas.height=400;

let player,enemies,bullets,keys={},gameOver=false;
let kills=0,paused=false;
let moveDir={x:0,y:0};
let obtained=new Set();

let abilities={
darkMagic:false,waves:false,spirit:false,
laser:false,multi:false,heal:false
};

let spirit=null;
let pulses=[];
let darkActive=true;
let darkTimer=0;
let lastLevelUp=0;

/* START */
function startGame(){
canvas.style.display="block";
init();
}

function init(){
player={x:300,y:200,speed:3,hp:20};
enemies=[];
bullets=[];
kills=0;
gameOver=false;
paused=false;
obtained.clear();

abilities={
darkMagic:false,waves:false,spirit:false,
laser:false,multi:false,heal:false
};

spirit=null;
pulses=[];
darkActive=true;
darkTimer=Date.now();
lastLevelUp=Date.now();
}

/* INPUT */
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/* ENEMIES */
setInterval(()=>{
if(gameOver||paused) return;
enemies.push({x:Math.random()*600,y:Math.random()*400,speed:2});
},800);

/* SHOOT */
setInterval(()=>{
if(gameOver||paused||abilities.laser) return;

let dx=moveDir.x,dy=moveDir.y;
let d=Math.hypot(dx,dy);
if(d===0) return;

let count=abilities.multi?3:1;

for(let i=0;i<count;i++){
let spread=(i-(count-1)/2)*0.2;
bullets.push({
x:player.x,y:player.y,
dx:(dx/d)+spread,dy:(dy/d)+spread,speed:5
});
}
},200);

/* VOID PULSE */
function updateWaves(){
if(!abilities.waves) return;

let now=Date.now();

if(!updateWaves.last || now-updateWaves.last>4500){
updateWaves.last=now;
pulses.push({x:player.x,y:player.y,r:0,max:140});
}

pulses.forEach(p=>{
p.r+=3;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.strokeStyle="rgba(255,120,0,0.8)";
ctx.lineWidth=6;
ctx.shadowBlur=15;
ctx.shadowColor="orange";
ctx.stroke();
ctx.shadowBlur=0;

enemies=enemies.filter(e=>{
let dist=Math.hypot(e.x-p.x,e.y-p.y);
if(dist<p.r && dist>p.r-10){ killEnemy(); return false; }
return true;
});
});

pulses=pulses.filter(p=>p.r<p.max);
}

/* DARK MAGIC LOOP */
function updateDarkMagic(){
if(!abilities.darkMagic) return;

if(Date.now()-darkTimer>5000){
darkActive=!darkActive;
darkTimer=Date.now();
}

if(!darkActive) return;

for(let i=0;i<6;i++){
let angle=Date.now()/200+i;
let ox=player.x+Math.cos(angle)*25;
let oy=player.y+Math.sin(angle)*25;

ctx.fillStyle="purple";
ctx.fillRect(ox,oy,4,4);

enemies=enemies.filter(e=>{
if(Math.hypot(e.x-ox,e.y-oy)<12){ killEnemy(); return false; }
return true;
});
}
}

/* SPIRIT */
function updateSpirit(){
if(!abilities.spirit) return;

if(!spirit) spirit={x:player.x,y:player.y};

spirit.x += (player.x - spirit.x)*0.05;
spirit.y += (player.y - spirit.y)*0.05;

ctx.fillStyle="cyan";
ctx.fillRect(spirit.x,spirit.y,5,5);

enemies=enemies.filter(e=>{
if(Math.hypot(e.x-spirit.x,e.y-spirit.y)<15){ killEnemy(); return false; }
return true;
});
}

/* LASER */
function drawLaser(){
if(!abilities.laser) return;
abilities.multi=false;

let dx=moveDir.x,dy=moveDir.y;
let d=Math.hypot(dx,dy);
if(d===0) return;

ctx.strokeStyle="lime";
ctx.beginPath();
ctx.moveTo(player.x,player.y);
ctx.lineTo(player.x+(dx/d)*600,player.y+(dy/d)*600);
ctx.stroke();

enemies=enemies.filter(e=>{
let dist=Math.abs((e.x-player.x)*(dy/d)-(e.y-player.y)*(dx/d));
if(dist<10){ killEnemy(); return false; }
return true;
});
}

/* KILL */
function killEnemy(){
kills++;
if(abilities.heal) player.hp+=5;
}

/* POWERUPS */
const powerups=[
{name:"Dark Magic",key:"darkMagic",effect:()=>abilities.darkMagic=true},
{name:"Void Pulse",key:"waves",effect:()=>abilities.waves=true},
{name:"Spirit",key:"spirit",effect:()=>abilities.spirit=true},
{name:"Laser",key:"laser",effect:()=>{
abilities.laser=true;
abilities.multi=false;
obtained.delete("multi");
}},
{name:"Multi Shot",key:"multi",effect:()=>abilities.multi=true},
{name:"Speed",key:"speed",effect:()=>player.speed+=0.5},
{name:"Heal",key:"heal",effect:()=>abilities.heal=true}
];

function showLevelUp(){
paused=true;
const ui=document.getElementById("ui");
ui.innerHTML="";

let available=powerups.filter(p=>!obtained.has(p.key));
let choices=available.sort(()=>Math.random()-0.5).slice(0,3);

choices.forEach(p=>{
let btn=document.createElement("a");
btn.className="game-link";
btn.textContent=p.name;

btn.onclick=()=>{
obtained.add(p.key);
p.effect();
ui.innerHTML="";
paused=false;
lastLevelUp=Date.now();
};

ui.appendChild(btn);
});
}

/* LOOP */
function loop(){
ctx.clearRect(0,0,600,400);

if(player && !gameOver && !paused){

moveDir.x=0; moveDir.y=0;
if(keys["w"]||keys["arrowup"]) moveDir.y=-1;
if(keys["s"]||keys["arrowdown"]) moveDir.y=1;
if(keys["a"]||keys["arrowleft"]) moveDir.x=-1;
if(keys["d"]||keys["arrowright"]) moveDir.x=1;

let d=Math.hypot(moveDir.x,moveDir.y)||1;
player.x+=moveDir.x/d*player.speed;
player.y+=moveDir.y/d*player.speed;

enemies.forEach(e=>{
let dx=player.x-e.x,dy=player.y-e.y;
let dist=Math.hypot(dx,dy)||1;
e.x+=dx/dist*e.speed;
e.y+=dy/dist*e.speed;

ctx.fillStyle="red";
ctx.fillRect(e.x,e.y,6,6);

if(dist<6){
player.hp-=0.5;
if(player.hp<=0) gameOver=true;
}
});

bullets.forEach(b=>{
b.x+=b.dx*b.speed;
b.y+=b.dy*b.speed;

ctx.fillStyle="white";
ctx.fillRect(b.x,b.y,2,2);

enemies=enemies.filter(e=>{
if(Math.abs(b.x-e.x)<6 && Math.abs(b.y-e.y)<6){
killEnemy();
return false;
}
return true;
});
});

drawLaser();
updateDarkMagic();
updateWaves();
updateSpirit();

ctx.fillStyle="#536DFE";
ctx.fillRect(player.x,player.y,6,6);

ctx.fillStyle="white";
ctx.fillText("HP:"+Math.floor(player.hp),10,20);
ctx.fillText("KILLS:"+kills,10,40);
}

/* LEVEL UP TIMER */
if(!paused && Date.now()-lastLevelUp>10000){
showLevelUp();
}

/* GAME OVER */
if(gameOver){
ctx.fillStyle="rgba(0,0,0,0.6)";
ctx.fillRect(0,0,600,400);

ctx.fillStyle="white";
ctx.fillText("GAME OVER",250,200);

const ui=document.getElementById("ui");
if(ui.innerHTML===""){
let btn=document.createElement("a");
btn.className="game-link";
btn.textContent="Restart";
btn.onclick=()=>{
init();
ui.innerHTML="";
};
ui.appendChild(btn);
}
}

requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
