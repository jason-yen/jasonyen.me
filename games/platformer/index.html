<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jasonyen.me</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
    font-family:'Fredoka',sans-serif;
    font-size:18px;
    background-color:#f5f6fa;
    overflow-x:hidden;
    transition: background 0.4s,color 0.4s;
    line-height:1.6;
}

/* ================= NAVBAR ================= */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(20px);
    z-index:9999;
}

.navbar-content{
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.navbar a{
    color:#536DFE;
    text-decoration:none;
    font-size:18px;
    position:relative;
    white-space:nowrap;
}

.navbar a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-3px;
    width:0%;
    height:3px;
    background:#536DFE;
    border-radius:2px;
    transition:width 0.3s ease;
}

.navbar a:hover::after{
    width:100%;
}

/* LOGO */
.nav-logo{
    width:42px;
    height:42px;
    border-radius:12px;
    display:block;
    transition:transform 0.25s ease,box-shadow 0.25s ease;
}

.nav-logo:hover{
    transform:scale(1.08);
    box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

/* ================= MAIN ================= */
.main-content{
    margin-top:80px;
    padding:20px;
}

canvas{
    display:block;
    margin:20px 0;
    background:rgba(135,206,235,0.2);
    border:3px solid rgba(255,255,255,0.3);
    border-radius:15px;
    box-shadow:0 0 20px rgba(135,206,235,0.5), inset 0 0 10px rgba(255,255,255,0.2);
}

body.dark canvas{
    background:rgba(20,20,20,0.8);
}

/* ================= BUTTON ================= */
.restart-btn{
    display:block;
    margin:10px 0 30px 0;
    padding:12px 25px;
    background-color:#4c5eaf;
    color:white;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}
.restart-btn:hover{
    transform:scale(1.05);
    box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

/* ================= DARK MODE ================= */
body.dark{
    color:#e6e6e6;
    background:linear-gradient(-45deg,#0f1117,#1a1f3a,#0f1117,#1c2240);
    background-size:400% 400%;
    animation:gradientMove 18s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ================= TOGGLE ================= */
.toggle{
    width:65px;
    height:34px;
    border-radius:50px;
    cursor:pointer;
    position:relative;
    background:#dcdde1;
    border:2px solid rgba(0,0,0,0.2);
}

body.dark .toggle{
    background:#2f3640;
    border:2px solid rgba(255,255,255,0.3);
}

.toggle.active{
    background:#536DFE;
    border:2px solid #536DFE;
    box-shadow:0 0 10px rgba(83,109,254,0.6);
}

.toggle-circle{
    width:28px;
    height:28px;
    background:white;
    position:absolute;
    top:1px;
    left:2px;
    border-radius:50%;
    transition:0.35s;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:14px;
}

.toggle.active .toggle-circle{
    left:33px;
}

/* ================= FX ================= */
.cursor-glow{
    position:fixed;
    width:250px;height:250px;
    background:radial-gradient(circle,rgba(83,109,254,0.25),transparent 70%);
    pointer-events:none;
    transform:translate(-50%,-50%);
}

.dust{
    position:fixed;
    width:6px;height:6px;
    background:rgba(120,150,255,0.7);
    border-radius:50%;
    pointer-events:none;
    filter:blur(2px);
    animation:dustFade 1s linear forwards;
}

@keyframes dustFade{
    to{opacity:0;transform:translateY(-20px) scale(0.5);}
}

.particle{
    position:fixed;
    width:5px;height:5px;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    animation:floatUp linear infinite;
}

@keyframes floatUp{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

/* ================= MOBILE RESPONSIVE ================= */
@media (max-width: 600px){
    .navbar{
        padding:0 15px;
        height:55px;
    }
    .navbar-content{
        gap:10px;
        flex-wrap:wrap;
    }
    .navbar a{
        font-size:16px;
    }
    canvas{
        width:100%;
        height:auto;
    }
    .cursor-glow,.dust{
        display:none;
    }
}
</style>
</head>
<body>

<div class="navbar">
    <div class="navbar-content">
        <a href="/"><img src="/images/WardenmonsterLogo.PNG" class="nav-logo"></a>
        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
    </div>
    <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
    </div>
</div>



<div class="main-content">
    <h1>Impossible Platformer (Desktop)</h1>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <button class="restart-btn" onclick="fullRestart()">Restart Game</button>
</div>

<script>
/* ================= DARK MODE TOGGLE ================= */
const toggle=document.getElementById("toggle");
const icon=document.getElementById("icon");

if(localStorage.getItem("darkMode")==="on"){
    document.body.classList.add("dark");
    toggle.classList.add("active");
    icon.textContent="☀️";
}

toggle.onclick=()=>{
    document.body.classList.toggle("dark");
    toggle.classList.toggle("active");
    if(document.body.classList.contains("dark")){
        icon.textContent="☀️";
        localStorage.setItem("darkMode","on");
    } else {
        icon.textContent="🌙";
        localStorage.setItem("darkMode","off");
    }
};

/* ================= CURSOR FX ================= */
const glow=document.createElement("div");
glow.className="cursor-glow";
document.body.appendChild(glow);

document.addEventListener("mousemove",e=>{
    glow.style.left=e.clientX+"px";
    glow.style.top=e.clientY+"px";
    for(let i=0;i<2;i++){
        let d=document.createElement("div");
        d.className="dust";
        d.style.left=(e.clientX+Math.random()*10-5)+"px";
        d.style.top=(e.clientY+Math.random()*10-5)+"px";
        document.body.appendChild(d);
        setTimeout(()=>d.remove(),1000);
    }
});

/* floating particles */
for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(12+Math.random()*18)+"s";
    document.body.appendChild(p);
}

/* ================= GAME ================= */
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');

let gravity=0.9, friction=0.85, jumpPower=-14, moveSpeed=6;
let deathCount=0, screenShake=0;
let player={x:50,y:300,width:28,height:28,xVel:0,yVel:0,grounded:false,coyoteTime:0,jumpBuffer:0};
let platforms=[],spikes=[],enemies=[],fallingSpikes=[],particles=[]; 
let goal={x:760,y:30,radius:10};

function loadLevel(){
    platforms=[
        {x:0,y:370,width:800,height:30},
        {x:200,y:250,width:80,height:10},
        {x:400,y:180,width:80,height:10},
        {x:600,y:100,width:80,height:10}
    ];
    spikes=[{x:300,y:355,width:30,height:15},{x:500,y:355,width:30,height:15}];
    enemies=[{x:100,y:340,width:30,height:30,speed:3,range:150,direction:1,originX:100}];
}

const keys={};
document.addEventListener('keydown',e=>{ keys[e.code]=true;if(e.code==='Space')player.jumpBuffer=8; });
document.addEventListener('keyup',e=>keys[e.code]=false);

function resetPlayer(){ player.x=50; player.y=300; player.xVel=0; player.yVel=0; deathCount++; screenShake=10; }
function fullRestart(){ deathCount=0; fallingSpikes=[]; particles=[]; loadLevel(); resetPlayer(); }

function rectCollide(a,b){ return a.x<a.x+b.width && a.x+a.width>b.x && a.y<a.y+b.height && a.y+a.height>b.y; }
function createParticles(x,y,color){ for(let i=0;i<5;i++) particles.push({x:x+14,y:y+14,xVel:(Math.random()-0.5)*4,yVel:(Math.random()-0.5)*4,color:color,life:30}); }
function updateParticles(){ particles.forEach(p=>{p.x+=p.xVel;p.y+=p.yVel;p.life--;}); particles=particles.filter(p=>p.life>0); }

function update(){
    let wind=Math.random()<0.01?(Math.random()-0.5)*2:0;

    if(keys['ArrowLeft']) player.xVel-=moveSpeed;
    if(keys['ArrowRight']) player.xVel+=moveSpeed;
    player.xVel+=wind*0.05;
    player.yVel+=gravity;
    player.grounded=false;

    platforms.forEach(p=>{
        if(player.x+player.width>p.x && player.x<p.x+p.width){
            if(player.y+player.height>p.y && player.y+player.height-player.yVel<=p.y && gravity>0){
                player.y=p.y-player.height; player.yVel=0; player.grounded=true; player.coyoteTime=6;
                createParticles(player.x,player.y,'rgba(200,255,255,0.7)');
            } else if(player.y<p.y+p.height && player.y-player.yVel>=p.y+p.height && gravity<0){
                player.y=p.y+p.height; player.yVel=0; player.grounded=true; player.coyoteTime=6;
                createParticles(player.x,player.y,'rgba(200,255,255,0.7)');
            }
        }
    });

    player.coyoteTime--; 
    if(player.jumpBuffer>0 && player.coyoteTime>0){player.yVel=jumpPower; player.jumpBuffer=0; createParticles(player.x,player.y,'yellow');}

    player.x+=player.xVel; player.y+=player.yVel; player.xVel*=friction;

    if(player.x<0) player.x=0;
    if(player.x+player.width>canvas.width) player.x=canvas.width-player.width;
    if(player.y>canvas.height+100||player.y<-100) resetPlayer();

    if(Math.random()<0.01) fallingSpikes.push({x:Math.random()*780,y:-20,width:20,height:20,speed:3});
    fallingSpikes=fallingSpikes.filter(s=>{ s.y+=s.speed; return s.y<canvas.height+50; });

    spikes.forEach(s=>{ if(player.x+player.width>s.x && player.x<s.x+s.width && player.y+player.height>s.y && player.y<s.y+s.height) resetPlayer(); });
    enemies.forEach(e=>{ if(player.x+player.width>e.x && player.x<e.x+e.width && player.y+player.height>e.y && player.y<e.y+e.height) resetPlayer(); });
    fallingSpikes.forEach(s=>{ if(player.x+player.width>s.x && player.x<s.x+s.width && player.y+player.height>s.y && player.y<s.y+s.height) resetPlayer(); });

    enemies.forEach(e=>{ e.x+=e.speed*e.direction; if(e.x>e.originX+e.range||e.x<e.originX) e.direction*=-1; });

    let dx=player.x+player.width/2-goal.x, dy=player.y+player.height/2-goal.y;
    if(Math.sqrt(dx*dx+dy*dy)<goal.radius){
        ctx.fillStyle="black"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle="white"; ctx.font="48px Fredoka"; ctx.fillText("YOU WIN",canvas.width/2-120,canvas.height/2);
        return;
    }

    if(screenShake>0) screenShake--;
    updateParticles();
}

function draw(){
    ctx.save();
    if(screenShake>0) ctx.translate((Math.random()-0.5)*10,(Math.random()-0.5)*10);

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle=document.body.classList.contains('dark')?'#0f1117':'#f5f6fa';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle='green'; platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.width,p.height));
    ctx.fillStyle=document.body.classList.contains('dark')?'white':'black';
    spikes.forEach(s=>{ctx.beginPath();ctx.moveTo(s.x,s.y+s.height);ctx.lineTo(s.x+s.width/2,s.y);ctx.lineTo(s.x+s.width,s.y+s.height);ctx.fill();});
    ctx.fillStyle='red'; fallingSpikes.forEach(s=>ctx.fillRect(s.x,s.y,s.width,s.height));
    ctx.fillStyle='purple'; enemies.forEach(e=>ctx.fillRect(e.x,e.y,e.width,e.height));
    ctx.beginPath(); ctx.arc(goal.x,goal.y,goal.radius,0,Math.PI*2); ctx.fillStyle='gold'; ctx.fill();
    ctx.fillStyle='red'; ctx.fillRect(player.x,player.y,player.width,player.height);
    particles.forEach(p=>{ ctx.fillStyle=p.color; ctx.fillRect(p.x,p.y,4,4); });
    ctx.fillStyle=document.body.classList.contains('dark')?'white':'black';
    ctx.font='16px Fredoka'; ctx.fillText("Deaths: "+deathCount,10,20);

    ctx.restore();
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loadLevel(); fullRestart(); loop();
</script>
</body>
</html>
