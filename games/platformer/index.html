<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jasonyen.me</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/images/favicon.png" />
<head>
  <div class="cursor"></div>
</head>
<style>
  body {
  cursor: none;
}

.cursor {
  position: fixed;
  width: 12px;
  height: 12px;
  border: 2px solid #fff;
  border-radius: 50%;
  background: transparent;
  pointer-events: none;
  z-index: 2147483647;
  transform: translate(-50%, -50%);
}
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: "Fredoka", sans-serif;
    font-size: 18px;
    background: #f5f6fa;
    color: #1b1f3b;
    overflow-x: hidden;
    line-height: 1.6;
    transition:
      background 0.4s,
      color 0.4s;
    padding-top: 78px;
  }

  /* ================= NAVBAR ================= */
  .navbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;

    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(20px);

    z-index: 9999;
  }

  .navbar-content {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .navbar a {
    color: #536dfe;
    text-decoration: none;
    font-size: 18px;
    position: relative;
    white-space: nowrap;
  }

  .navbar a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -3px;
    width: 0%;
    height: 3px;
    background: #536dfe;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .navbar a:hover::after {
    width: 100%;
  }

  .nav-logo {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: block;

    transition:
      transform 0.25s ease,
      box-shadow 0.25s ease;
  }

  .nav-logo:hover {
    transform: scale(1.08);

    box-shadow:
      0 8px 18px rgba(0, 0, 0, 0.25);
  }

  /* ================= MAIN ================= */
  .main-content {
    margin-top: 22px;
    padding: 20px;
    max-width: 980px;
  }

  h1 {
    font-size: clamp(30px, 5vw, 52px);
    font-weight: 600;
    margin-bottom: 20px;
    line-height: 1.1;

    background:
      linear-gradient(
        135deg,
        #536dfe,
        #8f9fff,
        #ffffff
      );

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ================= CANVAS ================= */
  canvas {
    display: block;

    width: 100%;
    max-width: 800px;
    height: auto;

    margin: 12px 0 24px 0;

    background:
      linear-gradient(
        180deg,
        rgba(125, 180, 255, 0.18),
        rgba(83, 109, 254, 0.08)
      );

    backdrop-filter: blur(16px);

    border-radius: 24px;

    border:
      1px solid rgba(255, 255, 255, 0.28);

    box-shadow:
      0 12px 40px rgba(83, 109, 254, 0.14),
      0 0 30px rgba(120, 140, 255, 0.08);

    transition:
      transform 0.3s ease,
      box-shadow 0.3s ease,
      border 0.3s ease;
  }

  canvas:hover {
    transform: translateY(-4px);

    box-shadow:
      0 22px 55px rgba(83, 109, 254, 0.18),
      0 0 45px rgba(120, 140, 255, 0.14);
  }

  body.dark canvas {
    background:
      linear-gradient(
        180deg,
        rgba(24, 30, 52, 0.92),
        rgba(14, 17, 28, 0.98)
      );

    border:
      1px solid rgba(255, 255, 255, 0.08);

    box-shadow:
      0 14px 45px rgba(0, 0, 0, 0.45),
      0 0 40px rgba(83, 109, 254, 0.12);
  }

  /* ================= BUTTON ================= */
  .restart-btn {
    position: relative;
    overflow: hidden;

    display: inline-flex;
    align-items: center;
    justify-content: center;

    min-width: 200px;
    height: 56px;

    padding: 0 24px;

    border: none;
    border-radius: 16px;

    background:
      linear-gradient(
        135deg,
        rgba(83, 109, 254, 0.95),
        rgba(120, 140, 255, 0.95)
      );

    color: white;
    font-size: 16px;
    font-weight: 500;
    font-family: inherit;

    cursor: pointer;

    box-shadow:
      0 10px 30px rgba(83, 109, 254, 0.25);

    transition:
      transform 0.25s ease,
      box-shadow 0.25s ease,
      filter 0.25s ease;
  }

  .restart-btn::before {
    content: "";
    position: absolute;
    inset: 0;

    background:
      linear-gradient(
        120deg,
        transparent,
        rgba(255, 255, 255, 0.25),
        transparent
      );

    transform: translateX(-120%);
    transition: transform 0.7s ease;
  }

  .restart-btn:hover::before {
    transform: translateX(120%);
  }

  .restart-btn:hover {
    transform: translateY(-4px) scale(1.03);

    filter: brightness(1.08);

    box-shadow:
      0 18px 40px rgba(83, 109, 254, 0.4);
  }

  .restart-btn:active {
    transform: scale(0.98);
  }

  /* ================= TOGGLE ================= */
  .toggle {
    width: 65px;
    height: 34px;
    border-radius: 50px;
    cursor: pointer;
    position: relative;

    background: #dcdde1;
    border: 2px solid rgba(0, 0, 0, 0.15);

    transition:
      background 0.3s ease,
      border 0.3s ease,
      box-shadow 0.3s ease;
  }

  body.dark .toggle {
    background: #2f3640;
    border: 2px solid rgba(255, 255, 255, 0.25);
  }

  .toggle.active {
    background: #536dfe;
    border: 2px solid #536dfe;

    box-shadow:
      0 0 12px rgba(83, 109, 254, 0.55);
  }

  .toggle-circle {
    width: 28px;
    height: 28px;

    background: white;

    position: absolute;
    top: 1px;
    left: 2px;

    border-radius: 50%;

    transition: 0.35s ease;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 14px;
  }

  .toggle.active .toggle-circle {
    left: 33px;
  }

  /* ================= DARK MODE ================= */
  body.dark {
    color: #e6e6e6;

    background:
      linear-gradient(
        -45deg,
        #0f1117,
        #1a1f3a,
        #0f1117,
        #1c2240
      );

    background-size: 400% 400%;

    animation: gradientMove 18s ease infinite;
  }

  @keyframes gradientMove {
    0% {
      background-position: 0% 50%;
    }

    50% {
      background-position: 100% 50%;
    }

    100% {
      background-position: 0% 50%;
    }
  }

  /* ================= MOBILE ================= */
  @media (max-width: 600px) {
    .navbar {
      padding: 0 15px;
      height: 55px;
    }

    .navbar-content {
      gap: 10px;
      flex-wrap: wrap;
    }

    .navbar a {
      font-size: 16px;
    }

    .main-content {
      margin-top: 10px;
      padding: 16px;
    }

    h1 {
      font-size: 34px;
    }

    canvas {
      border-radius: 20px;
    }

    .restart-btn {
      width: 100%;
    }
  }
</style>
  </head>
  <body>
    <div class="navbar">
      <div class="navbar-content">
        <a href="/"><img src="/images/logo.png" class="nav-logo" /></a>
        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
        <a href="/downloadpage">Exhibit</a>
      </div>
      <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
      </div>
    </div>

    <div class="main-content">
      <h1>Impossible Platformer (Desktop)</h1>
      <canvas id="gameCanvas" width="800" height="400"></canvas>
      <button class="restart-btn" onclick="fullRestart()">Restart Game</button>
    </div>

    <script>
      /* ================= DARK MODE TOGGLE ================= */
      const toggle = document.getElementById("toggle");
      const icon = document.getElementById("icon");

      if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("dark");
        toggle.classList.add("active");
        icon.textContent = "☀️";
      }

      toggle.onclick = () => {
        document.body.classList.toggle("dark");
        toggle.classList.toggle("active");
        if (document.body.classList.contains("dark")) {
          icon.textContent = "☀️";
          localStorage.setItem("darkMode", "on");
        } else {
          icon.textContent = "🌙";
          localStorage.setItem("darkMode", "off");
        }
      };

      /* ================= CURSOR FX ================= */
      const glow = document.createElement("div");
      glow.className = "cursor-glow";
      document.body.appendChild(glow);

      document.addEventListener("mousemove", (e) => {
        glow.style.left = e.clientX + "px";
        glow.style.top = e.clientY + "px";
        for (let i = 0; i < 2; i++) {
          let d = document.createElement("div");
          d.className = "dust";
          d.style.left = e.clientX + Math.random() * 10 - 5 + "px";
          d.style.top = e.clientY + Math.random() * 10 - 5 + "px";
          document.body.appendChild(d);
          setTimeout(() => d.remove(), 1000);
        }
      });

      /* floating particles */
      for (let i = 0; i < 25; i++) {
        let p = document.createElement("div");
        p.className = "particle";
        p.style.left = Math.random() * 100 + "vw";
        p.style.animationDuration = 12 + Math.random() * 18 + "s";
        document.body.appendChild(p);
      }

      /* ================= GAME ================= */
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      let gravity = 0.9,
        friction = 0.85,
        jumpPower = -14,
        moveSpeed = 6;
      let deathCount = 0,
        screenShake = 0;
      let player = {
        x: 50,
        y: 300,
        width: 28,
        height: 28,
        xVel: 0,
        yVel: 0,
        grounded: false,
        coyoteTime: 0,
        jumpBuffer: 0,
      };
      let platforms = [],
        spikes = [],
        enemies = [],
        fallingSpikes = [],
        particles = [];
      let goal = { x: 760, y: 30, radius: 10 };

      function loadLevel() {
        platforms = [
          { x: 0, y: 370, width: 800, height: 30 },
          { x: 200, y: 250, width: 80, height: 10 },
          { x: 400, y: 180, width: 80, height: 10 },
          { x: 600, y: 100, width: 80, height: 10 },
        ];
        spikes = [
          { x: 300, y: 355, width: 30, height: 15 },
          { x: 500, y: 355, width: 30, height: 15 },
        ];
        enemies = [
          {
            x: 100,
            y: 340,
            width: 30,
            height: 30,
            speed: 3,
            range: 150,
            direction: 1,
            originX: 100,
          },
        ];
      }

      const keys = {};
      document.addEventListener("keydown", (e) => {
        keys[e.code] = true;
        if (e.code === "Space") player.jumpBuffer = 8;
      });
      document.addEventListener("keyup", (e) => (keys[e.code] = false));

      function resetPlayer() {
        player.x = 50;
        player.y = 300;
        player.xVel = 0;
        player.yVel = 0;
        deathCount++;
        screenShake = 10;
      }
      function fullRestart() {
        deathCount = 0;
        fallingSpikes = [];
        particles = [];
        loadLevel();
        resetPlayer();
      }

      function rectCollide(a, b) {
        return (
          a.x < a.x + b.width &&
          a.x + a.width > b.x &&
          a.y < a.y + b.height &&
          a.y + a.height > b.y
        );
      }
      function createParticles(x, y, color) {
        for (let i = 0; i < 5; i++)
          particles.push({
            x: x + 14,
            y: y + 14,
            xVel: (Math.random() - 0.5) * 4,
            yVel: (Math.random() - 0.5) * 4,
            color: color,
            life: 30,
          });
      }
      function updateParticles() {
        particles.forEach((p) => {
          p.x += p.xVel;
          p.y += p.yVel;
          p.life--;
        });
        particles = particles.filter((p) => p.life > 0);
      }
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
      function update() {
        let wind = Math.random() < 0.01 ? (Math.random() - 0.5) * 2 : 0;

        if (keys["ArrowLeft"]) player.xVel -= moveSpeed;
        if (keys["ArrowRight"]) player.xVel += moveSpeed;
        player.xVel += wind * 0.05;
        player.yVel += gravity;
        player.grounded = false;

        platforms.forEach((p) => {
          if (player.x + player.width > p.x && player.x < p.x + p.width) {
            if (
              player.y + player.height > p.y &&
              player.y + player.height - player.yVel <= p.y &&
              gravity > 0
            ) {
              player.y = p.y - player.height;
              player.yVel = 0;
              player.grounded = true;
              player.coyoteTime = 6;
              createParticles(player.x, player.y, "rgba(200,255,255,0.7)");
            } else if (
              player.y < p.y + p.height &&
              player.y - player.yVel >= p.y + p.height &&
              gravity < 0
            ) {
              player.y = p.y + p.height;
              player.yVel = 0;
              player.grounded = true;
              player.coyoteTime = 6;
              createParticles(player.x, player.y, "rgba(200,255,255,0.7)");
            }
          }
        });

        player.coyoteTime--;
        if (player.jumpBuffer > 0 && player.coyoteTime > 0) {
          player.yVel = jumpPower;
          player.jumpBuffer = 0;
          createParticles(player.x, player.y, "yellow");
        }

        player.x += player.xVel;
        player.y += player.yVel;
        player.xVel *= friction;

        if (player.x < 0) player.x = 0;
        if (player.x + player.width > canvas.width)
          player.x = canvas.width - player.width;
        if (player.y > canvas.height + 100 || player.y < -100) resetPlayer();

        if (Math.random() < 0.01)
          fallingSpikes.push({
            x: Math.random() * 780,
            y: -20,
            width: 20,
            height: 20,
            speed: 3,
          });
        fallingSpikes = fallingSpikes.filter((s) => {
          s.y += s.speed;
          return s.y < canvas.height + 50;
        });

        spikes.forEach((s) => {
          if (
            player.x + player.width > s.x &&
            player.x < s.x + s.width &&
            player.y + player.height > s.y &&
            player.y < s.y + s.height
          )
            resetPlayer();
        });
        enemies.forEach((e) => {
          if (
            player.x + player.width > e.x &&
            player.x < e.x + e.width &&
            player.y + player.height > e.y &&
            player.y < e.y + e.height
          )
            resetPlayer();
        });
        fallingSpikes.forEach((s) => {
          if (
            player.x + player.width > s.x &&
            player.x < s.x + s.width &&
            player.y + player.height > s.y &&
            player.y < s.y + s.height
          )
            resetPlayer();
        });

        enemies.forEach((e) => {
          e.x += e.speed * e.direction;
          if (e.x > e.originX + e.range || e.x < e.originX) e.direction *= -1;
        });

        let dx = player.x + player.width / 2 - goal.x,
          dy = player.y + player.height / 2 - goal.y;
        if (Math.sqrt(dx * dx + dy * dy) < goal.radius) {
          ctx.fillStyle = "black";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "white";
          ctx.font = "48px Fredoka";
          ctx.fillText("YOU WIN", canvas.width / 2 - 120, canvas.height / 2);
          return;
        }

        if (screenShake > 0) screenShake--;
        updateParticles();
      }

      function draw() {
        ctx.save();
        if (screenShake > 0)
          ctx.translate((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10);

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = document.body.classList.contains("dark")
          ? "#0f1117"
          : "#f5f6fa";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "green";
        platforms.forEach((p) => ctx.fillRect(p.x, p.y, p.width, p.height));
        ctx.fillStyle = document.body.classList.contains("dark")
          ? "white"
          : "black";
        spikes.forEach((s) => {
          ctx.beginPath();
          ctx.moveTo(s.x, s.y + s.height);
          ctx.lineTo(s.x + s.width / 2, s.y);
          ctx.lineTo(s.x + s.width, s.y + s.height);
          ctx.fill();
        });
        ctx.fillStyle = "red";
        fallingSpikes.forEach((s) => ctx.fillRect(s.x, s.y, s.width, s.height));
        ctx.fillStyle = "purple";
        enemies.forEach((e) => ctx.fillRect(e.x, e.y, e.width, e.height));
        ctx.beginPath();
        ctx.arc(goal.x, goal.y, goal.radius, 0, Math.PI * 2);
        ctx.fillStyle = "gold";
        ctx.fill();
        ctx.fillStyle = "red";
        ctx.fillRect(player.x, player.y, player.width, player.height);
        particles.forEach((p) => {
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x, p.y, 4, 4);
        });
        ctx.fillStyle = document.body.classList.contains("dark")
          ? "white"
          : "black";
        ctx.font = "16px Fredoka";
        ctx.fillText("Deaths: " + deathCount, 10, 20);

        ctx.restore();
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }
      loadLevel();
      fullRestart();
      loop();
    </script>
  </body>
</html>
