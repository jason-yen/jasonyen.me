<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jasonyen.me</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
    font-family:'Fredoka',sans-serif;
    font-size:18px;
    background-color:#f5f6fa;
    overflow-x:hidden;
    transition: background 0.4s,color 0.4s;
    line-height:1.6;
}

/* NAVBAR */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(20px);
    z-index:9999;
}

.navbar-content{
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.navbar a{
    color:#536DFE;
    text-decoration:none;
    font-size:18px;
    position:relative;
    white-space:nowrap;
}

.navbar a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-3px;
    width:0%;
    height:3px;
    background:#536DFE;
    border-radius:2px;
    transition:width 0.3s ease;
}

.navbar a:hover::after{
    width:100%;
}

.nav-logo{
    width:42px;
    height:42px;
    border-radius:12px;
    display:block;
    transition:transform 0.25s ease,box-shadow 0.25s ease;
}

.nav-logo:hover{
    transform:scale(1.08);
    box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

/* MAIN CONTENT */
.main-content{
    margin-top:80px;
    padding:20px;
    max-width:500px;
    text-align:left;
}

h1{
    font-size:36px;
    margin-bottom:20px;
}

/* GAME BOARD */
#game-board{
    display:grid;
    grid-template-columns:repeat(2,120px);
    gap:15px;
    margin:20px 0;
}

.color-btn{
    width:120px;
    height:120px;
    border-radius:12px;
    cursor:pointer;
    opacity:0.8;
    transition:all .2s ease;
}

#green{background:#00c853;}
#red{background:#ff1744;}
#yellow{background:#ffd600;}
#blue{background:#2979ff;}

.color-btn.active{
    transform:scale(1.15);
    filter:brightness(1.7);
}

.color-btn.dim{
    opacity:0.3;
}

/* BUTTONS */
.game-link{
    display:inline-block;
    margin:10px 10px 0 0;
    padding:12px 24px;
    background-color:#4c5eaf;
    color:white;
    border-radius:10px;
    text-decoration:none;
    font-size:18px;
    border:none;
    cursor:pointer;
    transition:transform 0.2s ease,box-shadow 0.2s ease;
}

.game-link:hover{
    transform:scale(1.05);
    box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

/* TEXT */
#score{margin-top:10px;}
#highscore{opacity:0.7;}
#game-over{color:red;margin-top:10px;}
#countdown{font-size:32px;margin:10px 0;}

/* DARK MODE */
body.dark{
    color:#e6e6e6;
    background:linear-gradient(-45deg,#0f1117,#1a1f3a,#0f1117,#1c2240);
    background-size:400% 400%;
    animation:gradientMove 18s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* TOGGLE */
.toggle{
    width:65px;
    height:34px;
    border-radius:50px;
    cursor:pointer;
    position:relative;
    background:#dcdde1;
    border:2px solid rgba(0,0,0,0.2);
}

body.dark .toggle{
    background:#2f3640;
    border:2px solid rgba(255,255,255,0.3);
}

.toggle.active{
    background:#536DFE;
    border:2px solid #536DFE;
    box-shadow:0 0 10px rgba(83,109,254,0.6);
}

.toggle-circle{
    width:28px;
    height:28px;
    background:white;
    position:absolute;
    top:1px;
    left:2px;
    border-radius:50%;
    transition:0.35s;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:14px;
}

.toggle.active .toggle-circle{
    left:33px;
}

/* FX */
.cursor-glow{
    position:fixed;
    width:250px;height:250px;
    background:radial-gradient(circle,rgba(83,109,254,0.25),transparent 70%);
    pointer-events:none;
    transform:translate(-50%,-50%);
}

.dust{
    position:fixed;
    width:6px;height:6px;
    background:rgba(120,150,255,0.7);
    border-radius:50%;
    pointer-events:none;
    filter:blur(2px);
    animation:dustFade 1s linear forwards;
}

@keyframes dustFade{
    to{opacity:0;transform:translateY(-20px) scale(0.5);}
}

/* MOBILE RESPONSIVE - MATCH CODE 1 */
@media(max-width:600px){
    .navbar{padding:0 15px;height:55px;}
    .navbar-content{gap:10px;flex-wrap:wrap;}
    .navbar a{font-size:16px;}
    .main-content{margin-top:70px;padding:15px;}
    h1{font-size:28px;}
    #game-board{grid-template-columns:repeat(2,100px);}
    .color-btn{width:100px;height:100px;}
    .game-link{font-size:16px;padding:10px 18px;}
    .cursor-glow,.dust{display:none;}
}
</style>
</head>

<body>

<div class="navbar">
    <div class="navbar-content">
        <a href="/"><img src="/images/WardenmonsterLogo.PNG" class="nav-logo"></a>
        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
    </div>
    <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
    </div>
</div>

<div class="main-content">
    <h1>Copy the Pattern</h1>

    <div id="countdown"></div>

    <div id="game-board">
        <div class="color-btn" id="green"></div>
        <div class="color-btn" id="red"></div>
        <div class="color-btn" id="yellow"></div>
        <div class="color-btn" id="blue"></div>
    </div>

    <p id="score">Score: 0</p>
    <p id="highscore">High Score: 0</p>

    <button id="start-btn" class="game-link">Start Game</button>

    <p id="game-over"></p>
</div>

<script>
/* DARK MODE */
const toggle=document.getElementById("toggle");
const icon=document.getElementById("icon");
if(localStorage.getItem("darkMode")==="on"){document.body.classList.add("dark");toggle.classList.add("active");icon.textContent="☀️";}else{icon.textContent="🌙";}
toggle.onclick=()=>{const isDark=document.body.classList.toggle("dark");toggle.classList.toggle("active");icon.textContent=isDark?"☀️":"🌙";localStorage.setItem("darkMode",isDark?"on":"off");};

/* CURSOR FX */
const glow=document.createElement("div");glow.className="cursor-glow";document.body.appendChild(glow);
document.addEventListener("mousemove",e=>{glow.style.left=e.clientX+"px";glow.style.top=e.clientY+"px";for(let i=0;i<2;i++){let d=document.createElement("div");d.className="dust";d.style.left=(e.clientX+Math.random()*10-5)+"px";d.style.top=(e.clientY+Math.random()*10-5)+"px";document.body.appendChild(d);setTimeout(()=>d.remove(),1000);}});

/* GAME LOGIC */
let gameSequence=[],playerSequence=[],score=0,speed=700,gameStarted=false;
const colors=['green','red','yellow','blue'];
const buttons=document.querySelectorAll('.color-btn');
const startButton=document.getElementById('start-btn');
const scoreDisplay=document.getElementById('score');
const highscoreDisplay=document.getElementById('highscore');
const gameOverDisplay=document.getElementById('game-over');
const countdownDisplay=document.getElementById('countdown');

let highscore=localStorage.getItem("patternHighscore")||0;
highscoreDisplay.textContent="High Score: "+highscore;

startButton.onclick=startCountdown;
buttons.forEach(button=>button.onclick=handlePlayerClick);

function startCountdown(){
startButton.style.display="none";
let count=3;
countdownDisplay.textContent=count;
const timer=setInterval(()=>{
count--;
if(count>0) countdownDisplay.textContent=count;
else if(count===0) countdownDisplay.textContent="GO!";
else{clearInterval(timer);countdownDisplay.textContent="";startGame();}
},800);
}

function startGame(){
gameStarted=true;
gameSequence=[];playerSequence=[];score=0;speed=700;
scoreDisplay.textContent="Score: 0";
gameOverDisplay.textContent="";
nextRound();
}

function nextRound(){
playerSequence=[];
speed=Math.max(250,speed-15);
const randomColor=colors[Math.floor(Math.random()*4)];
gameSequence.push(randomColor);
playSequence();
}

function playSequence(){
let i=0;
buttons.forEach(b=>b.disabled=true);
const interval=setInterval(()=>{
flashButton(gameSequence[i]);
i++;
if(i>=gameSequence.length){clearInterval(interval);buttons.forEach(b=>b.disabled=false);}
},speed);
}

function flashButton(color){
const button=document.getElementById(color);
buttons.forEach(b=>{if(b.id!==color)b.classList.add("dim")});
button.classList.add('active');
setTimeout(()=>{button.classList.remove('active');buttons.forEach(b=>b.classList.remove("dim"))},speed*0.6);
}

function handlePlayerClick(e){if(!gameStarted)return;const color=e.target.id;playerSequence.push(color);flashButton(color);checkPlayerSequence();}

function checkPlayerSequence(){
for(let i=0;i<playerSequence.length;i++){if(playerSequence[i]!==gameSequence[i]){gameOver();return;}}
if(playerSequence.length===gameSequence.length){score++;scoreDisplay.textContent="Score: "+score;setTimeout(nextRound,800);}
}

function gameOver(){
gameStarted=false;
if(score>highscore){highscore=score;localStorage.setItem("patternHighscore",highscore);highscoreDisplay.textContent="High Score: "+highscore;}
gameOverDisplay.textContent="Game Over! Score: "+score;
startButton.style.display="inline-block";
}
</script>

</body>
</html>
