<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jasonyen.me</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/images/favicon.png">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
    font-family:'Fredoka',sans-serif;
    font-size:18px;
    background-color:#f5f6fa;
    overflow-x:hidden;
    transition: background 0.4s,color 0.4s;
    line-height:1.6;
}

/* ================= NAVBAR ================= */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(20px);
    z-index:9999;
}

.navbar-content{
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.navbar a{
    color:#536DFE;
    text-decoration:none;
    font-size:18px;
    position:relative;
    white-space:nowrap;
}

.navbar a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-3px;
    width:0%;
    height:3px;
    background:#536DFE;
    border-radius:2px;
    transition:width 0.3s ease;
}

.navbar a:hover::after{
    width:100%;
}

.nav-logo{
    width:42px;
    height:42px;
    border-radius:12px;
    display:block;
    transition:transform 0.25s ease,box-shadow 0.25s ease;
}

.nav-logo:hover{
    transform:scale(1.08);
    box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

/* ================= MAIN ================= */
.main-content{
    margin-top:80px;
    padding:20px;
}

h1{
    font-size:36px;
    margin-bottom:20px;
}

/* ================= SECTIONS ================= */
.section{
    margin-bottom:30px;
    padding-bottom:10px;
    border-bottom:2px solid rgba(0,0,0,0.1);
}

body.dark .section{
    border-bottom:2px solid rgba(255,255,255,0.25);
}

/* ================= BUTTONS ================= */
.game-link{
    display:inline-block;
    margin:10px 10px 0 0;
    padding:14px 26px; /* slightly bigger = easier to click */
    background-color:#4c5eaf;
    color:white;
    border-radius:10px;
    text-decoration:none;
    font-size:18px;
    transition:transform 0.2s ease,box-shadow 0.2s ease;
}

.game-link:hover{
    transform:scale(1.05);
    box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

/* ================= DARK MODE ================= */
body.dark{
    color:#e6e6e6;
    background:linear-gradient(-45deg,#0f1117,#1a1f3a,#0f1117,#1c2240);
    background-size:400% 400%;
    animation:gradientMove 18s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ================= TOGGLE ================= */
.toggle{
    width:65px;
    height:34px;
    border-radius:50px;
    cursor:pointer;
    position:relative;
    background:#dcdde1;
    border:2px solid rgba(0,0,0,0.2);
}

body.dark .toggle{
    background:#2f3640;
    border:2px solid rgba(255,255,255,0.3);
}

.toggle.active{
    background:#536DFE;
    border:2px solid #536DFE;
    box-shadow:0 0 10px rgba(83,109,254,0.6);
}

.toggle-circle{
    width:28px;
    height:28px;
    background:white;
    position:absolute;
    top:1px;
    left:2px;
    border-radius:50%;
    transition:0.35s;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:14px;
}

.toggle.active .toggle-circle{
    left:33px;
}



@keyframes dustFade{
    to{opacity:0;transform:translateY(-20px) scale(0.5);}
}

/* ================= MOBILE ================= */
@media (max-width: 600px){
    .navbar{
        padding:0 15px;
        height:55px;
    }
    .navbar-content{
        gap:10px;
        flex-wrap:wrap;
    }
    .navbar a{
        font-size:16px;
    }
    .main-content{
        margin-top:70px;
        padding:15px;
    }
    h1{
        font-size:28px;
    }
    .game-link{
        font-size:16px;
        padding:12px 20px;
    }
    .cursor-glow,.dust{
        display:none;
    }
}
</style>
</head>
<body>

<div class="navbar">
  <div class="navbar-content">
    <a href="/"><img src="/images/logo.png" class="nav-logo"></a>
    <a href="/games">Games</a>
    <a href="/tools">Tools</a>
    <a href="/donatejk">Donate</a>
    <a href="/ai">Search</a>
      <a href="/downloadpage">Exhibit</a>
  </div>
    <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
    </div>
</div>

<div class="main-content">
    <h1>Games</h1>

    <div class="section">
        <strong>Choose a Game:</strong><br>
        <a href="/games/tic-tac-toe" class="game-link">Tic Tac Toe</a>
        <a href="/games/GuessNumber" class="game-link">Guess The Number</a>
        <a href="/games/simongame" class="game-link">Copy the Pattern</a>
        <a href="/games/platformer" class="game-link">Impossible Platformer</a>
        <a href="/games/betagame" class="game-link">Pixel Survivor</a>
                <a href="/games/spaceinvader" class="game-link">Space Invader</a>

    </div>
</div>

<script>
const toggle=document.getElementById("toggle");
const icon=document.getElementById("icon");

if(localStorage.getItem("darkMode")==="on"){
    document.body.classList.add("dark");
    toggle.classList.add("active");
    icon.textContent="☀️";
}

toggle.onclick=()=>{
    document.body.classList.toggle("dark");
    toggle.classList.toggle("active");
    if(document.body.classList.contains("dark")){
        icon.textContent="☀️";
        localStorage.setItem("darkMode","on");
    } else {
        icon.textContent="🌙";
        localStorage.setItem("darkMode","off");
    }
};

/* cursor glow + dust */
const glow=document.createElement("div");
glow.className="cursor-glow";
document.body.appendChild(glow);

document.addEventListener("mousemove",e=>{
    glow.style.left=e.clientX+"px";
    glow.style.top=e.clientY+"px";
    for(let i=0;i<2;i++){
        let d=document.createElement("div");
        d.className="dust";
        d.style.left=(e.clientX+Math.random()*10-5)+"px";
        d.style.top=(e.clientY+Math.random()*10-5)+"px";
        document.body.appendChild(d);
        setTimeout(()=>d.remove(),1000);
    }
});
</script>

</body>
</html>
