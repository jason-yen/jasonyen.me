<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jasonyen.me</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&display=swap" rel="stylesheet">
<canvas id="gameCanvas" width="600" height="500" style="display:block;margin:80px 20px;border-radius:12px;background:#000;"></canvas><style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Fredoka',sans-serif;
  font-size:18px;
  background-color:#f5f6fa;
  overflow-x:hidden;
  transition: background 0.4s,color 0.4s;
  line-height:1.6;
}

/* FRAME */
:root{ --glow:0.12; }

body::before{
  content:"";
  position:fixed;
  inset:-50%;
  border-radius:22px;
  pointer-events:none;
  z-index:10000;
  background: linear-gradient(120deg,transparent 30%,rgba(0,200,255,0.5),rgba(180,120,255,0.5),transparent 70%);
  background-size:300% 300%;
  animation:smoothMove 6s linear infinite;
  filter:blur(0.3px);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  padding:2px;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:9999;
  box-shadow:0 0 calc(18px * var(--glow)) rgba(0,200,255,0.2),
             0 0 calc(30px * var(--glow)) rgba(180,120,255,0.18);
}

@keyframes smoothMove{
  0%{transform:translateX(-25%);}
  100%{transform:translateX(25%);}
}

/* DISABLE FRAME ON MOBILE (FROM CODE 1) */
@media (max-width:600px){
  body::before,
  body::after{
    display:none;
    content:none !important;
  }
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  z-index:9999;
}
#gameCanvas{
  display:block;
  margin:40px 20px; /* top/bottom + left/right spacing */
  border-radius:12px;
  background:#000;
}
.navbar-content{
  display:flex;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.navbar a{
  color:#536DFE;
  text-decoration:none;
  font-size:18px;
  position:relative;
  white-space:nowrap;
}

.navbar a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-3px;
  width:0%;
  height:3px;
  background:#536DFE;
  border-radius:2px;
  transition:width 0.3s ease;
}

.navbar a:hover::after{
  width:100%;
}

.nav-logo{
  width:42px;
  height:42px;
  border-radius:12px;
  transition:transform 0.25s ease,box-shadow 0.25s ease;
}

.nav-logo:hover{
  transform:scale(1.08);
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

/* MAIN */
.main-content{
  margin-top:80px;
  padding:20px;
}

/* DARK MODE */
body.dark{
  color:#e6e6e6;
  background:linear-gradient(-45deg,#0f1117,#1a1f3a,#0f1117,#1c2240);
  background-size:400% 400%;
  animation:gradientMove 18s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* TOGGLE */
.toggle{
  width:65px;
  height:34px;
  border-radius:50px;
  cursor:pointer;
  position:relative;
  background:#dcdde1;
  border:2px solid rgba(0,0,0,0.2);
}

body.dark .toggle{
  background:#2f3640;
  border:2px solid rgba(255,255,255,0.3);
}

.toggle.active{
  background:#536DFE;
  border:2px solid #536DFE;
  box-shadow:0 0 10px rgba(83,109,254,0.6);
}

.toggle-circle{
  width:28px;
  height:28px;
  background:white;
  position:absolute;
  top:1px;
  left:2px;
  border-radius:50%;
  transition:0.35s;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:14px;
}

.toggle.active .toggle-circle{
  left:33px;
}



@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* MOBILE NAVBAR + TEXT (FROM CODE 1) */
@media (max-width:600px){
  .navbar{
    padding:0 15px;
    height:55px;
  }

  .navbar-content{
    gap:10px;
    flex-wrap:wrap;
  }

  .navbar a{
    font-size:16px;
  }

  .main-content{
    margin-top:70px;
    padding:15px;
  }
}
</style>
</head>

<body>

<div class="navbar">
  <div class="navbar-content">
    <a href="/"><img src="/images/WardenmonsterLogo.PNG" class="nav-logo"></a>
    <a href="/games">Games</a>
    <a href="/tools">Tools</a>
    <a href="/donatejk">Donate</a>
    <a href="/ai">Search</a>
  </div>

  <div class="toggle" id="toggle">
    <div class="toggle-circle" id="icon">🌙</div>
  </div>
</div>

<div class="main-content"></div>

<script>
const toggle=document.getElementById("toggle");
const icon=document.getElementById("icon");

if(localStorage.getItem("darkMode")==="on"){
  document.body.classList.add("dark");
  toggle.classList.add("active");
  icon.textContent="☀️";
}

toggle.onclick=()=>{
  document.body.classList.toggle("dark");
  toggle.classList.toggle("active");

  if(document.body.classList.contains("dark")){
    icon.textContent="☀️";
    localStorage.setItem("darkMode","on");
  } else {
    icon.textContent="🌙";
    localStorage.setItem("darkMode","off");
  }
};

/* FX */
const glow=document.createElement("div");
glow.className="cursor-glow";
document.body.appendChild(glow);

document.addEventListener("mousemove",e=>{
  glow.style.left=e.clientX+"px";
  glow.style.top=e.clientY+"px";
});

for(let i=0;i<15;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(12+Math.random()*18)+"s";
  document.body.appendChild(p);
}
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {
  x: canvas.width / 2 - 20,
  y: canvas.height - 40,
  w: 40,
  h: 20,
  speed: 5
};

let bullets = [];
let enemies = [];
let enemyDirection = 1;

// create enemies
for (let r = 0; r < 4; r++) {
  for (let c = 0; c < 8; c++) {
    enemies.push({
      x: 60 + c * 60,
      y: 40 + r * 40,
      w: 30,
      h: 20
    });
  }
}

let keys = {};

document.addEventListener("keydown", e => {
  keys[e.key] = true;

  if (e.key === " ") {
    bullets.push({
      x: player.x + player.w / 2 - 2,
      y: player.y,
      w: 4,
      h: 10
    });
  }
});

document.addEventListener("keyup", e => {
  keys[e.key] = false;
});

function update() {
  // player movement
  if (keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;

  player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));

  // bullets
  bullets.forEach(b => b.y -= 6);
  bullets = bullets.filter(b => b.y > 0);

  // enemies move
  let hitEdge = false;
  enemies.forEach(e => {
    e.x += enemyDirection * 1.5;
    if (e.x < 0 || e.x + e.w > canvas.width) hitEdge = true;
  });

  if (hitEdge) {
    enemyDirection *= -1;
    enemies.forEach(e => e.y += 10);
  }

  // collision
  bullets.forEach((b, bi) => {
    enemies.forEach((e, ei) => {
      if (
        b.x < e.x + e.w &&
        b.x + b.w > e.x &&
        b.y < e.y + e.h &&
        b.y + b.h > e.y
      ) {
        enemies.splice(ei, 1);
        bullets.splice(bi, 1);
      }
    });
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // player
  ctx.fillStyle = "#00ffcc";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // bullets
  ctx.fillStyle = "#ffffff";
  bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

  // enemies
  ctx.fillStyle = "#ff4d6d";
  enemies.forEach(e => ctx.fillRect(e.x, e.y, e.w, e.h));
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
