<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blank page</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Fredoka',sans-serif;
  font-size:18px;
  background:#f5f6fa;
  transition:background 0.4s,color 0.4s;
  overflow-x:hidden;
}

/* FX FRAME */
body::before{
  content:"";
  position:fixed;
  inset:-50%;
  pointer-events:none;
  z-index:10000;
  background:linear-gradient(120deg,transparent,rgba(0,200,255,0.4),rgba(180,120,255,0.4),transparent);
  background-size:300% 300%;
  animation:move 6s linear infinite;
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  padding:2px;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:9999;
  box-shadow:0 0 18px rgba(0,200,255,0.2),0 0 30px rgba(180,120,255,0.18);
}

@keyframes move{
  0%{transform:translateX(-25%);}
  100%{transform:translateX(25%);}
}

/* DARK MODE */
body.dark{
  color:#e6e6e6;
  background:linear-gradient(-45deg,#0f1117,#1a1f3a,#0f1117,#1c2240);
  background-size:400% 400%;
  animation:grad 18s ease infinite;
}

@keyframes grad{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  z-index:10001;
}

.navbar-content{
  display:flex;
  gap:18px;
  align-items:center;
}

.navbar a{
  color:#536DFE;
  text-decoration:none;
  font-size:15px;
  position:relative;
}

.navbar a::after{
  content:"";
  position:absolute;
  bottom:-3px;
  left:0;
  width:0;
  height:2px;
  background:#536DFE;
  transition:0.3s;
}

.navbar a:hover::after{
  width:100%;
}

.nav-logo{
  width:40px;
  height:40px;
  border-radius:10px;
}

/* TOGGLE */
.toggle{
  width:65px;
  height:34px;
  border-radius:50px;
  cursor:pointer;
  position:relative;
  background:#dcdde1;
  border:2px solid rgba(0,0,0,0.2);
}

body.dark .toggle{
  background:#2f3640;
  border:2px solid rgba(255,255,255,0.3);
}

.toggle.active{
  background:#536DFE;
}

.toggle-circle{
  width:28px;
  height:28px;
  background:#fff;
  border-radius:50%;
  position:absolute;
  top:1px;
  left:2px;
  transition:0.35s;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
}

.toggle.active .toggle-circle{
  left:33px;
}

/* FX */


@keyframes fade{
  to{opacity:0;transform:translateY(-20px) scale(0.5);}
}

.particle{
  position:fixed;
  width:5px;
  height:5px;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  animation:float linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

</style>
</head>

<body>

<div class="navbar">
  <div class="navbar-content">
    <a href="/"><img src="/images/WardenmonsterLogo.PNG" class="nav-logo"></a>
    <a href="/games">Games</a>
    <a href="/tools">Tools</a>
    <a href="/donatejk">Donate</a>
    <a href="/ai">Search</a>
  </div>

  <div class="toggle" id="toggle">
    <div class="toggle-circle" id="icon">🌙</div>
  </div>
</div>

<script>

/* DARK MODE */
const toggle=document.getElementById("toggle");
const icon=document.getElementById("icon");

if(localStorage.getItem("darkMode")==="on"){
  document.body.classList.add("dark");
  toggle.classList.add("active");
  icon.textContent="☀️";
}

toggle.onclick=()=>{
  document.body.classList.toggle("dark");
  toggle.classList.toggle("active");

  if(document.body.classList.contains("dark")){
    icon.textContent="☀️";
    localStorage.setItem("darkMode","on");
  } else {
    icon.textContent="🌙";
    localStorage.setItem("darkMode","off");
  }
};

/* FX */
const glow=document.createElement("div");
glow.className="cursor-glow";
document.body.appendChild(glow);

document.addEventListener("mousemove",e=>{
  glow.style.left=e.clientX+"px";
  glow.style.top=e.clientY+"px";

  for(let i=0;i<2;i++){
    let d=document.createElement("div");
    d.className="dust";
    d.style.left=(e.clientX+Math.random()*10-5)+"px";
    d.style.top=(e.clientY+Math.random()*10-5)+"px";
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),1000);
  }
});

/* particles */
for(let i=0;i<15;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(12+Math.random()*18)+"s";
  document.body.appendChild(p);
}

</script>

</body>
</html>
