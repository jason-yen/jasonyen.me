<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jasonyen.me</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/images/favicon.png" />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Fredoka", sans-serif;
        font-size: 18px;
        background-color: #f5f6fa;
        color: #1b1f3b;
        overflow-x: hidden;
        transition:
          background 0.4s,
          color 0.4s;
        padding-top: 80px;
        line-height: 1.6;
      }

      /* NAVBAR */
      .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(20px);
        z-index: 9999;
      }
      .navbar-content {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }
      .navbar a {
        color: #536dfe;
        text-decoration: none;
        font-size: 18px;
        position: relative;
        white-space: nowrap;
      }
      .navbar a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -3px;
        width: 0%;
        height: 3px;
        background: #536dfe;
        border-radius: 2px;
        transition: width 0.3s ease;
      }
      .navbar a:hover::after {
        width: 100%;
      }
      .nav-logo {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        display: block;
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
      }
      .nav-logo:hover {
        transform: scale(1.08);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
      }

      /* DARK MODE TOGGLE */
      .toggle {
        width: 65px;
        height: 34px;
        border-radius: 50px;
        cursor: pointer;
        position: relative;
        background: #dcdde1;
        border: 2px solid rgba(0, 0, 0, 0.2);
      }
      body.dark .toggle {
        background: #2f3640;
        border: 2px solid rgba(255, 255, 255, 0.3);
      }
      .toggle.active {
        background: #536dfe;
        border: 2px solid #536dfe;
        box-shadow: 0 0 10px rgba(83, 109, 254, 0.6);
      }
      .toggle-circle {
        width: 28px;
        height: 28px;
        background: white;
        position: absolute;
        top: 1px;
        left: 2px;
        border-radius: 50%;
        transition: 0.35s;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 14px;
      }
      .toggle.active .toggle-circle {
        left: 33px;
      }

      /* MAIN CONTENT LEFT-ALIGNED */
      .main-content {
        margin-top: 80px;
        padding: 20px;
        max-width: 500px;
        text-align: left;
      }
      h1 {
        font-size: 36px;
        margin-bottom: 20px;
      }

      /* GAME BOX */
      .game-box {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(0, 0, 0, 0.05);
        border-radius: 18px;
        padding: 20px;
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.05),
          0 0 20px rgba(120, 140, 255, 0.15);
      }

      /* INPUT */
      input[type="number"] {
        width: 100%;
        padding: 12px;
        font-size: 18px;
        border-radius: 10px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        background: rgba(255, 255, 255, 0.1);
        color: #1b1f3b;
        margin-bottom: 15px;
      }
      input:focus {
        border-color: #536dfe;
        outline: none;
      }

      /* BUTTONS */
      button {
        display: inline-block;
        padding: 12px 24px;
        margin: 5px 5px 0 0;
        border-radius: 10px;
        border: none;
        background: #4c5eaf;
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        font-weight: 500;
      }
      button:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
      }
      .reset {
        background: #888;
      }

      /* FEEDBACK */
      .feedback {
        margin-top: 15px;
        font-size: 18px;
        font-weight: 500;
        min-height: 24px;
      }
      .win {
        color: #27ae60;
        text-shadow: 0 0 8px #27ae60;
      }
      .high {
        color: #ff9f7a;
        text-shadow: 0 0 8px #ff9f7a;
      }
      .low {
        color: #7acbff;
        text-shadow: 0 0 8px #7acbff;
      }
      .attempts {
        margin-top: 10px;
        opacity: 0.7;
      }

      /* DARK MODE */
      body.dark {
        color: #e6e6e6;
        background: linear-gradient(-45deg, #0f1117, #1a1f3a, #0f1117, #1c2240);
        background-size: 400% 400%;
        animation: gradientMove 18s ease infinite;
      }
      body.dark input {
        color: #e6e6e6;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      body.dark .game-box {
        background: rgba(30, 30, 50, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      body.dark button.reset {
        background: linear-gradient(135deg, #555, #333);
      }
      body.dark .feedback.win {
        color: #7cfc00;
        text-shadow: 0 0 8px #7cfc00;
      }
      body.dark .feedback.high {
        color: #ffa07a;
        text-shadow: 0 0 8px #ffa07a;
      }
      body.dark .feedback.low {
        color: #87cefa;
        text-shadow: 0 0 8px #87cefa;
      }

      @keyframes gradientMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* CURSOR GLOW + PARTICLES */
      @keyframes dustFade {
        to {
          opacity: 0;
          transform: translateY(-20px) scale(0.5);
        }
      }
      @keyframes floatUp {
        from {
          transform: translateY(100vh);
        }
        to {
          transform: translateY(-10vh);
        }
      }

      /* MOBILE */
      @media (max-width: 600px) {
        .navbar {
          padding: 0 15px;
          height: 55px;
        }
        .navbar-content {
          gap: 10px;
          flex-wrap: wrap;
        }
        h1 {
          font-size: 28px;
        }
        button {
          width: 100%;
          margin: 5px 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->
    <div class="navbar">
      <div class="navbar-content">
        <a href="/"><img src="/images/logo.png" class="nav-logo" /></a>
        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
        <a href="/downloadpage">Exhibit</a>
      </div>
      <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <h1>Guess the Number</h1>
      <div class="game-box">
        <input
          type="number"
          id="guessInput"
          placeholder="Enter number"
          min="1"
          max="100"
        />
        <button onclick="checkGuess()">Guess</button>
        <button class="reset" onclick="startGame()">Restart</button>
        <div class="feedback" id="feedback"></div>
        <div class="attempts" id="attempts"></div>
      </div>
    </div>

    <script>
      // DARK MODE
      const toggle = document.getElementById("toggle");
      const icon = document.getElementById("icon");
      if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("dark");
        toggle.classList.add("active");
        icon.textContent = "☀️";
      } else {
        icon.textContent = "🌙";
      }
      toggle.onclick = () => {
        const isDark = document.body.classList.toggle("dark");
        toggle.classList.toggle("active");
        icon.textContent = isDark ? "☀️" : "🌙";
        localStorage.setItem("darkMode", isDark ? "on" : "off");
      };

      // GAME LOGIC
      let randomNumber, attempts;
      const input = document.getElementById("guessInput");
      const feedback = document.getElementById("feedback");
      const attemptsText = document.getElementById("attempts");

      function startGame() {
        randomNumber = Math.floor(Math.random() * 100) + 1;
        attempts = 0;
        feedback.textContent = "";
        feedback.className = "feedback";
        attemptsText.textContent = "";
        input.value = "";
        input.focus();
      }
      function checkGuess() {
        const guess = Number(input.value);
        if (!guess || guess < 1 || guess > 100) {
          feedback.textContent = "Enter a number between 1 and 100";
          return;
        }
        attempts++;
        if (guess === randomNumber) {
          feedback.textContent = `🎉 Correct! ${attempts} attempts`;
          feedback.className = "feedback win";
          attemptsText.textContent = "New game starting...";
          setTimeout(startGame, 2000);
          return;
        }
        if (guess < randomNumber) {
          feedback.textContent = "Too low ↓";
          feedback.className = "feedback low";
        } else {
          feedback.textContent = "Too high ↑";
          feedback.className = "feedback high";
        }
        attemptsText.textContent = `Attempts: ${attempts}`;
        input.value = "";
        input.focus();
      }
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") checkGuess();
      });
      startGame();

      /* CURSOR GLOW + DUST */
      const glow = document.createElement("div");
      glow.className = "cursor-glow";
      document.body.appendChild(glow);
      document.addEventListener("mousemove", (e) => {
        glow.style.left = e.clientX + "px";
        glow.style.top = e.clientY + "px";
        for (let i = 0; i < 2; i++) {
          let d = document.createElement("div");
          d.className = "dust";
          d.style.left = e.clientX + Math.random() * 10 - 5 + "px";
          d.style.top = e.clientY + Math.random() * 10 - 5 + "px";
          document.body.appendChild(d);
          setTimeout(() => d.remove(), 1000);
        }
      });

      /* FLOATING PARTICLES */
      for (let i = 0; i < 25; i++) {
        let p = document.createElement("div");
        p.className = "particle";
        p.style.left = Math.random() * 100 + "vw";
        p.style.animationDuration = 12 + Math.random() * 18 + "s";
        document.body.appendChild(p);
      }
    </script>
  </body>
</html>
