<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess The Number | jasonyen.me</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif; /* original font */
}

body {
  background-color: #f5f6fa;
  padding-top: 56px;
  color: #1b1f3b;
}

/* NAVBAR */
.navbar {
  width: 100%;
  height: 56px;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 9999;
  display: flex;
  align-items: center;
  padding: 0 40px;
  gap: 20px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border-bottom: 1px solid rgba(0, 0, 0, 0.05);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
}

.navbar-content {
  display: flex;
  align-items: center;
  gap: 20px;
}

.navbar img {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  transition: transform 0.3s ease;
}

.navbar img:hover {
  transform: scale(1.1);
}

.navbar a {
  color: #536DFE;
  font-weight: 500;
  text-decoration: none;
  transition: 0.3s ease;
}

.navbar a:hover {
  transform: scale(1.05);
}

.separator {
  color: #9dacff;
  font-size: 20px;
}

/* MAIN CONTENT */
.container {
  margin: 40px; /* left-aligned */
  max-width: 600px;
}

/* TITLE: KEEP ORIGINAL FORMATTING */
h1 {
  font-size: 42px; /* original size */
  font-weight: bold; /* original weight */
  margin-bottom: 20px;
  color: #1b1f3b; /* original text color */
}

/* GAME CARD (glassy) */
.game-box {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(0, 0, 0, 0.05);
  border-radius: 18px;
  padding: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05), 0 0 20px rgba(120, 140, 255, 0.15);
}

/* INPUT */
input {
  width: 220px;
  padding: 12px;
  font-size: 18px;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.1);
  background: rgba(255,255,255,0.1);
  outline: none;
  color: #1b1f3b;
  transition: 0.3s;
}

input:focus {
  border-color: #536DFE;
  box-shadow: 0 0 12px rgba(83,109,254,0.5);
}

/* BUTTONS */
button {
  padding: 12px 25px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg,#6a7dff,#9b6cff);
  color: white;
  cursor: pointer;
  font-weight: 600;
  transition: 0.3s;
  margin-top: 15px;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 15px #7a8cff, 0 0 30px #7a8cff66;
}

.reset {
  background: linear-gradient(135deg,#888,#666);
  margin-left: 10px;
}

.feedback {
  margin-top: 20px;
  font-size: 18px;
  font-weight: 500;
  min-height: 24px;
}

.win {
  color: #27ae60;
  text-shadow: 0 0 8px #27ae60;
}

.high {
  color: #ff9f7a;
  text-shadow: 0 0 8px #ff9f7a;
}

.low {
  color: #7acbff;
  text-shadow: 0 0 8px #7acbff;
}

.attempts {
  margin-top: 10px;
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="navbar-content">
    <a href="/"><img src="/images/WardenmonsterLogo.PNG" alt="Logo"></a>
    <a href="/games">Games</a>
    <div class="separator">|</div>
    <a href="/tools">Tools</a>
    <div class="separator">|</div>
    <a href="/donatejk">Donate</a>
    <div class="separator">|</div>
    <a href="/ai">Search</a>
    <div class="separator">|</div>
    <a href="/noises">Sounds</a>
  </div>
</div>

<!-- PAGE CONTENT -->
<div class="container">
  <h1>Guess the Number</h1> <!-- original font/formatting preserved -->
  <div class="game-box">
    <input type="number" id="guessInput" placeholder="Enter number" min="1" max="100">
    <br>
    <button onclick="checkGuess()">Guess</button>
    <button class="reset" onclick="startGame()">Restart</button>
    <div class="feedback" id="feedback"></div>
    <div class="attempts" id="attempts"></div>
  </div>
</div>

<script>
let randomNumber;
let attempts;

const input = document.getElementById("guessInput");
const feedback = document.getElementById("feedback");
const attemptsText = document.getElementById("attempts");

function startGame() {
  randomNumber = Math.floor(Math.random() * 100) + 1;
  attempts = 0;
  feedback.textContent = "";
  feedback.className = "feedback";
  attemptsText.textContent = "";
  input.value = "";
  input.focus();
}

function checkGuess() {
  const guess = Number(input.value);
  if (!guess || guess < 1 || guess > 100) {
    feedback.textContent = "Enter a number between 1 and 100";
    return;
  }
  attempts++;
  if (guess === randomNumber) {
    feedback.textContent = `🎉 Correct! ${attempts} attempts`;
    feedback.className = "feedback win";
    attemptsText.textContent = "New game starting...";
    setTimeout(startGame, 2000);
    return;
  }
  if (guess < randomNumber) {
    feedback.textContent = "Too low ↓";
    feedback.className = "feedback low";
  } else {
    feedback.textContent = "Too high ↑";
    feedback.className = "feedback high";
  }
  attemptsText.textContent = `Attempts: ${attempts}`;
  input.value = "";
  input.focus();
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") checkGuess();
});

startGame();
</script>

</body>
</html>
