<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jasonyen.me</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/images/favicon.png" />

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: "Fredoka", sans-serif;
    font-size: 18px;
    background: #f5f6fa;
    color: #1b1f3b;
    overflow-x: hidden;
    line-height: 1.6;
    transition:
      background 0.4s,
      color 0.4s;
    padding-top: 80px;
  }

  /* ================= NAVBAR ================= */
  .navbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;

    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(20px);

    z-index: 9999;
  }

  .navbar-content {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .navbar a {
    color: #536dfe;
    text-decoration: none;
    font-size: 18px;
    position: relative;
    white-space: nowrap;
  }

  .navbar a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -3px;
    width: 0%;
    height: 3px;
    background: #536dfe;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .navbar a:hover::after {
    width: 100%;
  }

  .nav-logo {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: block;
    transition:
      transform 0.25s ease,
      box-shadow 0.25s ease;
  }

  .nav-logo:hover {
    transform: scale(1.08);
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
  }

  /* ================= MAIN ================= */
.main-content {
  margin-top: 28px;
  padding: 20px;
  max-width: 560px;
}

  h1 {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 600;
    margin-bottom: 24px;
    line-height: 1.1;

    background: linear-gradient(
      135deg,
      #536dfe,
      #8f9fff,
      #ffffff
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ================= GAME BOX ================= */
  .game-box {
    position: relative;
    overflow: hidden;

    background: rgba(255, 255, 255, 0.16);
    backdrop-filter: blur(18px);

    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 24px;

    padding: 28px;

    box-shadow:
      0 10px 40px rgba(83, 109, 254, 0.12),
      0 0 30px rgba(120, 140, 255, 0.08);

    transition:
      transform 0.3s ease,
      box-shadow 0.3s ease,
      border 0.3s ease;
  }

  .game-box:hover {
    transform: translateY(-4px);
    box-shadow:
      0 20px 50px rgba(83, 109, 254, 0.18),
      0 0 40px rgba(120, 140, 255, 0.15);
  }

  .game-box::before {
    content: "";
    position: absolute;
    inset: 0;

    background:
      linear-gradient(
        120deg,
        transparent,
        rgba(255, 255, 255, 0.18),
        transparent
      );

    transform: translateX(-120%);
    transition: transform 1s ease;
    pointer-events: none;
  }

  .game-box:hover::before {
    transform: translateX(120%);
  }

  /* ================= INPUT ================= */
  input[type="number"] {
    width: 100%;
    height: 58px;

    padding: 0 18px;

    border-radius: 16px;
    border: 1px solid rgba(83, 109, 254, 0.18);

    background: rgba(255, 255, 255, 0.55);

    color: #1b1f3b;
    font-size: 18px;
    font-family: inherit;

    margin-bottom: 18px;

    transition:
      border 0.25s ease,
      box-shadow 0.25s ease,
      background 0.25s ease;
  }

  input[type="number"]:focus {
    outline: none;

    border-color: #536dfe;

    background: rgba(255, 255, 255, 0.75);

    box-shadow:
      0 0 0 4px rgba(83, 109, 254, 0.12),
      0 10px 30px rgba(83, 109, 254, 0.12);
  }

  input::placeholder {
    color: rgba(27, 31, 59, 0.55);
  }

  /* ================= BUTTONS ================= */
  button {
    position: relative;
    overflow: hidden;

    display: inline-flex;
    align-items: center;
    justify-content: center;

    min-width: 160px;
    height: 56px;

    padding: 0 24px;
    margin: 6px 10px 0 0;

    border: none;
    border-radius: 16px;

    background:
      linear-gradient(
        135deg,
        rgba(83, 109, 254, 0.95),
        rgba(120, 140, 255, 0.95)
      );

    color: white;
    font-size: 16px;
    font-weight: 500;
    font-family: inherit;

    cursor: pointer;

    box-shadow:
      0 10px 30px rgba(83, 109, 254, 0.25);

    transition:
      transform 0.25s ease,
      box-shadow 0.25s ease,
      filter 0.25s ease;
  }

  button::before {
    content: "";
    position: absolute;
    inset: 0;

    background:
      linear-gradient(
        120deg,
        transparent,
        rgba(255, 255, 255, 0.25),
        transparent
      );

    transform: translateX(-120%);
    transition: transform 0.7s ease;
  }

  button:hover::before {
    transform: translateX(120%);
  }

  button:hover {
    transform: translateY(-4px) scale(1.03);

    filter: brightness(1.08);

    box-shadow:
      0 18px 40px rgba(83, 109, 254, 0.4);
  }

  button:active {
    transform: scale(0.98);
  }

  .reset {
    background:
      linear-gradient(
        135deg,
        rgba(90, 90, 100, 0.95),
        rgba(55, 55, 65, 0.95)
      );
  }

  /* ================= FEEDBACK ================= */
  .feedback {
    margin-top: 22px;
    font-size: 20px;
    font-weight: 600;
    min-height: 28px;

    transition: all 0.25s ease;
  }

  .feedback.win {
    color: #6dff8f;
    text-shadow: 0 0 18px rgba(109, 255, 143, 0.7);
  }

  .feedback.high {
    color: #ffae8a;
    text-shadow: 0 0 18px rgba(255, 174, 138, 0.6);
  }

  .feedback.low {
    color: #8fd8ff;
    text-shadow: 0 0 18px rgba(143, 216, 255, 0.6);
  }

  .attempts {
    margin-top: 10px;
    opacity: 0.72;
    font-size: 15px;
    letter-spacing: 0.3px;
  }

  /* ================= TOGGLE ================= */
  .toggle {
    width: 65px;
    height: 34px;
    border-radius: 50px;
    cursor: pointer;
    position: relative;

    background: #dcdde1;
    border: 2px solid rgba(0, 0, 0, 0.15);

    transition:
      background 0.3s ease,
      border 0.3s ease,
      box-shadow 0.3s ease;
  }

  body.dark .toggle {
    background: #2f3640;
    border: 2px solid rgba(255, 255, 255, 0.25);
  }

  .toggle.active {
    background: #536dfe;
    border: 2px solid #536dfe;

    box-shadow:
      0 0 12px rgba(83, 109, 254, 0.55);
  }

  .toggle-circle {
    width: 28px;
    height: 28px;

    background: white;

    position: absolute;
    top: 1px;
    left: 2px;

    border-radius: 50%;

    transition: 0.35s ease;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 14px;
  }

  .toggle.active .toggle-circle {
    left: 33px;
  }

  /* ================= DARK MODE ================= */
  body.dark {
    color: #e6e6e6;

    background:
      linear-gradient(
        -45deg,
        #0f1117,
        #1a1f3a,
        #0f1117,
        #1c2240
      );

    background-size: 400% 400%;

    animation: gradientMove 18s ease infinite;
  }

  body.dark .game-box {
    background: rgba(25, 28, 48, 0.5);

    border: 1px solid rgba(255, 255, 255, 0.08);

    box-shadow:
      0 10px 40px rgba(0, 0, 0, 0.4),
      0 0 40px rgba(83, 109, 254, 0.12);
  }

  body.dark input[type="number"] {
    background: rgba(255, 255, 255, 0.05);

    border: 1px solid rgba(255, 255, 255, 0.12);

    color: #f2f4ff;
  }

  body.dark input[type="number"]:focus {
    background: rgba(255, 255, 255, 0.08);

    border-color: #7f94ff;

    box-shadow:
      0 0 0 4px rgba(127, 148, 255, 0.12),
      0 10px 30px rgba(83, 109, 254, 0.2);
  }

  body.dark input::placeholder {
    color: rgba(255, 255, 255, 0.45);
  }

  body.dark .attempts {
    opacity: 0.65;
  }

  @keyframes gradientMove {
    0% {
      background-position: 0% 50%;
    }

    50% {
      background-position: 100% 50%;
    }

    100% {
      background-position: 0% 50%;
    }
  }


  /* ================= MOBILE ================= */
  @media (max-width: 600px) {
    .navbar {
      padding: 0 15px;
      height: 55px;
    }

    .navbar-content {
      gap: 10px;
      flex-wrap: wrap;
    }

    .navbar a {
      font-size: 16px;
    }

    .main-content {
      margin-top: 75px;
      padding: 16px;
    }

    h1 {
      font-size: 32px;
    }

    .game-box {
      padding: 22px;
      border-radius: 20px;
    }

    button {
      width: 100%;
      margin: 8px 0 0 0;
    }

  }
</style>
  </head>
  <body>
    <!-- NAVBAR -->
    <div class="navbar">
      <div class="navbar-content">
        <a href="/"><img src="/images/logo.png" class="nav-logo" /></a>
        <a href="/games">Games</a>
        <a href="/tools">Tools</a>
        <a href="/donatejk">Donate</a>
        <a href="/ai">Search</a>
        <a href="/downloadpage">Exhibit</a>
      </div>
      <div class="toggle" id="toggle">
        <div class="toggle-circle" id="icon">🌙</div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <h1>Guess the Number</h1>
      <div class="game-box">
        <input
          type="number"
          id="guessInput"
          placeholder="Enter number"
          min="1"
          max="100"
        />
        <button onclick="checkGuess()">Guess</button>
        <button class="reset" onclick="startGame()">Restart</button>
        <div class="feedback" id="feedback"></div>
        <div class="attempts" id="attempts"></div>
      </div>
    </div>

    <script>
      // DARK MODE
      const toggle = document.getElementById("toggle");
      const icon = document.getElementById("icon");
      if (localStorage.getItem("darkMode") === "on") {
        document.body.classList.add("dark");
        toggle.classList.add("active");
        icon.textContent = "☀️";
      } else {
        icon.textContent = "🌙";
      }
      toggle.onclick = () => {
        const isDark = document.body.classList.toggle("dark");
        toggle.classList.toggle("active");
        icon.textContent = isDark ? "☀️" : "🌙";
        localStorage.setItem("darkMode", isDark ? "on" : "off");
      };

      // GAME LOGIC
      let randomNumber, attempts;
      const input = document.getElementById("guessInput");
      const feedback = document.getElementById("feedback");
      const attemptsText = document.getElementById("attempts");

      function startGame() {
        randomNumber = Math.floor(Math.random() * 100) + 1;
        attempts = 0;
        feedback.textContent = "";
        feedback.className = "feedback";
        attemptsText.textContent = "";
        input.value = "";
        input.focus();
      }
      function checkGuess() {
        const guess = Number(input.value);
        if (!guess || guess < 1 || guess > 100) {
          feedback.textContent = "Enter a number between 1 and 100";
          return;
        }
        attempts++;
        if (guess === randomNumber) {
          feedback.textContent = `🎉 Correct! ${attempts} attempts`;
          feedback.className = "feedback win";
          attemptsText.textContent = "New game starting...";
          setTimeout(startGame, 2000);
          return;
        }
        if (guess < randomNumber) {
          feedback.textContent = "Too low ↓";
          feedback.className = "feedback low";
        } else {
          feedback.textContent = "Too high ↑";
          feedback.className = "feedback high";
        }
        attemptsText.textContent = `Attempts: ${attempts}`;
        input.value = "";
        input.focus();
      }
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") checkGuess();
      });
      startGame();


    </script>
  </body>
</html>
